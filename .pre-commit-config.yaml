default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        name: Ruff Linter
        args:
          - --fix
          - --exit-non-zero-on-fix
        files: ^(src/|tests/|scripts/)
      - id: ruff-format
        name: Ruff Formatter
        files: ^(src/|tests/|scripts/)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
      - id: end-of-file-fixer
        name: Fix End of Files
        exclude: ^\.repomap/
      - id: check-added-large-files
        name: Check Large Files
        args:
          - --maxkb=1000
      - id: check-merge-conflict
        name: Check Merge Conflicts
      - id: check-yaml
        name: Validate YAML
      - id: check-toml
        name: Validate TOML
      - id: check-json
        name: Validate JSON
      - id: check-ast
        name: Check Python AST
      - id: debug-statements
        name: Check Debug Statements
      - id: detect-private-key
        name: Detect Private Keys
      - id: check-case-conflict
        name: Check Case Conflicts

  - repo: local
    hooks:
      - id: mypy
        name: MyPy Type Check
        entry: uv run python -m mypy
        language: system
        types: [python]
        files: ^(src/|tests/).*\.py$
        pass_filenames: true

      - id: complexity-check
        name: Check Code Complexity
        entry: uv run python -m scripts.complexity
        language: system
        types: [python]
        files: ^(src/|scripts/).*\.py$
        pass_filenames: true

      - id: check-float-equality
        name: Check Float Equality in Tests
        entry: uv run python scripts/check_float_equality.py
        language: system
        files: ^tests/.*\.py$
        pass_filenames: true

      - id: check-code-patterns
        name: Check Code Patterns
        entry: uv run python scripts/check_code_patterns.py --min-severity warning --fail-on error
        language: system
        types: [python]
        files: ^src/.*\.py$
        pass_filenames: true
        verbose: true

      - id: check-ast-antipatterns
        name: Check AST Antipatterns
        entry: uv run python scripts/check_ast_antipatterns.py --min-severity info --fail-on error
        language: system
        types: [python]
        files: ^src/.*\.py$
        pass_filenames: true
        verbose: true

      - id: arch-smell-audit
        name: Architecture Smell Audit
        entry: uv run python -m scripts.arch_smell.audit --diff --strict-critical
        language: system
        pass_filenames: false
        always_run: true
        verbose: true

      - id: check-test-patterns
        name: Check Test Patterns
        entry: uv run python scripts/check_test_patterns.py
        language: system
        files: ^tests/.*\.py$
        pass_filenames: true

      - id: repomap-index
        name: RepoMap Index
        entry: tools/repomap/repomap.sh index
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: repomap-index-check
        name: RepoMap Index Check (pre-push)
        entry: tools/repomap/repomap.sh check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: Bandit Security Scan
        args:
          - --skip
          - B101,B311
          - -ll
        files: ^(src/|scripts/).*\.py$

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: Check Spelling
        args:
          - --skip
          - "*.lock,*.json"

  - repo: https://github.com/abravalheri/validate-pyproject
    rev: v0.23
    hooks:
      - id: validate-pyproject

  - repo: https://github.com/pappasam/toml-sort
    rev: v0.24.2
    hooks:
      - id: toml-sort-fix
        args:
          - --in-place

ci:
  autofix_commit_msg: "[pre-commit.ci] Auto-fixes from hooks"
  autoupdate_schedule: monthly
