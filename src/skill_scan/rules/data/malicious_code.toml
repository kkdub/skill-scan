# Malicious Code Detection Rules
# Category: malicious-code
# Rules EXEC-001 through EXEC-008

[rules.EXEC-001]
severity = "critical"
category = "malicious-code"
description = "Remote code execution — downloads piped directly to a shell interpreter"
recommendation = "Remove piped download-to-shell commands; use verified package managers instead"
patterns = [
  '(?i)curl\b.*\|\s*(?:ba)?sh',
  '(?i)wget\b.*\|\s*(?:ba)?sh',
  '(?i)iex\s*\(\s*Invoke-WebRequest',
  '(?i)Invoke-Expression\s*\(\s*Invoke-WebRequest',
  '(?i)curl\b.*\|\s*zsh',
  '(?i)wget\b.*\|\s*zsh'
]
exclude_patterns = [
  '(?i)do\s+not\s+run\s+curl',
  '(?i)never\s+run\s+curl\s*\|',
  '(?i)avoid\s+curl\s*\|',
  '(?i)warning.*curl\s*\|',
  '(?i)do\s+not\s+run\s+wget',
  '(?i)never\s+run\s+wget\s*\|',
  '(?i)dangerous.*curl\s*\|'
]

[rules.EXEC-002]
severity = "critical"
category = "malicious-code"
description = "Dynamic code execution — eval/exec/os.system/subprocess with shell=True"
recommendation = "Remove dynamic code execution; use safe alternatives with validated inputs"
patterns = [
  '(?i)\beval\s*\(',
  '(?i)\bexec\s*\(',
  '(?i)\bos\.system\s*\(',
  '(?i)subprocess\.[a-z]+\([^)]{0,200}shell\s*=\s*True'
]
exclude_patterns = [
  '(?i)never\s+use\s+eval\s*\(',
  '(?i)avoid\s+eval\s*\(',
  "(?i)don't\\s+use\\s+eval",
  '(?i)do\s+not\s+use\s+eval',
  '(?i)never\s+use\s+exec\s*\(',
  '(?i)avoid\s+exec\s*\(',
  "(?i)don't\\s+use\\s+exec",
  '(?i)do\s+not\s+use\s+exec',
  '(?i)anti-pattern.*\beval\b',
  '(?i)anti-pattern.*\bexec\b'
]

[rules.EXEC-003]
severity = "high"
category = "malicious-code"
description = "Obfuscated payload — base64/hex-decoded content executed via shell or interpreter"
recommendation = "Inspect and decode obfuscated payloads; remove if contents are malicious"
patterns = [
  '(?i)base64\s+(-d|--decode).*\|\s*(?:ba)?sh',
  '(?i)\|\s*base64\s+(-d|--decode).*\|\s*(?:ba)?sh',
  '(?i)powershell\b.*-enc(?:odedcommand)?',
  '(?i)exec\s*\(\s*base64\.b64decode\s*\(',
  '(?i)python\b.*-c\s*.*base64\.b64decode',
  '(?i)echo\b.*\|\s*base64\s+(-d|--decode).*\|\s*(?:ba)?sh'
]
exclude_patterns = [
  '(?i)data:image/',
  '(?i)test.*fixture',
  '(?i)base64\s+encode\s+images'
]

[rules.EXEC-004]
severity = "high"
category = "malicious-code"
description = "Persistence mechanism — scheduled tasks, startup entries, or shell profile modifications"
recommendation = "Remove persistence mechanisms; skills should not modify system startup or shell profiles"
patterns = [
  '(?i)\bcrontab\b.*-[eir]',
  '(?i)Library/LaunchAgents/',
  '(?i)Library/LaunchDaemons/',
  '(?i)\bsystemctl\s+enable\b',
  '(?i)\bsystemctl\s+daemon-reload\b',
  '(?i)>>\s*~/?\.\w*(bashrc|zshrc|profile|bash_profile)',
  '(?i)>>\s*\$HOME/\.\w*(bashrc|zshrc|profile|bash_profile)',
  '(?i)\\Start\s+Menu\\Programs\\Startup',
  '(?i)HKCU\\.*\\Run\b',
  '(?i)HKLM\\.*\\Run\b'
]
exclude_patterns = [
  '(?i)check\s+(?:your\s+)?crontab',
  '(?i)view\s+(?:your\s+)?crontab',
  '(?i)list\s+crontab',
  '(?i)cat\s+~/?\.\w*(bashrc|zshrc|profile)',
  '(?i)read\s+(?:your\s+)?\.bashrc',
  '(?i)inspect\s+(?:your\s+)?\.bashrc'
]

[rules.EXEC-005]
severity = "high"
category = "malicious-code"
description = "Suspicious binary download — executable or installer download instructions"
recommendation = "Do not download raw binaries; use verified package managers or checksummed releases"
patterns = [
  '(?i)download\b.*\.exe\b',
  '(?i)curl\b.*\.exe\b',
  '(?i)wget\b.*\.exe\b',
  '(?i)download\b.*\.dmg\b',
  '(?i)curl\b.*\.dmg\b',
  '(?i)wget\b.*\.dmg\b',
  '(?i)download\b.*\.pkg\b',
  '(?i)curl\b.*\.pkg\b',
  '(?i)wget\b.*\.pkg\b',
  '(?i)unzip\s+-P\s+\S+'
]
exclude_patterns = [
  '(?i)warning.*\.exe\b',
  '(?i)security.*\.exe\b',
  '(?i)never\s+download\b.*\.exe\b',
  '(?i)avoid\s+downloading\b.*\.exe\b',
  '(?i)do\s+not\s+download\b.*\.exe\b',
  '(?i)warning.*\.dmg\b'
]

[rules.EXEC-006]
severity = "high"
category = "malicious-code"
description = "Dynamic indirection — runtime module import or attribute lookup bypasses static analysis"
recommendation = "Use explicit imports instead of __import__, getattr, or importlib for module loading"
patterns = [
  '(?i)\b__import__\s*\(',
  '(?i)\bgetattr\s*\(\s*\w+\s*,\s*\S',
  '(?i)\bimportlib\.import_module\s*\(',
  '(?i)\bcompile\s*\([^)]{0,1024}\).{0,200}?\bexec\s*\('
]
exclude_patterns = [
  '(?i)\bavoid\s+__import__',
  '(?i)\bnever\s+use\s+getattr\s+for\b',
  '(?i)\bimportlib\s+documentation\b',
  '(?i)\banti-pattern\b'
]

[rules.EXEC-007]
severity = "critical"
category = "malicious-code"
description = "Unsafe deserialization — pickle, marshal, or unsafe YAML loading enables arbitrary code execution"
recommendation = "Use safe alternatives: json, yaml.safe_load, or validated data formats instead of pickle/marshal"
patterns = [
  '(?i)\bpickle\.loads?\s*\(',
  '(?i)\byaml\.load\s*\(',
  '(?i)\byaml\.unsafe_load\s*\(',
  '(?i)\bmarshal\.loads?\s*\(',
  '(?i)\bshelve\.open\s*\(',
  '(?i)\bdill\.loads?\s*\('
]
exclude_patterns = [
  '(?i)\byaml\.safe_load\b',
  '(?i)\byaml\.load\s*\(.{0,200}?Loader\s*=\s*SafeLoader',
  '(?i)\byaml\.load\s*\(.{0,200}?Loader\s*=\s*yaml\.SafeLoader',
  '(?i)\bavoid\s+pickle\b',
  '(?i)\bnever\s+use\s+pickle\b',
  '(?i)\bdo\s+not\s+use\s+pickle\b',
  '(?i)\banti-pattern\b'
]

[rules.EXEC-008]
severity = "high"
category = "malicious-code"
description = "PowerShell cradle or LOLBin download — uses system tools to fetch and execute remote payloads"
recommendation = "Remove download cradles and LOLBin abuse; use verified package managers for software installation"
patterns = [
  '(?i)\bIEX\b.*\bDownloadString\b',
  '(?i)\[System\.Net\.WebClient\].*\bDownloadString\b',
  '(?i)\bInvoke-RestMethod\b.*\|\s*IEX\b',
  '(?i)\bStart-BitsTransfer\b',
  '(?i)\bcertutil\b.*-urlcache\b.*-split\b.*-f\b',
  '(?i)\bmshta\s+https?://',
  '(?i)\bwscript\.shell\b'
]
exclude_patterns = [
  '(?i)\bavoid\s+IEX\b',
  '(?i)\bnever\s+use\s+IEX\b',
  '(?i)\bdo\s+not\s+use\s+IEX\b',
  '(?i)\bwarning.*\bDownloadString\b',
  '(?i)\banti-pattern\b',
  '(?i)\bdocumentation\b.*\bcertutil\b'
]

[rules.EXEC-009]
severity = "critical"
category = "malicious-code"
description = "Multi-line encoded execution — exec/eval of base64-decoded content spanning multiple lines"
recommendation = "Remove base64-encoded execution; use explicit, auditable code instead"
match_scope = "file"
flags = "IGNORECASE|DOTALL"
patterns = [
  'exec\s*\(\s*(?:compile\s*\(\s*)?base64\.b64decode\s*\(',
  'eval\s*\(\s*(?:compile\s*\(\s*)?base64\.b64decode\s*\('
]
exclude_patterns = [
  '(?i)test.*fixture',
  '(?i)example.*base64',
  '(?i)anti-pattern'
]

[rules.EXEC-010]
severity = "high"
category = "malicious-code"
description = "Dynamic code execution with strict exclusion — eval/exec calls resistant to comment-based suppression"
recommendation = "Replace eval/exec with safe alternatives; do not use comments to justify dynamic execution"
exclude_mode = "strict"
patterns = [
  '(?i)\beval\s*\([^)]*\buser',
  '(?i)\beval\s*\([^)]*\binput',
  '(?i)\bexec\s*\([^)]*\buser',
  '(?i)\bexec\s*\([^)]*\binput'
]
exclude_patterns = [
  'safe_eval',
  'safe_exec',
  'ast\.literal_eval'
]
