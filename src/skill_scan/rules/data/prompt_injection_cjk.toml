# Multilingual Prompt Injection Detection — CJK Languages
# Chinese (zh), Japanese (ja), Korean (ko)
# confidence = "beta" — patterns generated via cross-model validation, not native-speaker reviewed
# Contributions welcome: follow the pattern format in prompt_injection.toml

[rules.PI-001-ja]
severity = "critical"
category = "prompt-injection"
description = "Direct instruction override (Japanese) — attempts to ignore or override instructions"
recommendation = "Remove or reject content containing instruction override attempts"
confidence = "beta"
patterns = [
  '以前の指示を無視',
  '前の指示を無視',
  'システムプロンプトを上書き',
  'ルールを忘れて',
  '指示を無視して'
]
exclude_patterns = [
  '無視しないで',
  '無視してはいけない'
]

[rules.PI-001-ko]
severity = "critical"
category = "prompt-injection"
description = "Direct instruction override (Korean) — attempts to ignore or override instructions"
recommendation = "Remove or reject content containing instruction override attempts"
confidence = "beta"
patterns = [
  '이전 지시를 무시',
  '이전 지침을 무시',
  '시스템 프롬프트를 덮어쓰기',
  '규칙을 잊어',
  '지시를 무시해'
]
exclude_patterns = [
  '무시하지 마',
  '무시하면 안'
]

