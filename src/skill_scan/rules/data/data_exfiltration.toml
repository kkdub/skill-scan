# Data Exfiltration Detection Rules
# Category: data-exfiltration
# Rules EXFIL-001 through EXFIL-004

[rules.EXFIL-001]
severity = "critical"
category = "data-exfiltration"
description = "Silent outbound requests — covert data upload via curl, wget, or similar tools"
recommendation = "Remove or reject commands that silently POST data to external servers"
patterns = [
  "(?i)curl\\s+.*-s.*-d\\s+@",
  "(?i)curl\\s+.*-s.*--data",
  "(?i)curl\\s+-s\\S*\\s+.*-X\\s+POST",
  "(?i)curl\\s+.*--data-binary\\s+@",
  "(?i)wget\\s+.*--post-file[=\\s]"
]
exclude_patterns = [
  "(?i)^\\s*#\\s.*curl\\s+-s",
  "(?i)use\\s+curl\\s+-s\\s+for\\b",
  "(?i)the\\s+curl\\s+-s\\s+flag\\b",
  "(?i)documentation.*curl"
]

[rules.EXFIL-002]
severity = "high"
category = "data-exfiltration"
description = "Sensitive path access — reading private keys, credentials, or browser data"
recommendation = "Remove or reject direct access to sensitive credential and key files"
patterns = [
  "~/\\.ssh/",
  "~/\\.aws/",
  "~/\\.gnupg/",
  "/etc/shadow",
  "(?i)\\.env\\b",
  "(?i)Login\\s+Data",
  "(?i)cookies\\.sqlite",
  "Chrome/Default/",
  "Firefox/Profiles/"
]
exclude_patterns = [
  "(?i)protect\\s+your\\s+~/\\.",
  "(?i)secure\\s+your\\s+~/\\.",
  "(?i)never\\s+share\\s+your\\s+~/\\.",
  "(?i)back\\s+up\\s+your\\s+~/\\.",
  "(?i)ensure\\s+your\\s+~/\\.",
  "(?i)warning.*~/\\.",
  "(?i)do\\s+not\\s+expose\\s+~/\\."
]

[rules.EXFIL-003]
severity = "high"
category = "data-exfiltration"
description = "Webhook/C2 patterns — data exfiltration via webhook endpoints or callback URLs"
recommendation = "Remove or reject hard-coded webhook URLs and phone-home patterns"
patterns = [
  "(?i)discord\\.com/api/webhooks/",
  "(?i)hooks\\.slack\\.com/services/",
  "(?i)callback_url",
  "(?i)phone_home",
  "(?i)beacon_url",
  "(?i)c2_server",
  "(?i)exfil_url"
]
exclude_patterns = [
  "(?i)documentation.*webhook",
  "(?i)webhook\\s+security\\b",
  "(?i)how\\s+to\\s+set\\s+up\\s+.*webhook",
  "(?i)guide.*webhook",
  "(?i)configuring\\s+.*webhook"
]

[rules.EXFIL-004]
severity = "high"
category = "data-exfiltration"
description = "Environment harvesting — bulk access to environment variables"
recommendation = "Use targeted environment variable access (e.g. os.environ.get('KEY')) instead of bulk reads"
patterns = [
  "(?i)\\bdict\\s*\\(\\s*os\\.environ\\s*\\)",
  "(?i)\\bos\\.environ\\b(?!\\.get\\b)(?!\\[)",
  "(?i)\\bprintenv\\b",
  "(?i)process\\.env\\b(?!\\.)(?!\\[)",
  "(?i)\\benv\\s*\\|\\s*grep\\b"
]
# Defense-in-depth: main patterns use position-level negative lookaheads,
# but exclude_patterns operate at line level — if a line shows safe targeted
# access (e.g. os.environ.get('KEY') alongside bare os.environ), skip the
# entire rule for that line to reduce false positives.
exclude_patterns = [
  "(?i)os\\.environ\\.get\\s*\\(",
  "(?i)os\\.environ\\[\\s*['\"]\\w+['\"]\\s*\\]",
  "(?i)process\\.env\\.\\w+",
  "(?i)process\\.env\\[\\s*['\"]\\w+"
]

[rules.EXFIL-005]
severity = "high"
category = "data-exfiltration"
description = "Python HTTP client exfiltration — data sent via requests, httpx, urllib, or aiohttp"
recommendation = "Remove or audit outbound HTTP POST/PUT calls that may exfiltrate data"
patterns = [
  "(?i)\\brequests\\.(?:post|put)\\s*\\(",
  "(?i)\\bhttpx\\.(?:post|put)\\s*\\(",
  "(?i)\\burllib\\.request\\.urlopen\\s*\\(.*\\bdata\\s*=",
  "(?i)\\bhttp\\.client\\.HTTPS?Connection\\b",
  "(?i)\\baiohttp\\.ClientSession\\s*\\(\\s*\\)\\s*\\.post\\s*\\("
]
exclude_patterns = [
  "(?i)\\brequests\\.get\\s*\\(",
  "(?i)\\bmock[._].*\\brequests\\.",
  "(?i)\\bpatch\\b.*\\brequests\\.",
  "(?i)^\\s*#\\s.*\\brequests\\.(?:post|put)",
  "(?i)\\brequests\\.post\\s*\\(.*\\btest\\b",
  "(?i)\\bresponse\\s*=\\s*requests\\.get\\b"
]

[rules.EXFIL-006]
severity = "high"
category = "data-exfiltration"
description = "Raw socket and DNS exfiltration — data sent via low-level sockets or DNS queries"
recommendation = "Remove or audit raw socket connections and DNS-based data exfiltration"
patterns = [
  "(?i)\\bsocket\\.connect\\s*\\(",
  "(?i)\\bsocket\\.send(?:to|all)?\\s*\\(",
  "(?i)\\bdns\\.resolver\\b",
  "(?i)\\bgetaddrinfo\\s*\\(.*\\+",
  "(?i)\\bsubprocess\\b.*\\bnslookup\\b",
  "(?i)\\bsubprocess\\b.*\\bdig\\b"
]
exclude_patterns = [
  "(?i)\\bsocket\\.(?:listen|accept|bind)\\s*\\(",
  "(?i)\\blocalhost\\b",
  "(?i)\\b127\\.0\\.0\\.1\\b",
  "(?i)^\\s*#\\s.*\\bsocket\\.",
  "(?i)\\beducational\\b.*\\bsocket\\b"
]

[rules.EXFIL-007]
severity = "medium"
category = "data-exfiltration"
description = "Mail and messaging exfiltration — data sent via SMTP, SES, or WebSocket"
recommendation = "Audit email sending and WebSocket connections for unauthorized data transmission"
patterns = [
  "(?i)\\bsmtplib\\.SMTP\\s*\\(",
  "(?i)\\bsmtplib\\.SMTP_SSL\\s*\\(",
  "(?i)\\bemail\\.mime\\b.*\\bsendmail\\b",
  "(?i)\\bboto3\\b.*\\bses\\b.*\\bsend",
  "(?i)\\bwebsocket\\.send\\s*\\(",
  "(?i)\\bws\\.send\\s*\\("
]
exclude_patterns = [
  "(?i)^\\s*#\\s.*\\bsmtplib\\b",
  "(?i)\\bnotification\\b.*\\bsmtp\\b",
  "(?i)\\balert\\b.*\\bsmtp\\b",
  "(?i)\\bsmtp\\b.*\\blocalhost\\b",
  "(?i)\\bsmtp\\b.*\\b127\\.0\\.0\\.1\\b"
]
