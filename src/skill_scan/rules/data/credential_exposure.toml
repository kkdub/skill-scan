# Credential Exposure Detection Rules
# Category: credential-exposure
# Rules CRED-001 through CRED-003

[rules.CRED-001]
severity = "critical"
category = "credential-exposure"
description = "Hardcoded secrets — API keys, tokens, or private keys embedded directly in source"
recommendation = "Remove hardcoded secrets and use environment variables or a secrets manager instead"
patterns = [
  'AKIA[0-9A-Za-z]{16}',
  'ghp_[0-9A-Za-z]{36,}',
  'sk-[0-9A-Za-z]{20,}',
  'xox[bpa]-[0-9A-Za-z\-]+',
  'AIza[0-9A-Za-z\-_]{35}',
  '-----BEGIN\s.*PRIVATE\sKEY-----',
  'eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'
]
exclude_patterns = [
  'AKIA[\[\({<][A-Z_\s]+[\]\)}>]',
  'AKIA[Xx]{10,}',
  '(?i)sk-[x.]{5,}',
  '(?i)sk-\.{3,}',
  'ghp_[a-zA-Z]{1,35}$',
  '(?i)\{\{[A-Z_]*(?:API_?KEY|TOKEN|SECRET)[A-Z_]*\}\}',
  '(?i)<YOUR[_\s](?:KEY|TOKEN|SECRET)[^>]*>',
  'AIza[Ss]y[A-Z]{32,}',
  'AIza[Xx]{32,}'
]

[rules.CRED-002]
severity = "high"
category = "credential-exposure"
description = "Credentials in LLM context — instructions to pass secrets through conversation"
recommendation = "Never instruct users to share credentials via chat; use secure credential stores"
patterns = [
  '(?i)(?:paste|share|send|enter|type|provide|give)\s+(?:your\s+)?(?:API\s*key|token|password|secret|credential)s?\s+(?:in\s+(?:the\s+)?(?:chat|conversation|message|next\s+message)|here|with\s+(?:the\s+)?(?:assistant|bot|agent))',
  '(?i)(?:paste|share|send|enter|type|provide|give)\s+(?:your\s+)?(?:API\s*key|token|password|secret|credential)s?\s+(?:to\s+(?:the\s+)?(?:assistant|bot|agent))'
]
exclude_patterns = [
  '(?i)(?:never|do\s+not|don.t|should\s+not|avoid|warning|caution)\s+(?:share|paste|send|enter|provide)\s+(?:your\s+)?(?:API\s*key|token|password|secret|credential)',
  '(?i)(?:never|do\s+not|don.t)\s+.*(?:API\s*key|token|password|secret|credential).*(?:in\s+(?:the\s+)?(?:chat|conversation|message))'
]

[rules.CRED-003]
severity = "high"
category = "credential-exposure"
description = "Plaintext password patterns — credentials assigned as string literals in code"
recommendation = "Use environment variables or secrets manager; never hardcode credentials"
patterns = [
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*['\"][^'\"\\s$<{][^'\"]{2,}['\"]"
]
exclude_patterns = [
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*['\"](?:changeme|change_me|password|example|test|placeholder|dummy|fake|sample|demo|default)['\"]",
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*os\\.environ",
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*['\"]<[^>]+>['\"]",
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*['\"]\\$\\{[^}]+\\}['\"]",
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*['\"]['\"]",
  "(?i)(?:password|passwd|secret|api_?key|token)\\s*=\\s*['\"](?:\\.{3}|[xX]{3,})['\"]"
]
