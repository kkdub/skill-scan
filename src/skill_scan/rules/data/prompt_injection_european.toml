  'anula\s+el\s+prompt\s+del\s+sistema',
  'olvida\s+tus\s+reglas',
  'ignora\s+tu\s+programaci[oó]n'
]
exclude_patterns = [
  '(?i)no\s+ignores\s+las\s+instrucciones',
