# Multilingual Prompt Injection Detection — European Languages
# Spanish (es), German (de), French (fr)
# confidence = "beta" — patterns generated via cross-model validation, not native-speaker reviewed
# Contributions welcome: follow the pattern format in prompt_injection.toml

[rules.PI-001-de]
severity = "critical"
category = "prompt-injection"
description = "Direct instruction override (German) — attempts to ignore or override instructions"
recommendation = "Remove or reject content containing instruction override attempts"
confidence = "beta"
flags = "IGNORECASE"
patterns = [
  'ignoriere\s+vorherige\s+Anweisungen',
  'ignoriere\s+alle\s+Anweisungen',
  '[uü]berschreibe\s+den\s+Systemprompt',
  'vergiss\s+deine\s+Regeln',
  'missachte\s+deine\s+Anweisungen'
]
exclude_patterns = [
  '(?i)ignoriere\s+nicht',
  '(?i)niemals\s+ignoriere'
]

