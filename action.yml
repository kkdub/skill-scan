name: 'skill-scan'
description: 'Security scanner for agent skills — detect prompt injection, malicious code, and data exfiltration'
author: 'skill-scan'

inputs:
  path:
    description: 'Path to the skill directory to scan (local)'
    required: false
    default: '.'
  repo:
    description: 'GitHub repository to scan (owner/repo or owner/repo@ref)'
    required: false
    default: ''
  fail-on:
    description: 'Exit with code 2 if any finding at or above this severity (critical, high, medium, low, info)'
    required: false
    default: ''
  format:
    description: 'Output format: text, json, or sarif'
    required: false
    default: 'text'
  config:
    description: 'Path to skill-scan config file'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@a2a8b00df0aa22a77a33ee5f956c2128661fabeb  # v7

    - name: Set up Python
      shell: bash
      run: uv python install 3.13

    - name: Install skill-scan
      shell: bash
      run: uv tool install skill-scan

    - name: Run skill-scan (path mode)
      if: inputs.repo == ''
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_CONFIG: ${{ inputs.config }}
      run: |
        ARGS=("$INPUT_PATH")
        if [ -n "$INPUT_FAIL_ON" ]; then
          ARGS+=(--fail-on "$INPUT_FAIL_ON")
        fi
        if [ -n "$INPUT_FORMAT" ] && [ "$INPUT_FORMAT" != "text" ]; then
          ARGS+=(--format "$INPUT_FORMAT")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_FORMAT" = "sarif" ]; then
          uv tool run skill-scan scan "${ARGS[@]}" > skill-scan-results.sarif
        else
          uv tool run skill-scan scan "${ARGS[@]}"
        fi

    - name: Run skill-scan (repo mode)
      if: inputs.repo != ''
      shell: bash
      env:
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_CONFIG: ${{ inputs.config }}
      run: |
        ARGS=(--repo "$INPUT_REPO")
        if [ -n "$INPUT_FAIL_ON" ]; then
          ARGS+=(--fail-on "$INPUT_FAIL_ON")
        fi
        if [ -n "$INPUT_FORMAT" ] && [ "$INPUT_FORMAT" != "text" ]; then
          ARGS+=(--format "$INPUT_FORMAT")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_FORMAT" = "sarif" ]; then
          uv tool run skill-scan scan "${ARGS[@]}" > skill-scan-results.sarif
        else
          uv tool run skill-scan scan "${ARGS[@]}"
        fi

    - name: Upload SARIF results
      if: inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: skill-scan-results.sarif
      continue-on-error: true
