id: "PLAN-001"
title: "Skill Audit MVP — Core scanner with prompt injection detection"
type: implementation
status: Approved
created: 2026-02-15
priority: high

linked_spec: ".agents/plans/001/SPEC-001-skill-audit.md"

description: |
  MVP implementation of skill-scan: a security scanner for AI agent skills.
  Covers R0 (schema validation via own parser), R1 (Python API), R3 (prompt
  injection detection — 6 rules), and R9 (text reporting). Uses full layered
  architecture with TOML-based rule definitions, exclusion patterns for false
  positive reduction, and a SkillFetcher protocol for future remote scanning.

  Architecture: Full layered with pure decision/I/O separation.
    - models.py: Frozen dataclasses, enums (pure data)
    - verdict.py: Pure verdict calculation (no I/O)
    - rules/loader.py: TOML → compiled Rule objects
    - rules/engine.py: Line-by-line pattern matching (pure)
    - parser.py: SKILL.md frontmatter parser (stdlib only)
    - scanner.py: Scan orchestration (I/O boundary)
    - config.py: Configuration loading
    - formatters.py: Text/JSON output formatting
    - _fetchers.py: SkillFetcher protocol + LocalFetcher
    - cli.py: Click CLI entry point

