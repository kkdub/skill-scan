# Skeleton opt-out: brownfield single-layer changes (3 independent fixes to existing modules)

parts:
  - id: a
    title: "NFKC normalization in normalize_text()"
    status: Done
    requirements_covered: [R003, R-EFF001]
    approach:
      - step: "Add unicodedata.normalize('NFKC', text) as first step in normalize_text()"
        files: [src/skill_scan/normalizer.py]
        notes: "NFKC must run before strip_zero_width and canonicalize_whitespace so that fullwidth chars are decomposed before other normalization. Import unicodedata at module top."
      - step: "Add tests for NFKC normalization"
        files: [tests/unit/test_normalizer.py]
        notes: "Test fullwidth Latin (U+FF41-FF5A), fullwidth digits, CJK compatibility chars. Verify normalize_text('\\uff45\\uff56\\uff41\\uff4c') == 'eval'."
    criteria:
      - "unicodedata.normalize('NFKC', ...) is applied in normalize_text() before other transformations"
      - "Fullwidth 'eval' (U+FF45 U+FF56 U+FF41 U+FF4C) normalizes to ASCII 'eval'"
      - "Existing normalizer and performance tests still pass (no regression)"
      - "Red-team input corpus/red-team/2026-03-17-full/pi-evasion/docs/fullwidth.md produces findings when scanned"

  - id: b
    title: "Multi-target assignment tracking in symbol table"
    status: Done
    requirements_covered: [R002, R-EFF001]
    approach:
      - step: "Change _handle_assign to iterate all targets instead of early-returning on len(targets) != 1"
        files: [src/skill_scan/_ast_symbol_table_helpers.py]
        notes: "Currently gates on len(stmt.targets) != 1 and returns. Fix: wrap the existing single-target logic in a for loop over stmt.targets. Each target gets the same value resolution."
      - step: "Add tests for multi-target assignment and update existing test expectations"
        files: [tests/unit/test_ast_symbol_table.py, tests/unit/test_ast_symbol_table_helpers.py]
        notes: "Test a = b = 'eval' produces both 'a' and 'b' in symbol table with value 'eval'. Test a = b = c = 'os' for 3+ targets. Update test_multiple_targets_skipped in both test files — old tests assert empty table, new behavior should populate all targets."
    criteria:
      - "_handle_assign processes all targets in stmt.targets, not just the first"
      - "a = b = 'eval' results in both 'a' and 'b' tracked in the symbol table"
      - "Single-target assignments still work (no regression)"
      - "Existing test_multiple_targets_skipped tests updated to expect new behavior"
      - "Red-team input corpus/red-team/2026-03-17-full/split-kwargs-evasion/split_multi_assign.py produces findings when scanned"

  - id: c
    title: "String case method resolver for split-evasion detector"
    status: Done
    requirements_covered: [R001, R-EFF001]
    approach:
      - step: "Add _is_case_method predicate and _resolve_case_method_chain resolver"
        files: [src/skill_scan/_ast_split_resolve.py]
        notes: "Follow the existing _is_replace_call / _resolve_replace_chain pattern. Support .lower(), .upper(), .title(), .swapcase(), .capitalize(), .casefold(). Resolve base via resolve_expr or string constant, then apply the Python method."
      - step: "Register new resolver in _RESOLVERS tuple"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: "Add (_is_case_method, _resolve_case_method_chain) entry to _RESOLVERS. Place before _is_call to match first."
      - step: "Add tests for string case method resolution"
        files: [tests/unit/test_ast_split_detector.py]
        notes: "Test 'EVAL'.lower(), 'eval'.upper(), tracked_var.lower(), chained 'EVAL'.lower().upper(), 'EVAL'.casefold(). Verify detection of exec('EVAL'.lower())."
    criteria:
      - "_is_case_method matches .lower(), .upper(), .title(), .swapcase(), .capitalize(), .casefold() calls with no args"
      - "_resolve_case_method_chain resolves string constant base through case method"
      - "_resolve_case_method_chain resolves tracked variable base through case method"
      - "Chained case methods resolve correctly (e.g., 'EVAL'.lower().upper())"
      - "New resolver is registered in _RESOLVERS tuple before _is_call"
      - "Red-team input corpus/red-team/2026-03-17-full/exec-evasion/string_method_evasion.py produces findings when scanned"

