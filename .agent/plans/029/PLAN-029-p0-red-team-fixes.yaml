id: "PLAN-029"
title: "P0 red-team fixes: NFKC normalization, multi-target assignment, string case methods"
type: implementation
status: Done
created: 2026-03-17

linked_spec: "corpus/red-team/2026-03-17-full/report.md"

description: |
  Fix the three P0 (trivial bypass) evasion vectors surfaced by the 2026-03-17 full
  scanner red-team. These are the lowest-hanging fruit — each is a complete detection
  bypass achievable with basic Python, and each fix is under 20 lines.

  1. NFKC normalization: Fullwidth Unicode characters (U+FF41-FF5A) pass through
     normalize_text() undecomposed, evading all content rules.
  2. Multi-target assignment: `a = b = 'eval'` silently dropped by _handle_assign
     because it gates on len(targets)==1.
  3. String case methods: `'EVAL'.lower()` completely evades the split-evasion
     detector because only .replace() is tracked among string methods.

requirements:
  file: null
  ids:
    - R001  # str.lower(), .upper(), .title(), .swapcase(), .capitalize(), .casefold() on string constant or tracked variable must resolve in split-evasion detector
    - R002  # Multi-target assignments (a = b = 'eval') must track all targets in symbol table
    - R003  # normalize_text() must apply NFKC normalization for fullwidth Unicode decomposition
    - R-EFF001  # Red-team corpus inputs that triggered these evasions must produce findings when scanned
  uncovered: []

