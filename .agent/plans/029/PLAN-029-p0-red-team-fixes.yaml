      found: "Line 78: if len(stmt.targets) != 1: return — this is the bug"
    - query: "grep '_RESOLVERS' src/skill_scan/_ast_split_detector.py"
      found: "Line 51: _RESOLVERS tuple with 5 entries — new resolver registers here"

