      - "scanner.py continues to file collection and rule scanning after schema failure"
      - "cli.py has validate subcommand that runs only schema validation"
      - "cli.py scan has --strict-schema flag"
      - "ScanConfig no longer has skip_schema_validation field"
      - "ScanResult may include skill_name field (from frontmatter or directory)"
      - "Exit code 3 no longer returned from scan subcommand"
      - "All existing tests updated for new behavior"
      - "Files under 250 lines"

