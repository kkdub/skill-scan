      - "src/skill_scan/scanner.py"
      - "tests/unit/test_formatters.py"
      - "tests/unit/test_scanner.py"
    criteria:
      - "formatters.py uses only ASCII characters (-> instead of U+2192)"
      - "Finding file paths always use forward slashes on all platforms"
      - "Files skipped for encoding errors emit info-level FS-001 finding"
      - "All tests pass on Windows (manual verification)"
      - "Files under 250 lines"

  - id: b
