id: "PLAN-002"
title: "MVP Hardening — cross-platform, rule tuning, output redesign, i18n"
type: implementation
status: Done
created: 2026-02-15
priority: high

linked_specs:
  - ".agent/plans/002/SPEC-002a-decouple-frontmatter.md"
  - ".agent/plans/002/SPEC-002b-cross-platform.md"
  - ".agent/plans/002/SPEC-002c-rule-tuning.md"
  - ".agent/plans/002/SPEC-002d-output-dedup.md"
  - ".agent/plans/002/SPEC-002e-output-format.md"
  - ".agent/plans/002/SPEC-002f-i18n-detection.md"

description: |
  Improvements to the PLAN-001 MVP based on real-world testing against 34
  community skills. Addresses six areas discovered during testing:

  1. Frontmatter validation blocks security scanning (56% of skills unscannable)
  2. Windows encoding crash and path separator inconsistencies
  3. High false-positive rates in PI-004, PI-005, PI-006
  4. Unusable output when rules produce thousands of findings
  5. Output format lacks structure for growing rule sets
  6. Detection rules are English-only (blind to multilingual attacks)

  These are hardening improvements to existing MVP features. No new rule
  categories (R4-R7) are added — those are for PLAN-003+.

requirements:
  extraction_status: done
  extracted_at: 2026-02-15
  spec_hash: null
  items:
    - id: R-decouple
      description: "Decouple frontmatter validation from security scanning pipeline"
      status: done
      spec_ref: "SPEC-002a F1-F4"
      notes: "Schema issues become info findings, not hard stops. Add validate subcommand."

    - id: R-xplat
      description: "Cross-platform compatibility (Windows encoding, path separators)"
      status: done
      spec_ref: "SPEC-002b CP1-CP3"
      notes: "ASCII output, forward-slash paths, encoding skip reporting. CP4 (Windows CI) deferred — infrastructure decision."

    - id: R-rules
      description: "Tune PI-004, PI-005, PI-006 to reduce false positives"
      status: done
      spec_ref: "SPEC-002c RT1-RT4"
      notes: "Context-aware Unicode, semantic HTML filtering, hex exclusions."

    - id: R-dedup
      description: "Group and deduplicate repeated findings in text output"
      status: done
      spec_ref: "SPEC-002d OD1-OD5"
      notes: "Formatter-only change. Show count + samples, not N identical blocks."

    - id: R-output
      description: "Redesign text output with severity sections, header, verdict banner"
      status: done
      spec_ref: "SPEC-002e OF1-OF7"
      notes: "Structured report, quiet mode, verbose mode."

    - id: R-i18n
      description: "Multilingual prompt injection detection (8 languages + homoglyphs)"
      status: done
      spec_ref: "SPEC-002f I18N1-I18N6"
      notes: "Keyword patterns for CJK, European, Arabic. Script-mixing detection."

  uncovered: []

utilities_audit:
  status: done
  search_performed:
    - "Tested against 34 real-world skills from split-docs/downloaded_skills"
    - "Identified false positive patterns in PI-004 (7295 hits), PI-005 (21), PI-006 (1)"
