      - "PI-004a still flags directional overrides unconditionally"
      - "PI-005 excludes standard HTML section/template comments"
      - "PI-005 still detects comments with instruction-like keywords"
      - "PI-006 excludes BOM sequences and test-file hex escapes"
      - "PI-006 tightens base64 threshold to 200+ chars"
      - "All existing positive detection tests still pass"
