id: "PLAN-023"
title: "Advanced evasion detection — Tier 1 (high-impact string resolution & dynamic dispatch)"
type: implementation
status: Approved
created: 2026-03-13

linked_spec: null

description: |
  First half of DEBT-018-T4-ADVANCED. Adds detection for 6 high-impact evasion
  techniques not yet handled by the AST-based split-evasion detector:

  1. Implicit string concatenation — 'ev' 'al' (verify existing behavior)
  2. String slicing — 'xxevalxx'[2:6]
  3. String reversal — ''.join(reversed('lave'))
  4. chr(ord()) nesting — chr(ord('e')) + chr(ord('v')) + ...
  5. Bytes/bytearray/str/codecs constructors — bytearray(b'eval').decode()
  6. Dynamic dispatch — globals()['eval'], vars()['system'], __dict__['eval']

  All techniques reconstruct dangerous names (eval, exec, system, popen,
  __import__, getattr) and must emit EXEC-002 or EXEC-006 findings.

  Remaining Tier 2 techniques (replace chains, lambda/reduce, operator module,
  decorator position, comprehension assembly, star-args) deferred to PLAN-024.

