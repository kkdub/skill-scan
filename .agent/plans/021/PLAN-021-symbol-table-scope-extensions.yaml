id: "PLAN-021"
title: "Symbol table scope extensions: list-index, global/nonlocal, class-scope"
type: implementation
status: Complete
created: 2026-03-13

linked_spec: null

description: |
  Extend the symbol table builder (build_symbol_table) to track three
  currently-unhandled scope patterns, closing 7 known evasion techniques
  from PLAN-018 red-team debt (Tiers 2-3).

  Debt items resolved:
    - DEBT-018-T2-LIST-INDEX: list index subscript assignments (parts[0]='ev')
    - DEBT-018-T3-GLOBAL-NONLOCAL: global/nonlocal keyword scope modifiers
    - DEBT-018-T3-CLASS-SCOPE: class-level attribute assignments (self.x)

  No backwards compatibility constraint. Key format conventions can change freely.

