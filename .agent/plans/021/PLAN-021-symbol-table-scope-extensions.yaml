# ─────────────────────────────────────────────────────────────────────────────
# PARTS
# ─────────────────────────────────────────────────────────────────────────────
# Skeleton: skip (brownfield single-layer, all changes extend existing modules)
#
# Dependency graph:
#   a           (list-index: symbol table + detector, independent)
#   b           (global/nonlocal: symbol table, independent)
#   c ──► d     (class-scope: symbol table → detector, verify_group: class-scope)
#
# Parts a and b are independent of each other and of c/d.
# Parts c and d are tightly coupled (d consumes c's symbol table entries).

parts:

  - id: a
    title: "List-index composite keys in symbol table and split detector"
    status: Done
    depends_on: []
    requirements_covered: [R001, R002, R009, R-IMP001, R-IMP002, R-EFF001, R-EFF002]
    approach:
      - step: "Extend _handle_subscript_assign to accept integer-constant slice indices"
        files:
          - src/skill_scan/_ast_symbol_table_helpers.py
        notes: >
          Add elif branch after existing str check: if isinstance(slice.value, int)
          and int >= 0, store as 'varname[N]'. Same bracket convention as string
          keys. Collision between int 0 and string '0' is documented edge case.
      - step: "Extend _resolve_subscript_lookup and _resolve_subscript_expr for integer slices"
        files:
          - src/skill_scan/_ast_split_detector.py
          - src/skill_scan/_ast_split_helpers.py
        notes: >
          Both functions gate on isinstance(node.slice.value, str). Add
          'or isinstance(node.slice.value, int)' branch constructing same
          'varname[N]' key format. ~5 lines each.
      - step: "Create evasion fixtures and tests"
        files:
          - tests/fixtures/split_evasion/pos_list_index_concat.py
          - tests/fixtures/split_evasion/pos_list_index_mutate.py
          - tests/unit/test_ast_symbol_table_edge.py
          - tests/unit/test_ast_split_detector_join.py
        notes: >
          pos_list_index_concat.py: parts=['ev','al']; eval(parts[0]+parts[1]).
          pos_list_index_mutate.py: items[0]='ex'; items[1]='ec'; exec(items[0]+items[1]).
          Symbol table tests in test_ast_symbol_table_edge.py (66 headroom).
          Detector tests in test_ast_split_detector_join.py (85 headroom).
    criteria:
      - "_handle_subscript_assign stores 'varname[0]' for integer-constant subscript assignments"
      - "Existing string-key dict subscript tracking unchanged (no regression)"
      - "_resolve_subscript_lookup resolves integer-constant subscript reads to composite key values"
      - "_resolve_subscript_expr resolves integer subscripts in format/percent-format contexts"
      - "pos_list_index_concat.py triggers EXEC-002"
      - "pos_list_index_mutate.py triggers EXEC-002"
      - "make check passes"

  - id: b
    title: "Global and nonlocal declaration handling in symbol table"
    status: Done
    depends_on: []
    requirements_covered: [R003, R004, R005, R006, R-IMP006, R-IMP007, R-EFF003, R-EFF004]
    approach:
      - step: "Add _collect_scope_declarations helper"
        files:
          - src/skill_scan/_ast_symbol_table_helpers.py
        notes: >
          New function _collect_scope_declarations(body) -> tuple[set[str], set[str]]
          that walks a function body collecting ast.Global.names and ast.Nonlocal.names.
          Only walk the immediate body (no recursion into nested functions). ~10-15 lines.
      - step: "Add global/nonlocal routing in build_symbol_table function body processing"
        files:
          - src/skill_scan/_ast_symbol_table.py
        notes: >
          In the FunctionDef loop (~line 47): before calling _collect_assignments on
          node.body, call _collect_scope_declarations to get global_names and
          nonlocal_names sets. After _collect_assignments + _resolve_indirections for
          the function scope, route global-declared writes back to module_scope
          (last-write-wins) and remove the function-prefixed key. For nonlocal,
          route writes to enclosing function scope (requires tracking parent scope name).
          _ast_symbol_table.py has 174 lines headroom. ~20 lines addition.
      - step: "Create evasion fixtures and tests"
        files:
          - tests/fixtures/split_evasion/pos_global_overwrite.py
          - tests/fixtures/split_evasion/pos_nonlocal_overwrite.py
          - tests/unit/test_ast_symbol_table_edge.py
        notes: >
          pos_global_overwrite.py: x='eval'; def f(): global x; x='exec'; f(); exec(x).
          pos_nonlocal_overwrite.py: def outer(): x='eval'; def inner(): nonlocal x; x='exec'.
          Tests in test_ast_symbol_table_edge.py. If headroom tight after part a,
          overflow to new test_ast_symbol_table_scope.py.
    criteria:
      - "build_symbol_table collects ast.Global declarations and routes writes to module scope"
      - "build_symbol_table collects ast.Nonlocal declarations and routes writes to enclosing function scope"
      - "Global writes use last-write-wins (no stale function-prefixed key remains)"
      - "Nonlocal writes update enclosing function scope, not module scope"
      - "Declarations scoped per function -- no cross-function contamination"
      - "pos_global_overwrite.py triggers a finding"
      - "pos_nonlocal_overwrite.py triggers a finding"
      - "make check passes"

  - id: c
    title: "Class-scope symbol table: ClassDef walking and attribute storage"
    status: Done
    depends_on: []
    verify_group: class-scope
    requirements_covered: [R007, R008, R-IMP003, R-IMP004, R-IMP008, R-EFF006]
    approach:
      - step: "Add ClassDef branch to build_symbol_table"
        files:
          - src/skill_scan/_ast_symbol_table.py
        notes: >
          In loop over tree.body (~line 47), add isinstance(node, ast.ClassDef).
          Walk class body: (1) collect class-level assignments with _collect_assignments,
          prefix results as 'ClassName.attr'; (2) recurse into method bodies
          (FunctionDef/AsyncFunctionDef), detect self.attr = val pattern where self is
          the first parameter, store as 'ClassName.attr'. ~25 lines addition.
      - step: "Add _handle_self_attr_assign helper"
        files:
          - src/skill_scan/_ast_symbol_table_helpers.py
        notes: >
          New function _handle_self_attr_assign(stmt, table, self_name, class_name)
          that handles ast.Attribute targets where value is Name matching self_name.
          Stores as 'ClassName.attr_name'. ~15-20 lines. If helpers file exceeds
          headroom, extract to new _ast_symbol_table_class_helpers.py.
      - step: "Update _build_scope_map to walk ClassDef bodies"
        files:
          - src/skill_scan/_ast_split_detector.py
        notes: >
          _build_scope_map (~line 57) currently only walks top-level FunctionDef.
          Add ClassDef walking: for each ClassDef, walk its methods, mapping nodes
          to scope. ~10-15 lines addition.
      - step: "Create fixtures and tests for class-level attributes"
        files:
          - tests/fixtures/split_evasion/pos_class_level_attr.py
          - tests/unit/test_ast_symbol_table_edge.py
        notes: >
          pos_class_level_attr.py: class E: payload='eval'; def run(self): eval(self.payload).
          Tests verify 'ClassName.attr' key appears in symbol table.
    criteria:
      - "build_symbol_table walks ast.ClassDef bodies and stores class-level attributes as 'ClassName.attr'"
      - "Self-attribute writes (self.x = 'val') inside methods stored as 'ClassName.x'"
      - "Writes from different methods of same class resolve to same 'ClassName.x' key"
      - "_build_scope_map maps class method body nodes to correct scope"
      - "No exception on nested classes or nested functions inside class methods"
      - "pos_class_level_attr.py triggers EXEC-002"

  - id: d
    title: "Class-scope split detector: self.attr resolution and cross-method evasion"
    status: Done
    depends_on: [c]
    verify_group: class-scope
    requirements_covered: [R010, R-IMP005, R-EFF005, R-EFF007, R-ADV001]
    approach:
      - step: "Add ast.Attribute resolution to _resolve_operand and _resolve_formatted_value"
        files:
          - src/skill_scan/_ast_split_detector.py
        notes: >
          In _resolve_operand (~line 108) and _resolve_formatted_value (~line 150),
          add handling for ast.Attribute: when node is ast.Attribute with Name value,
          construct 'Name.attr' and do _scoped_lookup. For self.attr inside class
          methods, the key 'ClassName.attr' is at module level so _scoped_lookup's
          fallback finds it. If detector exceeds headroom, extract helper to
          _ast_split_helpers.py.
      - step: "Add ast.Attribute resolution to _resolve_expr_list"
        files:
          - src/skill_scan/_ast_split_helpers.py
        notes: >
          _resolve_expr_list (~line 64) handles Name, Constant, Subscript. Add
          Attribute branch: isinstance(expr, ast.Attribute) and isinstance(expr.value, ast.Name),
          construct 'value.attr' key and look up via _scoped_lookup. ~5 lines.
      - step: "Create cross-method evasion fixtures and integration tests"
        files:
          - tests/fixtures/split_evasion/pos_class_self_attr.py
          - tests/fixtures/split_evasion/pos_class_cross_method.py
          - tests/unit/test_ast_split_detector_join.py
        notes: >
          pos_class_self_attr.py: class with self.cmd='eval'; eval(self.cmd).
          pos_class_cross_method.py: self.x='ev' in one method, self.y='al' in
          another, eval(self.x+self.y) in a third.
    criteria:
      - "_resolve_operand handles ast.Attribute nodes (self.x -> ClassName.x lookup)"
      - "_resolve_formatted_value handles ast.Attribute in f-strings"
      - "_resolve_expr_list handles ast.Attribute in format/percent-format args"
      - "pos_class_self_attr.py triggers EXEC-002"
      - "pos_class_cross_method.py triggers EXEC-002"
      - "All 7 new evasion corpus fixtures detected with zero misses"

