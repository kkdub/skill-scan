plan: PLAN-017
generated_at: "2026-03-10"

requirements:
  # ──────────────────────────────────────────────────────────────
  # ROT13 Detection (AST-based)
  # ──────────────────────────────────────────────────────────────

  - id: R001
    requirement: "Detect codecs.encode() and codecs.decode() calls with 'rot_13' or 'rot13' as the codec argument via AST analysis."
    category: functional
    source: user-provided
    contract:
      given: "A Python source file containing codecs.encode(text, 'rot_13') or codecs.decode(text, 'rot13') (or variants)"
      when: "analyze_python() is called on that source"
      then: "An OBFS-001 finding with severity HIGH is returned"
    acceptance:
      - "analyze_python() returns OBFS-001 for codecs.encode(x, 'rot_13')"
      - "analyze_python() returns OBFS-001 for codecs.encode(x, 'rot13')"
      - "analyze_python() returns OBFS-001 for codecs.decode(x, 'rot_13')"
      - "analyze_python() returns OBFS-001 for codecs.decode(x, 'rot13')"
    verify: test::tests/unit/test_ast_rot13.py
    status: done

  - id: R002
    requirement: "Detect indirect ROT13 codec access via codecs.getencoder(), codecs.getdecoder(), codecs.lookup(), and codecs.iterencode() with 'rot_13' or 'rot13' codec strings."
    category: functional
    source: user-provided
    contract:
      given: "A Python source file containing any of the four indirect codec access patterns"
      when: "analyze_python() is called on that source"
      then: "An OBFS-001 finding with severity HIGH is returned for each matched call"
    acceptance:
      - "codecs.getencoder('rot_13') produces OBFS-001"
      - "codecs.getdecoder('rot_13') produces OBFS-001"
      - "codecs.lookup('rot_13') produces OBFS-001"
      - "codecs.iterencode(x, 'rot_13') produces OBFS-001"
      - "All four functions also match 'rot13' variant"
    verify: test::tests/unit/test_ast_rot13.py
    status: done

  - id: R003
    requirement: "Detect str.maketrans() calls where the from/to string arguments constitute a ROT13 character mapping, using is_rot13_pair() and try_resolve_string()."
    category: functional
    source: user-provided
    contract:
      given: "A Python source with str.maketrans('ABC...XYZ...', 'NOP...MNO...') or equivalent ROT13 mapping"
      when: "analyze_python() is called on that source"
      then: "An OBFS-001 finding with severity HIGH is returned"
    acceptance:
      - "Full-alphabet ROT13 maketrans call produces OBFS-001"
      - "Partial-alphabet non-ROT13 maketrans call does NOT produce OBFS-001"
      - "is_rot13_pair() returns True only when every character maps exactly 13 positions forward"
      - "String args are resolved via try_resolve_string() before passing to is_rot13_pair()"
    verify: test::tests/unit/test_ast_rot13.py
    status: done

  - id: R004
    requirement: "All ROT13 detection findings use rule ID OBFS-001, severity HIGH, and category 'obfuscation'."
    category: functional
    source: user-provided
    acceptance:
      - "All findings from _ast_rot13.py have rule_id='OBFS-001'"
      - "All findings from _ast_rot13.py have severity=HIGH"
      - "All findings from _ast_rot13.py have category='obfuscation'"
    verify: test::tests/unit/test_ast_rot13.py
    status: done

  # ──────────────────────────────────────────────────────────────
  # URL-Encoding Detection (regex rules)
  # ──────────────────────────────────────────────────────────────

  - id: R005
    requirement: "A regex rule OBFS-002 detects 3 or more consecutive %XX percent-encoded sequences with severity MEDIUM."
    category: functional
    source: user-provided
    contract:
      given: "A file line containing '%41%42%43' (3+ consecutive %XX sequences)"
      when: "The rule engine processes that line with OBFS-002 active"
      then: "An OBFS-002 finding with severity MEDIUM is returned"
    acceptance:
      - "3 consecutive %XX sequences produce OBFS-002"
      - "2 consecutive %XX sequences do NOT produce OBFS-002"
      - "Single %20 (space) does NOT produce OBFS-002"
      - "Severity is MEDIUM"
    verify: test::tests/unit/test_obfs_rules.py
    status: done

  - id: R006
    requirement: "A regex rule OBFS-003 detects double-encoded percent sequences matching %25[0-9A-Fa-f]{2} with severity HIGH."
    category: functional
    source: user-provided
    contract:
      given: "A file line containing '%2541' (double-encoded)"
      when: "The rule engine processes that line with OBFS-003 active"
      then: "An OBFS-003 finding with severity HIGH is returned"
    acceptance:
      - "%2541 produces OBFS-003 finding"
      - "Plain %41 without double-encoding does NOT produce OBFS-003"
      - "Severity is HIGH"
    verify: test::tests/unit/test_obfs_rules.py
    status: done

  - id: R007
    requirement: "A regex rule OBFS-004 detects URL-encoding of RFC 3986 unreserved characters (alphanumeric %30-%39, %41-%5A, %61-%7A) with severity MEDIUM."
    category: functional
    source: user-provided
    contract:
      given: "A file line containing '%41' (URL-encoded uppercase A)"
      when: "The rule engine processes that line with OBFS-004 active"
      then: "An OBFS-004 finding with severity MEDIUM is returned"
    acceptance:
      - "%41 (letter A) produces OBFS-004"
      - "%30 (digit 0) produces OBFS-004"
      - "%2F (reserved slash) does NOT produce OBFS-004"
      - "Severity is MEDIUM"
    verify: test::tests/unit/test_obfs_rules.py
    status: done

  # ──────────────────────────────────────────────────────────────
  # URL/Unicode Decoder Integration
  # ──────────────────────────────────────────────────────────────

  - id: R008
    requirement: "extract_encoded_strings() extracts URL-encoded payloads and decode_payload() decodes them via urllib.parse.unquote(), with decoded content fed into Pass 4 recursive scanning."
    category: functional
    source: user-provided
    contract:
      given: "A string containing 3+ consecutive %XX sequences"
      when: "extract_encoded_strings() then decode_payload() are called"
      then: "decode_payload() returns the decoded plaintext str"
    acceptance:
      - "extract_encoded_strings() returns EncodedPayload with encoding_type='url'"
      - "decode_payload() returns str (not bytes) for url encoding_type"
      - "Malicious content hidden in URL-encoded payload detected end-to-end via Pass 4"
    verify: test::tests/unit/test_decoder_url_unicode.py
    status: done

