      then: "An OBFS-005 finding with severity MEDIUM is returned"
    acceptance:
      - "3+ consecutive \\uXXXX produce OBFS-005"
      - "3+ consecutive \\UXXXXXXXX produce OBFS-005"
      - "2 or fewer sequences do NOT produce OBFS-005"
      - "Severity is MEDIUM"
    verify: test::tests/unit/test_obfs_rules.py
    status: done

  - id: R010
    requirement: "Unicode-escape payload extraction and decoding implemented in the decoder pipeline."
    category: functional
    source: user-provided
    contract:
      given: "A string containing 3+ consecutive \\uXXXX sequences"
      when: "extract_encoded_strings() then decode_payload() are called"
      then: "The decoded plaintext string is returned"
    acceptance:
      - "extract_encoded_strings() returns EncodedPayload with encoding_type='unicode_escape'"
      - "decode_payload() decodes the payload to correct plaintext"
    verify: test::tests/unit/test_decoder_url_unicode.py
    status: done

