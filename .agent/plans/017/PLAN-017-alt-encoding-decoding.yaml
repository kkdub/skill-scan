id: "PLAN-017"
title: "Alternative Encoding Decoding (rot13, URL-encoding, unicode escapes)"
type: implementation
status: Complete
created: 2026-03-10

linked_spec: null

description: |
  Extend the scanner to detect and decode three new encoding types used for
  obfuscation in agent skill files: ROT13 (via AST analysis of Python codec
  calls and str.maketrans), URL-encoding (regex rules for suspicious %XX
  sequences + decoder integration), and unicode escapes (regex for \uXXXX
  runs + decoder integration).

  Handles cross-cutting debt first: import-alias tracking for the AST pipeline
  so that aliased codecs imports are resolved correctly (benefits all existing
  AST detectors). Introduces the OBFS-* rule namespace for obfuscation detection.

  Origin: DEBT-012 — PLAN-012 scope covers base64 and hex only.

  Research findings: .agent/plans/017/Findings.md

