parts:
  - id: a
    title: "Tree-level dynamic exec detector (symbol table + taint sink)"
    status: Done
    requirements_covered: []
    approach:
      - step: "Add _SENSITIVE_MODULES frozenset and _resolve_first_arg helper to _ast_detectors.py"
        files: [src/skill_scan/_ast_detectors.py]
        notes: |
          _SENSITIVE_MODULES = frozenset({"os", "sys", "subprocess", "shutil", "socket",
          "builtins", "__builtins__", "importlib", "ctypes", "code", "codeop"}).
          _resolve_first_arg(node, alias_map) resolves the first arg of getattr to a
          module name via alias_map (handles Name and Attribute nodes).
          ~10 lines added; well within 294→350 budget.
      - step: "Create _ast_dynamic_exec_detector.py with detect_dynamic_exec()"
        files: [src/skill_scan/_ast_dynamic_exec_detector.py]
        notes: |
          New tree-level detector following detect_split_evasion pattern.
          Signature: detect_dynamic_exec(tree, file_path, alias_map, symbol_table, *, _nodes=None) -> list[Finding].
          Import _build_scope_map from _ast_split_detector, _scoped_lookup from _ast_split_format,
          _DANGEROUS_NAMES and _SENSITIVE_MODULES from _ast_detectors.
          Walks getattr Call nodes checking:
          (1) Symbol-table resolution: 2nd arg is Name, look up via _scoped_lookup;
              if resolves to dangerous name -> EXEC-006 HIGH with resolved name in message.
          (2) Taint sink: 1st arg resolves to sensitive module (via alias_map + _resolve_first_arg),
              2nd arg is Name that can't resolve via symbol table -> EXEC-006 MEDIUM.
          (3) Skip: 2nd arg is Constant (already handled by _detect_dynamic_access node-level).
          (4) Skip: not getattr, or < 2 args.
          Use Finding() directly with category='malicious-code'.
      - step: "Wire detect_dynamic_exec into analyze_python()"
        files: [src/skill_scan/ast_analyzer.py]
        notes: |
          Add import and call after detect_kwargs_unpacking. Pass tree, file_path,
          alias_map, symbol_table, _nodes=all_nodes.
      - step: "Create tests for symbol-table and taint-sink detection"
        files: [tests/unit/test_dynamic_exec_detector.py]
        notes: |
          Test cases (all at analyze_python level):
          - getattr(os, var) where var='system' -> EXEC-006 HIGH with 'system' in matched_text
          - getattr(os, var) where var='path' -> no finding from this detector
          - getattr(os, unknown_var) -> EXEC-006 MEDIUM (taint sink)
          - getattr(config, unknown_var) -> no finding (not sensitive module)
          - import os as o; getattr(o, var) where var='system' -> detected via alias
          - getattr(self, unknown) -> no finding (self not a sensitive module)
          - hasattr(os, 'system') -> no finding (not getattr)
          - getattr(os, 'system') -> NOT detected by this detector (handled by node-level)
    criteria:
      - "getattr(os, var) where var='system' detected as EXEC-006 HIGH with 'system' in matched_text"
      - "getattr(os, var) where var='path' does NOT produce a finding from detect_dynamic_exec"
      - "getattr(os, unknown_var) detected as EXEC-006 MEDIUM (taint sink)"
      - "getattr(config, unknown_var) does NOT produce a finding (non-sensitive module)"
      - "Aliased modules resolve: import os as o; getattr(o, var) where var='system' detected"
      - "getattr(self, unknown) does NOT produce a finding"
      - "hasattr(os, 'system') does NOT produce a finding"
      - "detect_dynamic_exec is called from analyze_python() and findings are included"
      - "_ast_dynamic_exec_detector.py stays at or under 350 lines"
      - "_ast_detectors.py stays at or under 350 lines"
      - "make check passes"

  - id: b
    title: "Scanner-level precision — dedup preference and end-to-end validation"
    status: Done
    depends_on: [a]
    requirements_covered: []
    approach:
      - step: "Change _deduplicate() to prefer AST findings over regex"
        files: [src/skill_scan/content_scanner.py]
        notes: |
          Current: seeds seen from regex findings, drops AST with same (rule_id, line).
          New: for each (rule_id, line) pair, prefer AST finding over regex when both exist.
          Implementation: build AST lookup dict by (rule_id, line), then iterate regex
          findings replacing with AST version when available, then add remaining AST-only
          findings. This ensures AST precision (resolved names, correct severity) reaches
          scanner output while regex findings remain for lines AST doesn't cover.
          content_scanner.py is at 239/350 — ample room.
      - step: "Create end-to-end scanner tests"
        files: [tests/unit/test_dynamic_exec_scanner.py]
        notes: |
          Test cases using _apply_rules (full regex+AST+dedup pipeline):
          - getattr(os, var='system') -> finding has 'system' in matched_text (AST precision)
          - getattr(os, unknown) -> finding severity is MEDIUM (not regex HIGH)
          - getattr(config, 'debug') -> finding is still HIGH (regex only, AST produces nothing)
          - getattr(os, 'system') -> finding source is AST (preferred over regex)
          - getattr(self, 'process') -> finding is regex HIGH (AST doesn't flag benign attrs)
    criteria:
      - "getattr(os, var='system') scanner finding has 'system' in matched_text (AST preferred)"
      - "getattr(os, unknown_param) scanner finding severity is MEDIUM (AST taint sink preferred over regex HIGH)"
      - "getattr(config, 'debug') scanner finding is still HIGH (regex, no AST finding)"
      - "getattr(os, 'system') scanner finding comes from AST (preferred over regex)"
      - "No regression in existing test suite"
      - "content_scanner.py stays at or under 350 lines"
      - "make check passes"

