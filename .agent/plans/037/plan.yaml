id: "PLAN-037"
title: "Dynamic execution detection — symbol-table resolution and scanner precision"
type: implementation
status: Done
created: 2026-03-22
linked_spec: null

description: |
  Improve precision of dynamic execution detection for getattr() patterns.

  Current state: regex EXEC-006 patterns catch ALL getattr/import calls at HIGH severity,
  producing false positives for safe patterns (getattr(config, 'debug'), getattr(self, 'name')).
  AST detectors are more precise but _deduplicate() masks them in favor of regex.

  Two actual gaps:
  (1) getattr with symbol-table-resolvable variable args (node-level can't access symbol_table),
  (2) getattr as a taint sink on sensitive modules (no concept of sensitive modules exists).

  Two-part approach: add a tree-level detector for symbol-table resolution and taint-sink
  detection, then fix dedup to prefer AST findings so precision reaches scanner output.

  Skeleton opt-out: brownfield single-layer change (adding detector + adjusting dedup).

  Codex review (2026-03-22) corrected false assumptions in the original plan:
  - try_resolve_string() already handles plain constants (gap #1 was not a real gap)
  - _detect_dynamic_imports already catches __import__(var) by call name (gap #4/5 not real)
  - Dedup masking identified as the critical integration issue

alternatives:
  - id: ALT-001
    description: "Merge everything into _detect_dynamic_access (node-level only)"
    rejected_because: "Node-level detectors don't receive symbol_table; can't resolve variable args"
  - id: ALT-002
    description: "Full taint analysis / dataflow framework"
    rejected_because: "Over-engineering; lightweight symbol-table lookup covers most real attacks"
  - id: ALT-003
    description: "Module return value tracking (m = __import__('os'); m.system())"
    rejected_because: "Requires symbol table to track non-string values; separate plan"
  - id: ALT-004
    description: "Narrow regex patterns instead of fixing dedup"
    rejected_because: "Fragile; could miss edge cases; regex serves as a safety net for non-Python-aware contexts"

risks:
  - id: RISK-001
    description: "False positives from getattr taint sink on sensitive modules"
    mitigation: "MEDIUM severity (not HIGH); symbol table resolution attempted first; only fires when module IS sensitive AND arg IS non-resolvable"
    severity: medium
  - id: RISK-002
    description: "_ast_detectors.py line budget (294/350, 56 free)"
    mitigation: "Only _SENSITIVE_MODULES + _resolve_first_arg added (~10 lines); tree-level detector in separate module"
    severity: low
  - id: RISK-003
    description: "Dedup preference change could surface AST MEDIUM where regex was HIGH"
    mitigation: "This is intentional — MEDIUM for taint sinks is correct severity. Security-conservative: uncertain threats get flagged MEDIUM, not suppressed"
    severity: low
  - id: RISK-004
    description: "Class-method local variables not in symbol table"
    mitigation: "Pre-existing limitation; symbol table tracks function-level and class-level but not method-local vars. Documented in context.md, tests will not claim class-method-local resolution"
    severity: low

