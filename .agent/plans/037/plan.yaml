acceptance_scenarios:
  - scenario: "Symbol-table resolution: getattr with variable arg resolved to dangerous name"
    invoke: "analyze_python('import os\\nattr = \"system\"\\ngetattr(os, attr)', 'test.py')"
    expect: "Finding with rule_id=EXEC-006, severity=HIGH, 'system' in matched_text"
    test_file: tests/unit/test_dynamic_exec_scanner.py
    status: passing

  - scenario: "Taint sink: getattr on sensitive module with non-resolvable arg"
    invoke: "analyze_python('import os\\ndef f(x):\\n    getattr(os, x)', 'test.py')"
    expect: "Finding with rule_id=EXEC-006, severity=MEDIUM"
    test_file: tests/unit/test_dynamic_exec_scanner.py
    status: passing

  - scenario: "No taint sink on non-sensitive module"
    invoke: "analyze_python('def f(x):\\n    getattr(config, x)', 'test.py')"
    expect: "No EXEC-006 finding from detect_dynamic_exec"
    test_file: tests/unit/test_dynamic_exec_scanner.py
    status: passing

  - scenario: "Scanner-level: AST precision survives dedup for resolved variable"
    invoke: "_apply_rules('import os\\nattr = \"system\"\\ngetattr(os, attr)', 'test.py', rules)"
    expect: "EXEC-006 finding with 'system' in matched_text (AST, not regex excerpt)"
    test_file: tests/unit/test_dynamic_exec_scanner.py
    status: passing

  - scenario: "Scanner-level: taint sink shows MEDIUM not HIGH"
    invoke: "_apply_rules('import os\\ndef f(x):\\n    getattr(os, x)', 'test.py', rules)"
    expect: "EXEC-006 finding with severity=MEDIUM"
    test_file: tests/unit/test_dynamic_exec_scanner.py
    status: passing

