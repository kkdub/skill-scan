id: "PLAN-004"
title: "CLI Completion & Configurable Rules (R2, R9, R10)"
type: implementation
status: Done
created: 2026-02-15
priority: high

linked_spec: ".agent/plans/001/SPEC-001-skill-audit.md"

description: |
  Final implementation plan completing all remaining SPEC-001 requirements.
  After PLAN-001 (MVP), PLAN-002 (hardening), and PLAN-003 (complete
  detection), the scanner covers all threat categories (R3-R8) with text
  output. Four areas remain from the original spec:

  1. JSON output mode (R9) — machine-parseable output for CI/CD integration
  2. CLI flags: --fail-on, --format, --config, --repo (R2)
  3. Configurable rules (R10) — rule suppression + custom rules via TOML
  4. Remote scanning (R2) — --repo to scan GitHub repos without cloning

  When PLAN-004 is done every requirement R0-R10 from SPEC-001 is complete
  and the tool is feature-complete for v1.0.

requirements:
  extraction_status: done
  extracted_at: 2026-02-15
  spec_hash: null
  items:
    - id: R9-json
      description: "JSON output mode for CI/CD and tooling integration"
      status: done
      spec_ref: "SPEC-001 R9"
      notes: |
        Machine-parseable JSON output. Same findings data as text mode,
        structured as JSON object. Deterministic (no timestamps in findings).

    - id: R2-fail-on
      description: "--fail-on <severity> exit code threshold override"
      status: done
      spec_ref: "SPEC-001 R2"
      notes: |
        Overrides exit code threshold without changing verdict in report.
        --fail-on medium: exit 0 if all findings below medium, exit 2 if
        any findings at medium or above. Useful for CI pipelines.

    - id: R10-suppress
      description: "Rule suppression by ID via config file"
      status: done
      spec_ref: "SPEC-001 R10"
      notes: |
        TOML config with [suppress] section listing rule IDs to skip.
        Also configurable scan settings (extensions, size limits).
        Config loadable via --config CLI flag or Python API (ScanConfig kwargs).

    - id: R10-custom
      description: "Custom rules via TOML config"
      status: done
      spec_ref: "SPEC-001 R10"
      notes: |
        Config file may contain [rules.*] sections in same format as
        built-in rules. Custom rules merged with defaults at scan time.

    - id: R2-repo
      description: "--repo <owner/repo> remote scanning via GitHub API"
      status: done
      spec_ref: "SPEC-001 R2"
      notes: |
        Fetch skill from GitHub without cloning. Uses httpx (optional dep).
        SkillFetcher protocol already in place; needs GitHubFetcher impl.

  uncovered: []

