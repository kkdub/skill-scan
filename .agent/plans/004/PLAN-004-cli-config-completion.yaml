      - "src/skill_scan/_github_api.py"
      - "src/skill_scan/__init__.py"
      - "src/skill_scan/rules/loader.py"
      - "pyproject.toml"
    functions:
      - "format_json(result) -> str"
      - "load_config(path) -> ScanConfig (now reads TOML)"
      - "load_rules_from_config(path) -> list[Rule]"
      - "GitHubFetcher.fetch(source) -> Path"
    components:
      - "JSON formatter (json_formatter.py)"
      - "Config file loading (config.py)"
      - "Rule suppression + custom rules (scanner.py + loader.py)"
      - "Remote fetching (GitHubFetcher in _fetchers.py)"
      - "CLI flag additions (cli.py)"
  decisions:
    - decision: "Path traversal prevention in config file loading"
      rationale: |
        Config file paths are normalized and checked to prevent directory traversal attacks.
        Symlinks are resolved and validated to ensure they stay within allowed boundaries.
    - decision: "SSRF mitigation in GitHub API downloads"
      rationale: |
        Download URLs from GitHub API responses are validated to ensure they match expected
        githubusercontent.com domain pattern before fetching file contents. Prevents
        malicious API responses from triggering requests to arbitrary internal endpoints.
    - decision: "ReDoS protection via pattern length limits"
      rationale: |
        Custom rule patterns are limited to 500 characters to prevent ReDoS attacks via
        config files. Documented in config.py error messages and user-facing docs.
    - decision: "Split _fetchers.py into _fetchers.py + _github_api.py"
      rationale: |
        Original _fetchers.py with GitHubFetcher implementation exceeded 250 lines and
        had maintainability index below threshold. Split GitHub API interaction logic
        into separate _github_api.py module for better separation of concerns and
        compliance with 250-line limit and MI score requirements.
    - decision: "Replace assert with explicit check in cli.py"
      rationale: |
        Replaced assert statement with explicit if check and raise to ensure path
        validation occurs even when Python is run with -O optimization flag.
  resolved_questions:
    - question: "Should custom rules in config support path_exclude_patterns and confidence fields?"
      answer: "Yes, full rule schema supported for custom rules for consistency."
    - question: "Should --repo support branch/tag specification?"
      answer: "Yes, optional @ref suffix implemented. Defaults to repo default branch."
  open_questions: []

