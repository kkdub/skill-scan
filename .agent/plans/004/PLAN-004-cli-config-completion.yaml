design_decisions:
  - decision: "JSON formatter in separate file (json_formatter.py)"
    rationale: "formatters.py is 205 lines; adding JSON formatting would exceed 250-line limit."

  - decision: "suppress_rules on ScanConfig dataclass"
    rationale: |
      Keeps config as a single frozen dataclass flowing through the pipeline.
      Python API: ScanConfig(suppress_rules=frozenset({'PI-004b'})).
      Config file: [suppress] section parsed into this field.

  - decision: "Custom rules loaded by loader, not config module"
    rationale: |
      Rules need regex compilation (loader.py expertise). Config.py reads
      TOML and delegates [rules.*] parsing to loader's _parse_rule().
      Avoids config -> rules circular dependency.

  - decision: "--fail-on changes exit code only, not verdict"
    rationale: "Per spec: 'overrides the exit code threshold but does not change the verdict in the report.'"

  - decision: "httpx as a pip extra (pip install skill-scan[remote])"
    rationale: |
      The --repo feature is fully in scope and will be built. However, httpx
      is declared as a pip extra rather than a hard dependency so that users
      who only scan local paths don't need it installed. Core engine stays
      stdlib-only per project conventions. Matches spec Stack section which
      lists httpx as "optional extra, for --repo remote scanning".

  - decision: "--format json ignores --quiet/--verbose"
    rationale: "JSON always contains full structured data. Verbosity modes are text-specific."

  - decision: "GitHubFetcher uses Contents API, not tarball or git clone"
    rationale: |
      Skills are typically embedded in larger repos (monorepos, project repos
      with a skill subdirectory). The Contents API fetches only the target
      directory — no downloading an entire geometry library to scan one skill.
      For a typical skill (<100 files), this is a handful of small requests
      well within GitHub's 5000 req/hour authenticated rate limit. Tarball
      downloads the entire repo which is wasteful; git clone requires git
      installed. Contents API needs only httpx.

handoff:
  stopped_at: "All parts complete"
  current_state: "All parts implemented, tests passing, make check green"
  next_steps: []
