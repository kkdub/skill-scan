    criteria:
      - "src/skill_scan/file_collector.py exists with collect_files() and _check_entry()"
      - "_SKIP_CONTENT_RULES constant replaces inline ('FS-002', 'FS-004', 'FS-005') tuple"
      - "Imports only from config, file_checks, models (no circular deps)"
      - "Under 250 lines"

  - id: b
    title: "Create content_scanner.py"
    status: Pending
    requirements_covered: [R-003, R-004, R-007]
    criteria:
      - "src/skill_scan/content_scanner.py exists with scan_all_files(), _scan_file(), _is_path_excluded()"
      - "Named constants for FS-001, FS-008, file-safety category"
      - "Imports only from models, rules (no circular deps)"
      - "Under 250 lines"

  - id: c
    title: "Slim down scanner.py"
    status: Pending
    depends_on: [a, b]
    requirements_covered: [R-001, R-004, R-005, R-006]
    criteria:
      - "scanner.py contains only scan(), _validate_schema(), _prepare_rules(), _build_degraded_reasons()"
      - "Imports collect_files from file_collector and scan_all_files from content_scanner"
      - "Named constants for FS-002 (binary count) and SV-001 (schema validation)"
      - "No direct imports from file_checks (moved to file_collector)"
      - "Under 100 lines"

  - id: d
    title: "Update test import + verify"
    status: Pending
    depends_on: [c]
    requirements_covered: [R-005, R-008]
    criteria:
