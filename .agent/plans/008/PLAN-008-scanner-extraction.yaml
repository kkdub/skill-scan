id: "PLAN-008"
title: "Extract scanner.py into focused modules"
type: implementation
status: Proposed
created: 2026-02-17

linked_spec: null

description: |
  scanner.py is at 249/250 lines with zero headroom. It mixes three concerns:
  filesystem traversal, file content scanning, and orchestration. Rule ID
  strings ("FS-002", "SV-001") appear as magic literals in conditionals.

  Split into three modules — file_collector.py, content_scanner.py, and a
  slimmed scanner.py orchestrator — and name the magic strings as constants.
  No public API changes. No new abstraction layers.

requirements:
  extraction_status: manual
  extracted_at: null
  spec_hash: null
  items:
    - id: R-001
      text: "scanner.py shrinks to ~85 lines (orchestration only)"
      status: pending
    - id: R-002
      text: "file_collector.py owns filesystem traversal + entry classification"
      status: pending
    - id: R-003
      text: "content_scanner.py owns file reading + rule application"
      status: pending
    - id: R-004
      text: "All hardcoded rule IDs in conditionals replaced with named constants"
      status: pending
    - id: R-005
      text: "Public API unchanged (scan() in scanner.py, __init__.py exports intact)"
      status: pending
    - id: R-006
      text: "No circular imports introduced"
      status: pending
    - id: R-007
      text: "All files under 250-line limit"
      status: pending
    - id: R-008
      text: "All existing tests pass without logic changes (import updates only)"
      status: pending
  uncovered: []

