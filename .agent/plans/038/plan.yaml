parts:
  - id: a
    title: "Depth-1 inline chain detection and builtins.__import__"
    status: Done
    requirements_covered: [R001, R002, R003, R004, R-IMP002]
    depends_on: []
    approach:
      - step: "Add _detect_inline_import_chain node-level detector to _ast_detectors.py"
        files:
          - src/skill_scan/_ast_detectors.py
        notes: >
          Match Call(func=Attribute(value=Call, attr=dangerous)) where inner call
          is __import__ or importlib.import_module (via get_call_name).  Dangerous
          attrs: check against _DANGEROUS_NAMES minus getattr/__import__ (indirection
          names, not execution names).  Extract module name from inner call's first
          Constant arg for the description.  Emit EXEC-002 CRITICAL.  ~20-25 lines;
          _ast_detectors.py has 39 lines of headroom (311/350).
      - step: "Extend _detect_dynamic_imports to catch builtins.__import__()"
        files:
          - src/skill_scan/_ast_detectors.py
        notes: >
          Add a branch: if node.func is Attribute with value.id in {'builtins',
          '__builtins__'} and attr == '__import__', emit EXEC-006.  Use
          _DANGEROUS_BASES frozenset (line 221) for the base check.  ~3-5 lines.
      - step: "Register new detector and re-export from ast_analyzer.py"
        files:
          - src/skill_scan/ast_analyzer.py
        notes: >
          Add _detect_inline_import_chain to _DETECTORS tuple (line 127) and
          re-export block (line 94).  ast_analyzer.py at 138/350, ample room.
    criteria:
      - "__import__('os').system('cmd') produces at least one EXEC-002 finding"
      - "__import__('os').popen('id') produces at least one EXEC-002 finding"
      - "__import__('builtins').exec('code') produces at least one EXEC-002 finding"
      - "importlib.import_module('os').system('cmd') produces at least one EXEC-002 finding"
      - "builtins.__import__('os') produces EXEC-006 finding"
      - "Existing __import__('os') still produces EXEC-006 (no regression)"

  - id: b
    title: "ref_table pre-pass infrastructure"
    status: Done
    requirements_covered: [R009, R-IMP001]
    depends_on: []
    approach:
      - step: "Create _ast_ref_tracker.py with RefEntry dataclass and build_ref_table function"
        files:
          - src/skill_scan/_ast_ref_tracker.py
        notes: >
          RefEntry: frozen dataclass with slots=True, fields kind (Literal['module',
          'func_ref']) and resolved (str, e.g. 'os', 'os.system').  build_ref_table(tree,
          alias_map) walks assignments tracking x = __import__('mod') and
          x = importlib.import_module('mod').  Use _build_scope_map from
          _ast_split_detector.py for scope-aware keys (funcname.varname format).
          Check inner call via get_call_name from _ast_imports.py.  Extract module
          name from first Constant arg.  ~80-120 lines; new file has full budget.
      - step: "Wire build_ref_table into analyze_python"
        files:
          - src/skill_scan/ast_analyzer.py
        notes: >
          Call build_ref_table(tree, alias_map) after symbol_table build (line 44).
          Import and re-export.  Pass ref_table to detect_dynamic_exec in Part C
          (for now, just build it).  ast_analyzer.py at 138/350.
    criteria:
      - "build_ref_table function exists in _ast_ref_tracker.py and returns dict[str, RefEntry]"
      - "m = __import__('os') at module level produces ref_table entry with key 'm' and resolved 'os'"
      - "mod = importlib.import_module('subprocess') produces ref_table entry with resolved 'subprocess'"
      - "Function-scoped m = __import__('os') inside def foo() uses key 'foo.m'"
      - "build_symbol_table return type remains dict[str, str] (not modified)"

  - id: c
    title: "Depth-2 attribute access on tracked module refs"
    status: Done
    requirements_covered: [R005, R006]
    depends_on: [b]
    verify_group: depth-2-3
    approach:
      - step: "Add ref_table-aware detection to _ast_dynamic_exec_detector.py"
        files:
          - src/skill_scan/_ast_dynamic_exec_detector.py
        notes: >
          Extend detect_dynamic_exec (or add a sibling function called from
          analyze_python) to walk Call nodes where func is Attribute(value=Name).
          Look up Name.id in ref_table (scope-aware via _scoped_lookup).  If found
          as module ref, resolve module.attr — if attr is in _DANGEROUS_NAMES (minus
          getattr/__import__) or module.attr is in _UNSAFE_EXEC_CALLS, emit EXEC-002
          CRITICAL.  Also walk Assign nodes: if RHS is Attribute(value=Name) and
          Name resolves in ref_table, store target var as RefEntry(kind='func_ref',
          resolved='module.attr') in ref_table.  _ast_dynamic_exec_detector.py at
          123/350, 227 lines of headroom.
      - step: "Thread ref_table parameter through analyze_python to the detector"
        files:
          - src/skill_scan/ast_analyzer.py
          - src/skill_scan/_ast_dynamic_exec_detector.py
        notes: >
          Add ref_table kwarg to detect_dynamic_exec (or new function).  Pass
          from analyze_python.  Signature change is internal (not public API).
    criteria:
      - "m = __import__('os'); m.system('cmd') emits EXEC-002"
      - "mod = importlib.import_module('subprocess'); mod.call(['ls']) emits EXEC-002"
      - "m = __import__('os'); f = m.system stores f as func_ref in ref_table"
      - "EXEC-006 still fires for the __import__() call alongside EXEC-002"

  - id: d
    title: "Depth-3 getattr on tracked refs and bare call resolution"
    status: Done
    requirements_covered: [R007, R008, R010]
    depends_on: [c]
    verify_group: depth-2-3
    approach:
      - step: "Add getattr-on-ref and bare-call detection"
        files:
          - src/skill_scan/_ast_dynamic_exec_detector.py
        notes: >
          Two detection paths in the same walk:
          1. getattr(m, 'attr') where m is in ref_table — resolve module, if attr
             is dangerous store result as func_ref; if attr itself resolves to a
             dangerous name emit EXEC-002.
          2. Call(func=Name) where Name.id is in ref_table as func_ref — resolve
             to the dangerous name, emit EXEC-002 CRITICAL.
          Reuse _scoped_lookup for scope-aware ref_table access.
          _ast_dynamic_exec_detector.py will be ~200-250 lines after Parts C+D.
      - step: "Ensure all existing tests still pass"
        files:
          - tests/unit/test_dynamic_exec_detector.py
          - tests/unit/test_dynamic_exec_scanner.py
        notes: >
          Verify no regressions in existing EXEC-006 detection.  The new EXEC-002
          findings are additive — existing getattr findings should not change.
    criteria:
      - "f = getattr(os_mod, 'system'); f('cmd') where os_mod is tracked module emits EXEC-002"
      - "b = __import__('builtins'); e = getattr(b, 'eval'); e('code') emits EXEC-002"
      - "getattr(tracked_mod, 'path') where 'path' is not dangerous produces no EXEC-002"
      - "Full depth-3 chain produces both EXEC-006 (for __import__) and EXEC-002 (for resolved call)"

