acceptance_scenarios:
  - scenario: "Inline chain on __import__ return value detected as code execution"
    invoke: "analyze_python(\"__import__('os').system('cmd')\", 'test.py')"
    expect: "At least one finding with rule_id='EXEC-002'"
    test_file: tests/unit/test_depth3_ref_detection.py
    status: passing

  - scenario: "Depth-2 assigned module ref resolved to dangerous call"
    invoke: "analyze_python(\"m = __import__('os')\\nm.system('cmd')\", 'test.py')"
    expect: "Finding with rule_id='EXEC-002' and severity=CRITICAL"
    test_file: tests/unit/test_depth3_ref_detection.py
    status: passing

  - scenario: "Depth-3 two-hop chain fully resolved"
    invoke: "analyze_python(\"b = __import__('builtins')\\ne = getattr(b, 'eval')\\ne('code')\", 'test.py')"
    expect: "Finding with rule_id='EXEC-002'"
    test_file: tests/unit/test_depth3_ref_detection.py
    status: passing

  - scenario: "No false positive on safe attribute access"
    invoke: "analyze_python(\"m = __import__('json')\\nm.loads('{}')\", 'test.py')"
    expect: "No EXEC-002 finding (json.loads is not dangerous)"
    test_file: tests/unit/test_depth3_ref_detection.py
    status: passing

