id: "PLAN-038"
title: "Module return value and function reference tracking"
type: implementation
status: Done
created: 2026-03-22
linked_spec: null
depends_on: ["PLAN-037"]

description: |
  Close detection gaps for multi-step dynamic execution chains in the AST
  scanner.  Attackers use __import__(), getattr(), and importlib.import_module()
  to obtain module references and function handles, then call them indirectly.
  The scanner currently flags the acquisition calls but not the usage of their
  return values.

  Four layers of work:
  1. Depth-1 gaps (critical): inline chaining (__import__('os').system()) and
     builtins.__import__() — pure node-level detection, no infrastructure changes.
  2. Depth-2: track __import__()/importlib.import_module() return values via a
     new ref_table pre-pass; detect attribute access on tracked refs (m.system()).
  3. Depth-3: chain two lookups — getattr(tracked_ref, ...) stores result in
     ref_table; bare call on tracked func ref (e('code')) resolves and emits EXEC-002.
  4. No depth-4+, no inter-procedural, no globals()/vars() (already handled by
     split-evasion detector).

  Architecture: parallel ref_table (dict[str, RefEntry]) — does NOT modify the
  string symbol table.  New _ast_ref_tracker.py module for the pre-pass.
  Detection extends _ast_dynamic_exec_detector.py.

  Skeleton opt-out: brownfield single-layer change (extending existing AST
  detection infrastructure).

motivation: |
  Attackers chain dynamic calls to avoid detection:
    m = __import__('os')       # m is a module, not tracked by symbol table
    m.system('whoami')         # looks like method call on unknown object
    f = getattr(os, 'system') # f is a function ref, not tracked
    f('whoami')                # looks like call to unknown function

  After PLAN-037, the individual __import__ and getattr calls are flagged, but
  the USAGE of their return values is invisible.  This plan makes the return
  values visible.

  Additionally, two depth-1 gaps exist:
    __import__('os').system('cmd')  # only __import__ flagged, .system() invisible
    builtins.__import__('os')       # not detected at all

alternatives: []
risks:
  - category: performance_impact
    description: "New ref_table pre-pass adds another AST walk; may increase scan time"
    severity: low
    mitigation: "Pre-pass is lightweight (assignment-only walk); bounded by MAX_AST_RESOLVE_DEPTH=50"
  - category: security_implications
    description: "False negatives on depth-4+ chains (g = f; g('cmd'))"
    severity: low
    mitigation: "Depth-3 covers 95%+ of real attacks; depth-4+ deferred to future plan"

