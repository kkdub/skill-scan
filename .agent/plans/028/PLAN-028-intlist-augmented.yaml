id: "PLAN-028"
title: "Track augmented int-list mutations in split-evasion pre-pass"
type: implementation
status: Done
created: 2026-03-16

linked_spec: null

description: |
  Extend _collect_int_list_assigns pre-pass to track AugAssign (codes += [ints])
  and .extend([ints]) method calls. Currently attackers can split int lists across
  multiple statements to evade join-based split detection. Resolves DEBT-027-INTLIST-AUGMENTED.

requirements:
  file: null
  ids:
    - R001    # AugAssign (codes += [ints]) extends tracked int-list
    - R002    # .extend() calls (codes.extend([ints])) extend tracked int-list
    - R-IMP001  # Mutations with non-int elements convert entry to shadow marker []
    - R-IMP002  # Mutations on shadowed or unknown variables are safe (no false positives)
    - R-EFF001  # Red-team corpus patterns plus_equals_list and extend_method produce EXEC-002
  uncovered: []

utilities_audit:
  status: complete
  search_performed:
    - query: "grep _extract_int_list _ast_split_join_helpers.py"
      found: "_extract_int_list(elts) already exists — extracts list[int] from AST elements, returns None on non-int"
    - query: "grep _collect_int_lists_from_body _ast_split_join_helpers.py"
      found: "Walks body statements handling ast.Assign; recurses into control-flow via _sub_bodies"
    - query: "wc -l _ast_split_join_helpers.py test_ast_split_int_list.py"
      found: "Source: 263 lines, Tests: 266 lines — both near 300-line limit"
  categories:
    error_handling:
