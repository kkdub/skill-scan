    ci_changes: []
    build_changes: []

parts:
  - id: a
    title: "Extend _collect_int_lists_from_body for AugAssign and .extend()"
    status: Done
    requirements_covered: [R001, R002, R-IMP001, R-IMP002]
    approach:
      - step: "Add AugAssign handling to _collect_int_lists_from_body"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          Handle ast.AugAssign where op is ast.Add and target is ast.Name.
          Look up key in result dict. If present and non-empty, extract ints
          from value via _extract_int_list and extend. If ints is None (mixed types),
          convert to shadow marker []. If key not in result, ignore (conservative).
      - step: "Add .extend() call handling to _collect_int_lists_from_body"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          Handle ast.Expr where value is ast.Call with func being
          ast.Attribute(value=ast.Name, attr='extend') and one List/Tuple arg.
          Same lookup-and-extend logic as AugAssign. Reuse _extract_int_list.
    criteria:
      - "codes = [101, 118]; codes += [97, 108] produces {codes: [101, 118, 97, 108]} in table"
      - "codes = [101]; codes.extend([118, 97]) produces {codes: [101, 118, 97]} in table"
      - "codes = [101]; codes += ['x'] converts entry to shadow marker []"
      - "codes = ['a']; codes += [97] keeps entry as shadow marker []"
      - "AugAssign/extend on unknown variable (not in table) is ignored"
      - "Function-scoped: def f(): codes = [101]; codes += [118] produces {f.codes: [101, 118]}"
      - "Class-method-scoped: .extend() inside class method tracks with ClassName.method prefix"
      - "_ast_split_join_helpers.py stays under 300 lines"

  - id: b
    title: "Tests and end-to-end detection verification"
    status: Done
    depends_on: [a]
    requirements_covered: [R001, R002, R-IMP001, R-IMP002, R-EFF001]
    approach:
      - step: "Add unit tests for pre-pass AugAssign and .extend() handling"
        files: [tests/unit/test_ast_split_int_list.py]
        notes: |
          Test _collect_int_list_assigns directly for both mutation patterns,
          shadow behavior, and unknown-variable safety. If file would exceed
          300 lines, create tests/unit/test_ast_split_int_list_augmented.py.
      - step: "Add end-to-end detection tests for red-team corpus patterns"
        files: [tests/unit/test_ast_split_int_list.py]
        notes: |
          Use existing _detect() helper. Verify plus_equals_list and
          extend_method patterns from corpus produce EXEC-002 findings.
    criteria:
      - "Unit tests cover: AugAssign extend, .extend() extend, mixed-type shadow, unknown-variable no-op"
      - "End-to-end tests: plus_equals_list pattern produces EXEC-002"
      - "End-to-end tests: extend_method pattern produces EXEC-002"
      - "make check passes"
      - "No test file exceeds 300 lines"

  - id: c
    title: "Red-team augmented int-list tracking"
    status: Done
    depends_on: [b]
    requirements_covered: [R-EFF001]
    approach:
      - step: "Generate adversarial inputs targeting AugAssign and .extend() tracking"
        files: [corpus/red-team/]
        notes: |
          Target edge cases: nested AugAssign in control flow, multiple += chains,
          .extend() inside loops, mixed mutation sequences (assign then +=),
          AugAssign with Tuple not List, .extend() with generator arg.
      - step: "Triage findings and resolve must-fix evasions"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          Only evasions within the AugAssign/extend feature scope are must-fix.
          Evasions in other subsystems (e.g., map helpers, general split resolver)
          are filed as should-fix debt. Generator args to .extend() are out of
          scope for the implementation — red-team targets them as adversarial
          inputs to confirm they don't cause crashes, not to require resolution.
    criteria:
      - "Red-team corpus generated with adversarial patterns for augmented int-list tracking"
      - "Must-fix evasions within AugAssign/extend scope (if any) resolved"
      - "Should-fix evasions filed as debt entries"
      - "make check passes after any fixes"
      - "DEBT-027-INTLIST-AUGMENTED removed from .agent/status/debt.yaml"

acceptance_scenarios:
  - scenario: "Split int list via += reassembly detected end-to-end"
    invoke: "analyze_python() on: codes = [101, 118]; codes += [97, 108]; x = ''.join(chr(c) for c in codes)"
    expect: "At least one EXEC-002 finding (resolves to 'eval')"
    test_file: tests/unit/test_ast_split_int_list.py
    status: passing
  - scenario: "Split int list via .extend() reassembly detected end-to-end"
    invoke: "analyze_python() on: codes = [101, 118]; codes.extend([97, 108]); x = ''.join(chr(c) for c in codes)"
    expect: "At least one EXEC-002 finding (resolves to 'eval')"
    test_file: tests/unit/test_ast_split_int_list.py
    status: passing

