parts:
  - id: a
    title: "_is_terminal_body helper module"
    status: Done
    requirements_covered: [R001, R002, R005, R-IMP001]
    depends_on: []
    approach:
      - step: "Create _ast_terminal_body.py with _is_terminal_body(body) -> bool"
        files: [src/skill_scan/_ast_terminal_body.py]
        notes: |
          Same recursive pattern as _definitely_returns but leaf check is
          isinstance(stmt, ast.Return | ast.Raise).  Only scope-exit
          statements qualify — break/continue exit loop iteration only
          and mutations remain visible after the loop.
          Handles nested if/else (both sides must terminate + else must exist),
          try/except (finally terminates all, or body+all-handlers terminate),
          match (exhaustive + all cases terminate), with (body terminates).
          for/while are never terminal.  Empty body is not terminal.
      - step: "Create tests for the helper"
        files: [tests/unit/test_terminal_body.py]
        notes: |
          Test return/raise = True, break/continue = False (not scope-exit),
          nested if/else, bare if (no else) = False, try/except variants,
          match with wildcard, for/while = False, empty body = False.
          Conservative default: unknown node = False.
    criteria:
      - "_is_terminal_body([ast.Return(...)]) returns True"
      - "_is_terminal_body([ast.Raise(...)]) returns True"
      - "_is_terminal_body([ast.Break()]) returns False (not scope-exit)"
      - "_is_terminal_body([ast.Continue()]) returns False (not scope-exit)"
      - "_is_terminal_body([]) returns False (empty body)"
      - "Bare if (no else) returns False even if body terminates"
      - "if/else where both branches terminate returns True"
      - "Nested if/else recursion works to 2+ levels"
      - "for/while body always returns False (might not execute)"
      - "try: if finalbody terminates -> True regardless of other bodies"
      - "match: exhaustive (unguarded wildcard) + all cases terminate -> True"
      - "Conservative: any unrecognized structure -> False"

  - id: b
    title: "Wire _is_terminal_body into _walk_fn_body"
    status: Done
    requirements_covered: [R003, R004, R-IMP002]
    depends_on: [a]
    approach:
      - step: "Import _is_terminal_body in _walk_fn_body (deferred import beside _sub_bodies)"
        files: [src/skill_scan/_ast_split_int_list_tracker.py]
        notes: "Single import line added to the deferred import block at line 233"
      - step: "Filter terminal branches in If handler"
        files: [src/skill_scan/_ast_split_int_list_tracker.py]
        notes: |
          Build branches list: only include after_if if not _is_terminal_body(stmt.body),
          only include after_else if not _is_terminal_body(stmt.orelse).
          If branches is empty (all terminal), keep snap unchanged.
          LINE BUDGET: file is 295/300.  Use compact list-comprehension form for
          branch filtering (2 lines) instead of if/append pairs (4 lines) to stay
          within limit.  If still over, extract _is_exhaustive_match (7 lines) to
          _ast_terminal_body.py as a mitigation.
      - step: "Filter terminal branches in Match handler"
        files: [src/skill_scan/_ast_split_int_list_tracker.py]
        notes: |
          Only append result.copy() for cases where not _is_terminal_body(case.body).
          Guard _merge_branches with `if branch_results:`.
    criteria:
      - "Import added as deferred import inside _walk_fn_body"
      - "If handler: terminal if-body excluded from merge"
      - "If handler: terminal else-body excluded from merge"
      - "If handler: both terminal -> result equals pre-branch snapshot"
      - "Match handler: terminal case body excluded from merge"
      - "Match handler: all cases terminal + exhaustive -> result equals pre-branch snapshot"
      - "_ast_split_int_list_tracker.py stays at or under 300 lines"
      - "make check passes"

  - id: c
    title: "Integration tests for terminal branch exclusion"
    status: Done
    requirements_covered: [R003, R004]
    depends_on: [b]
    approach:
      - step: "Add TestTerminalBranchExclusion class to test_int_list_branch_merge.py"
        files: [tests/unit/test_int_list_branch_merge.py]
        notes: |
          Use existing _collect(code) helper.  Test via full analyze path
          (ast.parse -> _collect_int_list_assigns) to confirm end-to-end behavior.
          Tests: return, raise variants; nested terminal if;
          all-branches-terminal; match with terminal cases; non-terminal branch
          preserved (regression); break/continue NOT excluded (loop-visible).
          Include global/nonlocal regression test with terminal branch.
    criteria:
      - "if cond: codes=[...]; return — excluded from merge, post-if uses else-path state"
      - "if cond: raise — same behavior as return"
      - "if cond: codes=[...]; break — NOT excluded (mutations visible after loop)"
      - "Nested if where all inner paths return/raise — outer branch is terminal"
      - "All branches terminal — state equals pre-branch snapshot (R004)"
      - "Non-terminal branch preserved correctly (no regression vs PLAN-035 tests)"
      - "Match case with terminal body excluded from merge"
      - "global/nonlocal variable in terminal branch — scope routing still correct"
      - "test_int_list_branch_merge.py stays at or under 300 lines"
      - "make check passes"

