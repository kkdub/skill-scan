id: "PLAN-036"
title: "Terminal branch exclusion in int-list merge"
type: implementation
status: Complete
created: 2026-03-21
linked_spec: null
description: |
  Fix DEBT-035-NON-FALLTHROUGH-BRANCH: _walk_fn_body currently merges all
  branch snapshots including branches that end with return/raise.  Terminal
  branches cannot reach post-branch code, so their mutations should not
  pollute the merge.  Add a _is_terminal_body helper and wire it into the
  If and Match handlers in _walk_fn_body.

  NOTE: Only return/raise are terminal for merge exclusion.  break/continue
  exit the loop iteration but mutations remain visible after the loop (since
  _walk_fn_body walks loops sequentially via _sub_bodies).  Treating them as
  terminal would cause false negatives.

