id: "PLAN-030"
title: "P1 red-team fixes: format kwargs, format_map, string reversal, try/except imports, subprocess list-args, map(lambda chr), dict.update"
type: implementation
status: Done
created: 2026-03-18

linked_spec: "corpus/red-team/2026-03-17-full/report.md"

description: |
  Fix the seven P1 (significant gap) evasion vectors surfaced by the 2026-03-17 full
  scanner red-team. These are the next tier after the P0 fixes shipped in PLAN-029.

  Each evasion has a confirmed corpus input that currently evades detection:
  1. str.format() with keyword args — '{x}'.format(x='eval') returns None
  2. str.format_map(dict) — not handled at all in resolver chain
  3. String reversal [::-1] — _resolve_slice_expr rejects step <= 0
  4. try/except imports — build_alias_map only walks tree.body
  5. subprocess(['curl', ...]) — EXFIL-001 only matches shell-style curl
  6. map(lambda c: chr(c), [...]) — _resolve_map_join requires ast.Name func
  7. dict.update() for kwargs — not tracked in _collect_dict_assigns

  Includes a red-team verification part (Part E) that runs the full corpus against
  the scanner after all fixes are in, to catch regressions and confirm improvements.

