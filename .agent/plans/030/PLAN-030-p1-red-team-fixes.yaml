    - R002  # 'template'.format_map({'a': 'ev', 'b': 'al'}) must resolve in split-evasion detector
    - R003  # s[::-1] negative step (string reversal) must resolve in slice expression handler
    - R004  # build_alias_map must walk ast.Try blocks to capture imports inside try/except
    - R005  # subprocess.run(['curl', ...]) with network tools in list args must trigger EXFIL finding
    - R006  # map(lambda c: chr(c), [...]) must resolve as equivalent to map(chr, [...]) in join
    - R007  # dict.update({...}) must be tracked in kwargs dict pre-pass
    - R-EFF001  # All 7 red-team corpus inputs must produce findings when scanned
    - R-EFF002  # Full corpus evasion rate must improve (run run_corpus.py, compare to baseline)
  uncovered: []

