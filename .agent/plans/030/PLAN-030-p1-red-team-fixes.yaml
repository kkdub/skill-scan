# Skeleton opt-out: brownfield single-layer changes (7 independent fixes to existing detector modules)

parts:
  - id: a
    title: "Format resolvers + string reversal"
    status: Done
    requirements_covered: [R001, R002, R003, R-EFF001]
    approach:
      - step: "Add keyword arg support to _resolve_format_call"
        files: [src/skill_scan/_ast_split_helpers.py]
        notes: |
          Remove 'if node.keywords: return None' guard. Add keyword resolution loop:
          for each kw in node.keywords, resolve value via _resolve_single_expr, build
          kwargs dict. Compact the 3 isinstance guards to 2 lines to stay under 300.
          Widen _FORMAT_PLACEHOLDER_RE to r'\{(\w*)\}' to match {name} placeholders.
          Extend _substitute_format to accept optional kwargs dict and handle keyword
          field lookups alongside positional. File at 289/300 — must stay under 300.
      - step: "Add _resolve_format_map_call in _ast_split_resolve.py"
        files: [src/skill_scan/_ast_split_resolve.py]
        notes: |
          New function: detect '.format_map(dict_expr)' calls. Resolve the dict arg
          via _extract_dict_literal (for inline dicts) or symbol table lookup. Then
          substitute {name} placeholders using the resolved dict. Register in
          resolve_call chain after _resolve_format_call. File at 199/300 — room for ~20 lines.
          Import _extract_dict_literal or use inline extraction.
      - step: "Fix _resolve_slice_expr for negative step (string reversal)"
        files: [src/skill_scan/_ast_split_helpers.py]
        notes: |
          Change line 145 from 'step is not None and step <= 0' to
          'step is not None and step == 0'. This allows step=-1 (reversal)
          while still rejecting step=0 (invalid). Python's s[::-1] is well-defined.
      - step: "Add tests for format keywords, format_map, and string reversal"
        files: [tests/unit/test_ast_split_detector.py, tests/unit/test_ast_split_helpers.py]
        notes: |
          Test '{x}'.format(x='eval') resolves to 'eval'. Test mixed positional+keyword rejected.
          Test 'template'.format_map({'a': 'ev', 'b': 'al'}) resolves. Test 'lave'[::-1] resolves
          to 'eval'. Verify corpus files produce findings via analyze_python.
    criteria:
      - "_resolve_format_call resolves '{prefix}{suffix}'.format(prefix='ev', suffix='al') to 'eval'"
      - "_resolve_format_call still resolves positional args (no regression)"
      - "_resolve_format_call rejects **kwargs (kw.arg is None)"
      - "_resolve_format_map_call resolves 'template'.format_map({'a': 'ev', 'b': 'al'})"
      - "_resolve_format_map_call resolves template.format_map(parts) where both are tracked variables (matches corpus pattern)"
      - "_resolve_format_map_call is registered in resolve_call chain"
      - "_resolve_slice_expr resolves s[::-1] to reversed string when s is tracked"
      - "_resolve_slice_expr still rejects step=0"
      - "_ast_split_helpers.py stays under 300 lines"
      - "Corpus split_format_keywords.py produces EXEC-002 finding"
      - "Corpus format_map_evasion.py produces EXEC-002 finding"
      - "Corpus split_reverse.py produces EXEC-002 finding"

  - id: b
    title: "Map lambda chr + try/except imports"
    status: Done
    requirements_covered: [R004, R006, R-EFF001]
    approach:
      - step: "Extend _resolve_map_join to handle lambda c: chr(c)"
        files: [src/skill_scan/_ast_split_map_helpers.py]
        notes: |
          In _resolve_map_join, after the 'if not isinstance(func_arg, ast.Name): return None'
          guard, add a branch: if func_arg is ast.Lambda with a single arg and body is
          ast.Call to chr(arg), treat as equivalent to map(chr, ...). Check lambda body
          is chr(lambda_arg_name). File at 61/300 — ample room.
      - step: "Fix build_alias_map to recurse into ast.Try blocks"
        files: [src/skill_scan/_ast_helpers.py]
        notes: |
          In build_alias_map, after the existing for-loop over tree.body, add recursion
          for ast.Try nodes: walk node.body, node.handlers[].body, node.orelse, and
          node.finalbody for Import/ImportFrom (mirroring _recurse_control_flow pattern
          in _ast_symbol_table_helpers.py). File at 244/300 — room for ~15 lines.
          Handle ast.Try nodes encountered at top level of tree.body.
      - step: "Add tests for lambda map and try/except aliasing"
        files: [tests/unit/test_ast_split_map_helpers.py, tests/unit/test_ast_helpers.py]
        notes: |
          Test map(lambda c: chr(c), [101, 118, 97, 108]) resolves to 'eval' in join.
          Test build_alias_map captures 'from subprocess import call as harmless_func'
          inside try block. Verify corpus files produce findings.
    criteria:
      - "_resolve_map_join resolves map(lambda c: chr(c), [ints]) same as map(chr, [ints])"
      - "_resolve_map_join resolves map(lambda c: chr(c), tracked_name) via int_list_table (matches corpus pattern)"
      - "_resolve_map_join still handles ast.Name func (chr, str) — no regression"
      - "Lambda detection is specific: only single-arg lambda with chr(arg) body"
      - "build_alias_map walks ast.Try.body for imports inside try blocks"
      - "build_alias_map walks ast.Try.handlers[].body for imports inside except blocks"
      - "build_alias_map walks ast.Try.orelse for imports inside else blocks"
      - "build_alias_map walks ast.Try.finalbody for imports inside finally blocks"
      - "Existing import resolution still works (no regression)"
      - "Corpus split_map_lambda.py produces EXEC-002 finding"
      - "Corpus try_except_evasion.py produces EXEC-002 finding"

  - id: c
    title: "Subprocess list-args exfil detector"
    status: Done
    requirements_covered: [R005, R-EFF001]
    approach:
      - step: "Create _ast_exfil_detector.py with subprocess list-arg detection"
        files: [src/skill_scan/_ast_exfil_detector.py]
        notes: |
          New file. Detect subprocess.run/call/check_output/check_call/Popen where
          the first positional arg is an ast.List containing string constants matching
          network tool names: curl, wget, nc, ncat, netcat. Use get_call_name with
          alias_map. Emit EXFIL-001 finding (same rule_id as shell-style curl).
          _ast_detectors.py is at 294/300 — no room there, hence new file.
          Use direct Finding() constructor with category='data-exfiltration' (NOT _make_finding,
          which hardcodes category='malicious-code'). Follow node-level detector signature:
          (node, file_path, *, alias_map) -> list[Finding].
      - step: "Register new detector in _DETECTORS tuple"
        files: [src/skill_scan/ast_analyzer.py]
        notes: |
          Import _detect_subprocess_list_exfil from _ast_exfil_detector.
          Add to _DETECTORS tuple. Add re-export following facade pattern.
      - step: "Add tests for subprocess list-arg detection"
        files: [tests/unit/test_ast_exfil_detector.py]
        notes: |
          Test subprocess.run(['curl', '-d', data, url]) produces EXFIL-001.
          Test subprocess.check_output(['wget', url]) produces EXFIL-001.
          Test subprocess.run(['ls', '-la']) does NOT produce finding (no network tool).
          Test aliased import (import subprocess as sp; sp.run(['curl', ...])).
          Verify corpus file produces finding.
    criteria:
      - "_detect_subprocess_list_exfil detects subprocess.run(['curl', ...]) as EXFIL-001"
      - "Detection covers run, call, check_output, check_call, Popen"
      - "Detection resolves aliased subprocess imports via alias_map"
      - "Non-network-tool list args (e.g., ['ls', '-la']) do NOT produce findings"
      - "Single-arg subprocess calls (no list) do NOT produce findings from this detector"
      - "Detector registered in _DETECTORS tuple and re-exported from ast_analyzer.py"
      - "Corpus exfil_subprocess_curl.py produces EXFIL-001 finding"

  - id: d
    title: "Dict.update kwargs tracking"
    status: Done
    requirements_covered: [R007, R-EFF001]
    approach:
      - step: "Extract dict-collection functions to _ast_kwargs_dict_tracker.py"
        files: [src/skill_scan/_ast_kwargs_dict_tracker.py, src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          _ast_kwargs_detector.py is at 296/300 — cannot add ~20 lines for .update().
          Extract _collect_dict_assigns, _collect_from_body, _track_assign,
          _track_subscript_assign, _resolve_dict_operand, _track_union, _track_aug_union,
          _eval_constant_expr, _extract_dict_literal, _UNRESOLVABLE to new file.
          Re-import AND re-export in _ast_kwargs_detector.py so existing test imports
          (test_ast_kwargs_helpers, test_ast_kwargs_dict_union, test_ast_kwargs_truthy,
          test_ast_kwargs_chained_union, kwargs_test_helpers) continue working.
          Follow existing extraction pattern (e.g., _ast_split_method_chains.py).
      - step: "Add .update() call tracking in _ast_kwargs_dict_tracker.py"
        files: [src/skill_scan/_ast_kwargs_dict_tracker.py]
        notes: |
          In _collect_from_body, add branch for ast.Expr containing ast.Call where
          func is Attribute with attr=='update'. New _handle_update_call: resolve the
          dict arg (literal or tracked variable), merge into existing tracked dict
          (or create new entry). Follow the same pattern as _track_aug_union.
      - step: "Add tests for dict.update tracking"
        files: [tests/unit/test_ast_kwargs_detector.py]
        notes: |
          Test opts.update({'shell': True}) tracked in dict pre-pass.
          Test opts.update(other_dict) where other_dict is tracked.
          Test chained updates: opts.update(a); opts.update(b) merges both.
          Test .update() on untracked variable creates new entry.
          Verify corpus file produces finding.
    criteria:
      - "_collect_from_body handles ast.Expr(Call) where func.attr == 'update'"
      - "opts.update({'shell': True}) results in opts having shell=True in dict_assigns"
      - "Chained .update() calls merge correctly"
      - ".update() with non-dict arg (e.g., keyword args) is silently skipped"
      - "_ast_kwargs_detector.py stays under 300 lines after extraction"
      - "_ast_kwargs_dict_tracker.py stays under 300 lines"
      - "Extracted symbols (_collect_dict_assigns, _UNRESOLVABLE, _extract_dict_literal, etc.) re-exported from _ast_kwargs_detector.py to preserve existing test imports"
      - "Existing kwargs detection still works (no regression)"
      - "Corpus kwargs_method_chain.py produces EXEC-002 finding"

  - id: e
    title: "Red-team regression verification"
    status: Done
    depends_on: [a, b, c, d]
    requirements_covered: [R-EFF001, R-EFF002]
    approach:
      - step: "Fix run_corpus.py Finding attribute bug"
        files: [corpus/red-team/2026-03-17-full/run_corpus.py]
        notes: |
          Fix line 31: change f.file_path to f.file (Finding model uses 'file' not 'file_path').
          This is a runtime crash that blocks all corpus verification.
      - step: "Run full red-team corpus via run_corpus.py and capture results"
        files: []
        notes: |
          Execute corpus/red-team/2026-03-17-full/run_corpus.py and compare results
          against the baseline (54% overall evasion rate, 43 evasions / 80 inputs).
          All 7 P1 corpus inputs must now produce findings. Calculate new evasion rate.
      - step: "Verify each P1 corpus input individually"
        files: []
        notes: |
          For each of the 7 corpus files, confirm the expected rule_id fires:
          - split_format_keywords.py -> EXEC-002
          - format_map_evasion.py -> EXEC-002
          - split_reverse.py -> EXEC-002
          - try_except_evasion.py -> EXEC-002
          - exfil_subprocess_curl.py -> EXFIL-001
          - split_map_lambda.py -> EXEC-002
          - kwargs_method_chain.py -> EXEC-002
      - step: "Check for false positive regressions"
        files: []
        notes: |
          Run pytest on existing test suite. Confirm no new false positives in
          negative corpus (tests/fixtures/split_evasion/neg_*.py). Run make check.
      - step: "Update results.json and report findings delta"
        files: [corpus/red-team/2026-03-17-full/results.json]
        notes: |
          Regenerate results.json via run_corpus.py. Report the improvement:
          old evasion count vs new, old rate vs new. Flag any inputs that
          unexpectedly started or stopped being detected (collateral changes).
    criteria:
      - "All 7 P1 corpus inputs produce findings (zero evasions for P1 set)"
      - "Overall evasion rate decreased from 54% baseline"
      - "No new false positives in existing negative corpus"
      - "make check passes (full pre-commit suite: ruff, mypy, bandit, codespell, complexity, arch-smell, etc.)"
