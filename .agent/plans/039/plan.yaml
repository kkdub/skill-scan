      - "_detect_dunder_chain is re-exported from ast_analyzer.py facade"
      - "Chain of ().__class__.__base__.__subclasses__() produces EXEC-011 HIGH finding"
      - "Chain reaching __globals__ or __builtins__ produces EXEC-011 CRITICAL finding"
      - "Isolated obj.__class__ does NOT produce a finding"
      - "Isolated cls.__subclasses__() does NOT produce a finding"
      - "Subscript nodes in the middle of a chain (e.g., __mro__[1].__subclasses__()) do not break detection"
      - "Module is under 350 lines"

  - id: b
    title: "Unit tests"
    status: Done
    requirements_covered: [R-EFF001, R-EFF002]
    depends_on: [a]
    approach:
      - step: "Create test_dunder_chain_detector.py with canonical patterns, benign patterns, and edge cases"
        files: [tests/unit/test_dunder_chain_detector.py]
        notes: |
          Test groups:
          1. Canonical MRO walks — ().__class__.__base__.__subclasses__(),
             ''.__class__.__mro__[1].__subclasses__(), [].__class__.__bases__[0].__subclasses__()
          2. Execution escape chains — func.__globals__['__builtins__'].__import__('os'),
             obj.__class__.__base__.__subclasses__()[N].__init__.__globals__
          3. Benign dunder access (no findings) — obj.__class__, cls.__bases__,
             cls.__subclasses__(), type(x).__name__, __init_subclass__,
             obj.__class__.__name__ (multi-dunder but __name__ is not dangerous)
          4. Edge cases — subscript in middle of chain, non-dunder attr breaking chain,
             call wrapping intermediate step, chain on function return value
          5. Scanner-level e2e — at least 2 tests through _apply_rules/_deduplicate
             (follow test_dynamic_exec_scanner.py pattern) to verify findings propagate
             and deduplicate correctly
    criteria:
      - "At least 3 tests for canonical MRO walk patterns (R-EFF001)"
      - "At least 2 tests for execution escape patterns reaching __globals__/__builtins__"
      - "At least 3 tests for benign single-dunder access producing zero findings (R-EFF002)"
      - "At least 2 edge case tests (subscript mid-chain, non-dunder breaking chain)"
      - "At least 1 test for benign multi-dunder access (e.g., obj.__class__.__name__) producing zero findings"
      - "At least 2 scanner-level e2e tests through _apply_rules/_deduplicate"
      - "All tests pass via make check"

