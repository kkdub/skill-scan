parts:
  - id: a
    title: "TOML rule entry + detector module + registration"
    status: Done
    requirements_covered: [R001, R002, R003, R-IMP001, R-IMP002, R-IMP003]
    depends_on: []
    approach:
      - step: "Add EXEC-011 rule entry to malicious_code.toml with patterns=[] (AST-only)"
        files: [src/skill_scan/rules/data/malicious_code.toml]
        notes: "Follow OBFS-001 pattern: TOML entry exists for catalog/listing, but detection is purely AST"
      - step: "Create _ast_dunder_chain_detector.py with _detect_dunder_chain node-level detector"
        files: [src/skill_scan/_ast_dunder_chain_detector.py]
        notes: |
          Detection algorithm:
          1. Match ast.Attribute nodes where attr is in the dangerous dunder set
          2. Walk .value chain collecting consecutive dunder attrs
          3. If chain has 2+ dunders from the dangerous set → emit finding

          Dangerous dunder sets:
          - MRO_WALK_DUNDERS: __class__, __base__, __bases__, __mro__, __subclasses__
          - EXEC_ESCAPE_DUNDERS: __globals__, __builtins__, __import__, __getattr__, __code__

          Severity logic:
          - CRITICAL if chain contains any from EXEC_ESCAPE_DUNDERS
          - HIGH if chain contains 2+ from MRO_WALK_DUNDERS only

          Chain walking: walk Attribute.value recursively collecting dunder attrs.
          When .value is an ast.Subscript, skip through it (recurse into .value of the
          Subscript). When .value is an ast.Call, skip through it (recurse into .func).
          Stop when .value is not Attribute, Subscript, or Call — this handles chains
          like ''.__class__.__mro__[1].__subclasses__() and func().__class__.__base__.
          Use Finding() directly (not _make_finding, since _ast_detectors.py is frozen
          and _RECOMMENDATIONS cannot be extended).
      - step: "Register in ast_analyzer.py: import, add to _DETECTORS, re-export from facade"
        files: [src/skill_scan/ast_analyzer.py]
        notes: "Import _detect_dunder_chain, add to _DETECTORS tuple, add re-export block"
      - step: "Update test_rule_validation.py: add EXEC-011 to _AST_ONLY_RULES and ast_rule_ids"
        files: [tests/unit/test_rule_validation.py]
        notes: "Add 'EXEC-011' to _AST_ONLY_RULES frozenset (line 31) and ast_rule_ids set (line 103)"
      - step: "Regenerate RULES.md to include the new EXEC-011 entry"
        files: [RULES.md]
        notes: "Run `make rules-catalog` — test_rules_md_is_fresh enforces exact parity"
    criteria:
      - "EXEC-011 entry exists in malicious_code.toml with patterns=[], severity=high, category=malicious-code"
      - "_ast_dunder_chain_detector.py exports _detect_dunder_chain with signature (node, file_path, *, alias_map=None) -> list[Finding]"
