id: "PLAN-039"
title: "Detect Python object-graph walking (MRO dunder chain attacks)"
type: implementation
status: Done
created: 2026-03-23
linked_spec: null
description: |
  Add AST-based detection for Python object-graph walking attacks — the technique
  where attackers chain dunder attributes (__class__.__base__.__subclasses__()) to
  traverse the MRO and reach dangerous classes without imports. Heuristic-based,
  targeting the common dunder chains seen in SSTI exploits, CTF payloads, and
  sandbox escapes. Two severity tiers: HIGH for MRO-walk chains, CRITICAL when
  execution-enabling attrs (__globals__, __builtins__, __import__) are reached.

