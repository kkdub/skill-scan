    - R002  # _collect_int_list_assigns follows global declarations so int-list mutations in global-declaring functions update the module-level key
    - R003  # _collect_int_list_assigns follows nonlocal declarations so int-list mutations in nested functions update the enclosing scope key
    - R-IMP001  # All existing tests pass -- no regressions in symbol table or int-list tracking
    - R-IMP002  # File line limits respected: all modified files stay under 300 lines
