id: "PLAN-034"
title: "Scope chain tracking for multilevel nonlocal and int-list global/nonlocal"
type: implementation
status: Done
created: 2026-03-21
linked_spec: null
description: |
  Implement scope chain tracking to resolve two related debt items:
  DEBT-021-NONLOCAL-MULTILEVEL (symbol table: nonlocal writes only propagate
  one level up) and DEBT-028-INTLIST-GLOBAL-NONLOCAL (int-list pre-pass:
  global/nonlocal declarations not followed for mutations). Both share the
  same root cause — no scope chain resolution for nonlocal/global declarations.

alternatives: []
risks:
  - "_ast_symbol_table.py is at 290/300 lines; proper recursion ordering needs ~5-8 lines — may require extracting a helper to a sibling module"
  - "Recursion ordering in _process_nested is subtle: deepest nesting must be processed first so nonlocal writes propagate correctly up the chain"

