parts:
  - id: a
    title: "Malicious code detection (R4)"
    status: Done
    requirements_covered: [R4]
    files:
      - "src/skill_scan/rules/data/malicious_code.toml"
      - "tests/unit/test_rules_exec_detection.py"
      - "tests/unit/test_rules_exec_persistence.py"
    criteria:
      - "malicious_code.toml defines EXEC-001 through EXEC-005 with category 'malicious-code'"
      - "EXEC-001 (critical): curl|sh, wget|bash, iex(Invoke-WebRequest)"
      - "EXEC-002 (critical): eval(), exec(), os.system(), subprocess(shell=True)"
      - "EXEC-003 (high): base64 decode piped to shell, encoded PowerShell"
      - "EXEC-004 (high): crontab, LaunchAgents, systemd, shell profile writes"
      - "EXEC-005 (high): .exe/.dmg/.pkg download instructions, password-protected ZIPs"
      - "Each rule has patterns + exclude_patterns for documentation/educational context"
      - "Positive tests detect malicious inputs; negative tests allow safe documentation"
      - "Tests split across 2 files to stay under 250 lines each"
      - "make check passes"

  - id: b
    title: "Data exfiltration detection (R5)"
    status: Done
    requirements_covered: [R5]
    files:
      - "src/skill_scan/rules/data/data_exfiltration.toml"
      - "tests/unit/test_rules_exfil_detection.py"
    criteria:
      - "data_exfiltration.toml defines EXFIL-001 through EXFIL-004 with category 'data-exfiltration'"
      - "EXFIL-001 (critical): curl -s with POST data, hidden network calls"
      - "EXFIL-002 (high): ~/.ssh, ~/.aws, ~/.gnupg, .env, /etc/shadow, browser cred stores"
      - "EXFIL-003 (high): Discord/Slack webhooks, callback URLs, phone-home patterns"
      - "EXFIL-004 (high): os.environ, printenv, process.env bulk access"
      - "EXFIL-002 does NOT flag 'protect your ~/.ssh directory' (educational context)"
      - "EXFIL-004 does NOT flag os.environ.get('HOME', '/tmp') (single var with default)"
      - "make check passes"

  - id: c
    title: "Credential exposure detection (R6)"
    status: Done
    requirements_covered: [R6]
    files:
      - "src/skill_scan/rules/data/credential_exposure.toml"
      - "tests/unit/test_rules_cred_detection.py"
    criteria:
      - "credential_exposure.toml defines CRED-001 through CRED-003 with category 'credential-exposure'"
      - "CRED-001 (critical): AWS keys (AKIA...), GitHub tokens (ghp_), OpenAI keys (sk-), Slack tokens (xox), Google keys (AIza), private key blocks, JWTs"
      - "CRED-002 (high): instructions to pass tokens through conversation"
      - "CRED-003 (high): password='actual_value', secret='literal'"
      - "CRED-001 does NOT flag AKIA[YOUR_KEY_HERE], sk-xxxxxxxxxxxx, ghp_example, {{API_KEY}}, <YOUR_TOKEN>"
      - "CRED-003 does NOT flag password='changeme', password=os.environ.get('DB_PASSWORD'), secret='<YOUR_SECRET>'"
      - "All placeholder/example exclusions verified in negative tests"
      - "make check passes"

  - id: d
    title: "Supply chain risk detection (R7)"
    status: Done
    requirements_covered: [R7]
    files:
      - "src/skill_scan/rules/data/supply_chain.toml"
      - "tests/unit/test_rules_supply_chain_detection.py"
    criteria:
      - "supply_chain.toml defines SC-001 through SC-004 with category 'supply-chain'"
      - "SC-001 (medium): SKILL.md or config loaded from external URLs"
      - "SC-002 (medium): pip install <pkg> without version pin"
      - "SC-003 (medium): path traversal (../), absolute paths (/etc, /usr, C:\\), system dir access"
      - "SC-004 (high): 'paste this command in your terminal', fake error messages with commands (ClickFix)"
      - "SC-002 does NOT flag 'pip install -r requirements.txt' or 'pip install -e .'"
      - "SC-003 does NOT flag ./config.toml or /dev/null (safe relative/null-device paths)"
      - "SC-003 detects single ../ traversal, not just ../../ (per spec R7 SC-003)"
      - "SC-003 detects absolute paths to system directories (/etc/passwd, /usr/bin, C:\\Windows)"
      - "make check passes"

  - id: e
    title: "File safety checks (R8)"
    status: Done
    requirements_covered: [R8]
    files:
      - "src/skill_scan/file_checks.py"
      - "src/skill_scan/config.py"
      - "src/skill_scan/scanner.py"
      - "tests/unit/test_file_checks.py"
      - "tests/unit/test_scanner.py"
    criteria:
      - "file_checks.py has pure functions for FS-002 through FS-007"
      - "FS-002 (high): binary file detected (.exe, .dll, .so, .wasm, .pyc) — spec says 'block'"
      - "FS-003 (medium): unknown file extension not in allowlist and not binary — spec says 'flag'"
      - "FS-004 (high): symlink pointing outside skill directory — spec says 'block' for outside-skill symlinks"
      - "FS-005 (medium): file exceeds size limit (>500KB) — spec says 'flag'"
      - "FS-006 (medium): total skill size >5MB — spec says 'flag'"
      - "FS-007 (medium): file count >100 — spec says 'flag'"
      - "_DEFAULT_EXTENSIONS updated to include .jinja2 (per spec R8 extension allowlist)"
      - "ScanConfig gains max_total_size (5MB), max_file_count (100), BINARY_EXTENSIONS constant"
      - "_collect_files() returns tuple[list[Path], list[Finding]]"
      - "scan() under 50 lines; scanner.py under 250 lines"
      - "All 6 new finding types tested in test_file_checks.py"
      - "Existing scanner tests in test_scanner.py updated for new return type and FS findings"
      - "test_scan_skips_non_text_files updated: still no prompt-injection findings, but may have FS-003"
      - "test_scan_skips_oversized_files updated: still no prompt-injection findings, but gets FS-005"
      - "make check passes"

  - id: f
    title: "Security hardening + integration tests"
    status: Done
    depends_on: [a, b, c, d, e]
    requirements_covered: [R-hardening]
    files:
      - "src/skill_scan/rules/engine.py"
      - "tests/integration/test_cli.py"
      - ".pre-commit-config.yaml"
    criteria:
      - "ReDoS mitigation documented in engine.py module docstring"
      - "Documentation notes: patterns are author-controlled, inputs bounded by max_file_size, line-by-line processing limits blast radius"
      - "Codespell skip list updated for new TOML rule files"
      - "Integration test: scan skill with EXEC patterns -> exit code 2 (BLOCK)"
      - "Integration test: scan skill with CRED patterns -> exit code 2 (BLOCK)"
      - "make check passes"

  - id: g
    title: "Corpus revalidation"
    status: Done
    depends_on: [f]
    requirements_covered: [R4, R5, R6, R7, R8]
    notes: |
      External dependency: 34-skill corpus at ../split-docs/downloaded_skills/.
      Manual validation step. Results recorded in evidence section.
    criteria:
      - "Re-run against 34-skill test corpus"
      - "No regressions: previously clean skills still PASS"
      - "New true positives documented"
      - "No ReDoS-like slowdowns (scan completes in <5s per skill)"
      - "Results recorded in evidence section"
      - "make check passes"

