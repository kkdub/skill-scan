id: "PLAN-003"
title: "Complete Detection Coverage (R4-R8)"
type: implementation
status: Done
created: 2026-02-15
priority: high

linked_spec: ".agent/plans/001/SPEC-001-skill-audit.md"

description: |
  Complete all detection capabilities so skill-scan covers every threat
  category from SPEC-001. After PLAN-001 (MVP) and PLAN-002 (hardening),
  the scanner only detects prompt injection (R3). Four rule categories
  remain unbuilt: malicious code (R4), data exfiltration (R5), credential
  exposure (R6), supply chain risk (R7). File safety checks (R8) are
  partial (symlinks skipped, FS-001 encoding errors) but not complete.

  When PLAN-003 is done, the scanner detects all security issues from the
  spec. Not in scope (PLAN-004): --repo, --fail-on, --format json,
  --config CLI flags, JSON output (R9), configurable rules (R10).

