    - "_ast_symbol_table.py (244/250) — no changes in this plan"
    - "_ast_helpers.py (244/250) — FULL, no new code"
    - "_ast_detectors.py (234/250) — FULL, no new code"
    - "content_scanner.py (239/250) — no changes"
