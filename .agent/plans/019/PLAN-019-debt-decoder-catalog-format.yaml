# ---------------------------------------------------------------------------
# PARTS
# ---------------------------------------------------------------------------

parts:
  - id: a
    title: "Decoder sanitization — surrogate stripping and null-byte removal"
    status: Done
    requirements_covered: [R001, R002, R-IMP001, R-IMP002, R-IMP003, R-IMP004, R-EFF001, R-EFF002]
    approach:
      - step: "Add surrogate stripping to _decode_unicode_escape() and null-byte stripping to _decode_url_encoded()"
        files: [src/skill_scan/_decoder_url_unicode.py]
        notes: >
          Surrogate stripping: strip chars where 0xD800 <= ord(c) <= 0xDFFF from the
          decoded output string. Null-byte stripping: .replace('\x00', '') on decoded
          output. Both are one-liners appended before the return statement. File is at
          97/250 lines so capacity is ample.
      - step: "Add regression tests for sanitization"
        files: [tests/unit/test_decoder_url_unicode.py]
        notes: >
          Test surrogate boundary values U+D800, U+DC00, U+DFFF. Test null-byte removal
          with %00-encoded payload. Test that non-surrogate and non-null chars are preserved.
          Test effectiveness: surrogate-mixed payloads produce clean strings, null-interspersed
          payloads enable downstream name detection.
    criteria:
      - "_decode_unicode_escape() returns a string with no characters in U+D800-U+DFFF range"
      - "_decode_unicode_escape() handles isolated high surrogates (D800-DBFF) and low surrogates (DC00-DFFF) without raising exceptions"
      - "_decode_url_encoded() returns a string with no null bytes"
      - "_decode_url_encoded() preserves all non-null characters unchanged"
      - "Tests cover boundary values U+D800, U+DC00, U+DFFF for surrogate stripping"
      - "Tests cover %00-encoded payload for null-byte stripping"
      - "make check passes"

  - id: b
    title: "OBFS-001 catalog entry in generate_rules_catalog.py"
    status: Done
    requirements_covered: [R003, R-IMP005, R-IMP006]
    approach:
      - step: "Add OBFS-001 RuleInfo to _PROCEDURAL_RULES list"
        files: [scripts/generate_rules_catalog.py]
        notes: >
          Add RuleInfo('OBFS-001', 'high', 'obfuscation', description, 'stable', 'procedural')
          to the existing _PROCEDURAL_RULES list. The 'obfuscation' category already exists
          in _CATEGORY_ORDER and _CATEGORY_TITLES. Confirm no other AST-only rule IDs are
          missing by comparing _PROCEDURAL_RULES + TOML rules against all rule_id= strings
          in _ast_detectors.py, _ast_rot13.py, and _ast_split_detector.py.
      - step: "Regenerate RULES.md and verify catalog output"
        files: [RULES.md]
        notes: >
          Run make rules-catalog. Verify OBFS-001 appears in the Obfuscation section
          with severity=high, confidence=stable. Commit updated RULES.md.
    criteria:
      - "_PROCEDURAL_RULES contains an OBFS-001 entry with severity 'high', category 'obfuscation', confidence 'stable', source 'procedural'"
      - "RULES.md Obfuscation section includes OBFS-001 row"
      - "No other AST-only procedural rule IDs are missing from the catalog"
      - "make check passes"

  - id: c
    title: "str.format() and %-format evasion detection"
    status: Done
    requirements_covered: [R004, R005, R006, R-IMP007, R-IMP008, R-IMP009, R-IMP010, R-IMP011, R-IMP012, R-EFF003, R-EFF004]
    approach:
      - step: "Create _ast_split_helpers.py with _resolve_format_call() and _resolve_percent_format()"
        files: [src/skill_scan/_ast_split_helpers.py]
        notes: >
          New file. _resolve_format_call(node, symbol_table, scope) handles
          'template'.format(a, b) — gates on string-constant receiver (ast.Constant
          str on func.value). Resolves positional args from symbol_table via _scoped_lookup.
          Substitutes {} placeholders with resolved values.
          _resolve_percent_format(node, symbol_table, scope) handles '%s%s' % (a, b) —
          gates on BinOp(Mod) with string-constant LHS. Resolves tuple elements from
          symbol_table. Substitutes %s placeholders.
          Both return str|None. Import _scoped_lookup from _ast_split_detector.
          Keep under 250 lines.
      - step: "Wire helpers into detect_split_evasion() via _try_resolve_split()"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: >
          Import _resolve_format_call and _resolve_percent_format from _ast_split_helpers.
          Add dispatch in _try_resolve_split() for ast.Call (format) and ast.BinOp(Mod)
          (percent). File is at 249/250 so the import and dispatch must be offset by
          freeing lines — consider collapsing comments, inlining a small helper, or
          moving an existing helper to _ast_split_helpers.py to make room. The
          detect_split_evasion() signature must remain unchanged.
      - step: "Add positive corpus fixtures and tests"
        files:
          - tests/fixtures/split_evasion/pos_format_eval.py
          - tests/fixtures/split_evasion/pos_format_exec.py
          - tests/fixtures/split_evasion/pos_percent_eval.py
          - tests/unit/test_ast_split_detector.py
        notes: >
          Create at least 3 positive fixtures that assemble dangerous names via
          str.format() and %-formatting. Add tests verifying EXEC-002/EXEC-006
          findings. Verify all 4 existing negative fixtures still produce zero
          findings. Verify safe format patterns do not trigger.
    criteria:
      - "_ast_split_helpers.py exists with _resolve_format_call() and _resolve_percent_format()"
      - "_resolve_format_call() resolves patterns only when receiver is a string constant"
      - "_resolve_percent_format() resolves patterns only when LHS is a string constant (not integer modulo)"
      - "_ast_split_detector.py imports and calls helpers from _ast_split_helpers.py"
      - "detect_split_evasion() signature is unchanged"
      - "Resolved strings pass through existing _check_dangerous() and _check_encoded() pipeline"
      - "At least 3 new positive fixtures exist for format and %-format evasion"
      - "All existing negative fixtures (neg_safe_*.py) still produce zero findings"
      - "make check passes"

