id: "PLAN-019"
title: "Decoder sanitization, catalog gap, and format-string evasion"
type: implementation
status: Done
created: 2026-03-12

linked_spec: ".agent/status/debt.yaml"

# ---------------------------------------------------------------------------
# DESCRIPTION
# ---------------------------------------------------------------------------

description: |
  Resolve 4 debt items from PLAN-017 and PLAN-018:

  1. Lone surrogate characters (U+D800-U+DFFF) pass through unicode_escape
     decode — add post-decode sanitization to strip surrogates.

  2. Null bytes in URL-decoded content may evade pattern matching — strip
     null bytes from decoded output.

  3. OBFS-001 (AST-only ROT13 rule) absent from RULES.md catalog — add
     procedural rule entry and regenerate catalog.

  4. Split detector does not resolve str.format() or %-formatting string
     assembly — add resolution helpers in new _ast_split_helpers.py module
     (DEBT-018-T2-FORMAT, 3 evasions).

# ---------------------------------------------------------------------------
# REQUIREMENTS
# ---------------------------------------------------------------------------

requirements:
  file: REQUIREMENTS-019.yaml
  ids:
    - R001    # Surrogate stripping in _decode_unicode_escape()
    - R002    # Null-byte stripping in _decode_url_encoded()
    - R003    # OBFS-001 entry in _PROCEDURAL_RULES
    - R004    # str.format() resolution in split detector
    - R005    # %-formatting resolution in split detector
    - R006    # New _ast_split_helpers.py module (file capacity)
    - R-IMP001  # Surrogate handling without exception
    - R-IMP002  # Surrogate boundary regression tests
    - R-IMP003  # Null-byte stripping scope (only \x00)
    - R-IMP004  # %00-encoded payload test
    - R-IMP005  # OBFS-001 in Obfuscation section of catalog output
    - R-IMP006  # No other AST-only rules missing from catalog
    - R-IMP007  # detect_split_evasion() signature unchanged
    - R-IMP008  # Format resolution gates on string-constant receiver
    - R-IMP009  # %-format gates on string-constant LHS
    - R-IMP010  # Resolved strings use existing _check_dangerous/_check_encoded
    - R-IMP011  # Corpus positive fixtures for format/%-format
    - R-IMP012  # Existing negatives still produce zero findings
    - R-EFF001  # Surrogate-free strings enable downstream matching
    - R-EFF002  # Null-free strings enable dangerous name detection
    - R-EFF003  # 3/3 format evasions detected
    - R-EFF004  # Zero false positives from format resolution
  uncovered: []

