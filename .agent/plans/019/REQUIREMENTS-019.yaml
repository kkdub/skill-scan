requirements:
  # --- Explicit requirements (from spec) ---

  - id: R001
    description: "_decode_unicode_escape() strips all lone surrogate characters (U+D800-U+DFFF) from decoded output before returning"
    category: security
    source: "debt.yaml item 1 / src/skill_scan/_decoder_url_unicode.py:82-97"
    contract:
      given: "Input string containing \\uD800 or other surrogates mixed with valid escapes"
      when: "_decode_unicode_escape(text) is called"
      then: "Returned string contains no characters with 0xD800 <= ord(c) <= 0xDFFF"
    acceptance:
      - "Return value contains no surrogate characters"
      - "Non-surrogate decoded characters are preserved unchanged"
    verify: "test::tests/unit/test_decoder_url_unicode.py"
    status: done

  - id: R002
    description: "_decode_url_encoded() strips all null bytes (\\x00) from decoded output before returning"
    category: security
    source: "debt.yaml item 2 / src/skill_scan/_decoder_url_unicode.py:68-79"
    contract:
      given: "URL-encoded string like %65%00%76%61%6C"
      when: "_decode_url_encoded(text) is called"
      then: "Returned string is 'eval' with no \\x00 bytes"
    acceptance:
      - "Return value contains no \\x00 character"
      - "Non-null decoded characters are preserved unchanged"
    verify: "test::tests/unit/test_decoder_url_unicode.py"
    status: done

  - id: R003
    description: "_PROCEDURAL_RULES in generate_rules_catalog.py contains OBFS-001 entry with correct metadata"
    category: functional
    source: "debt.yaml item 3 / scripts/generate_rules_catalog.py:37-71"
    contract:
      given: "_PROCEDURAL_RULES list"
      when: "Searched for rule_id == 'OBFS-001'"
      then: "Exactly one RuleInfo with severity='high', category='obfuscation', confidence='stable', source='procedural'"
    acceptance:
      - "OBFS-001 entry exists in _PROCEDURAL_RULES"
      - "All metadata fields match spec"
    verify: "grep::OBFS-001::scripts/generate_rules_catalog.py"
    status: done

