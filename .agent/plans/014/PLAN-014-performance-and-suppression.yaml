id: "PLAN-014"
title: "Concurrent Scanning & Inline Suppression"
type: implementation
status: Proposed
created: 2026-03-06

linked_spec: null

description: |
  Two operational improvements that make skill-scan faster and more usable
  for legitimate developers:

  1. Concurrent scanning: Wrap file scanning in ProcessPoolExecutor. The existing
     models (Finding, Rule, ScanResult) are frozen dataclasses, making them
     process-safe. Skip multiprocessing for small file counts to avoid overhead.

  2. Inline suppression: Support # noqa: RULE-ID comments to suppress specific
     findings. Bare # noqa (no rule ID) is NOT supported — this is a security
     scanner, and blanket suppression defeats the purpose. Suppressed findings
     are counted in ScanResult.suppressed_count so auditors can see when
     suppressions are used.

