requirements:

  # --- Concurrency requirements ---

  - id: R001
    requirement: "Content scanning runs concurrently using ProcessPoolExecutor for CPU-bound regex matching"
    category: performance
    contract:
      given: "A skill directory with 50+ files"
      when: "scan_all_files() is called"
      then: "Files are distributed across worker processes; results are equivalent to sequential scan"
    verify: test::tests/unit/test_content_scanner.py
    status: pending

  - id: R002
    requirement: "Concurrent scanning produces identical results to sequential scanning"
    category: reliability
    contract:
      given: "A skill directory scanned sequentially and then concurrently"
      when: "Results are compared"
      then: "Same findings (order-independent), same bytes_scanned, same files_skipped"
    verify: test::tests/unit/test_content_scanner.py
    status: pending

  - id: R003
    requirement: "Worker count is configurable with a sensible default (os.cpu_count() or 4)"
    category: functional
    contract:
      given: "No explicit worker count configured"
      when: "scan_all_files() runs"
      then: "Uses min(os.cpu_count(), 8) workers; can be overridden via ScanConfig"
    verify: test::tests/unit/test_content_scanner.py
    status: pending

  - id: R004
    requirement: "Small file counts (< threshold) skip multiprocessing overhead and run sequentially"
    category: performance
    contract:
      given: "A skill directory with 3 files"
      when: "scan_all_files() is called"
      then: "Files are scanned sequentially (no ProcessPoolExecutor created)"
    verify: test::tests/unit/test_content_scanner.py
    status: pending

  # --- Inline suppression requirements ---

  - id: R005
    requirement: "Inline comments suppress specific findings: # noqa: RULE-ID"
    category: functional
    contract:
      given: "A file line with eval() and comment '# noqa: EXEC-002'"
      when: "Line is scanned"
      then: "EXEC-002 finding is suppressed; other rules still fire on the same line"
    verify: test::tests/unit/test_suppression.py
    status: pending

  - id: R006
    requirement: "Inline suppression works with multiple rule IDs: # noqa: PI-001, EXEC-002"
    category: functional
    contract:
      given: "A file line with '# noqa: PI-001, EXEC-002'"
      when: "Line is scanned"
      then: "Both PI-001 and EXEC-002 are suppressed; other rules still fire"
    verify: test::tests/unit/test_suppression.py
    status: pending

  - id: R007
    requirement: "Suppressed findings are tracked in ScanResult.suppressed_count"
    category: functional
    contract:
      given: "A scan with 3 suppressed findings via noqa comments"
      when: "Scan completes"
      then: "ScanResult.suppressed_count == 3; suppressed findings do not appear in findings tuple"
    verify: test::tests/unit/test_suppression.py
    status: pending

  - id: R008
    requirement: "Text and JSON formatters report suppressed count when > 0"
    category: ux
    contract:
      given: "A ScanResult with suppressed_count=3"
      when: "Formatted as text or JSON"
      then: "Output includes '3 findings suppressed via noqa' (text) or 'suppressed_count': 3 (JSON)"
    verify: test::tests/unit/test_suppression.py
    status: pending

  # --- Implicit requirements ---

  - id: R-IMP001
    requirement: "ProcessPoolExecutor gracefully falls back to sequential on platforms that don't support multiprocessing"
    category: reliability
    verify: null
    status: pending

  - id: R-IMP002
    requirement: "noqa comment parsing is case-insensitive and whitespace-tolerant"
    category: reliability
    contract:
      given: "Comments like '# NOQA: PI-001', '#noqa:PI-001', '# noqa:  PI-001'"
      when: "Parsed for suppression"
      then: "All variants correctly suppress PI-001"
    verify: test::tests/unit/test_suppression.py
    status: pending

  - id: R-IMP003
    requirement: "Bare # noqa (no rule ID) is NOT supported — must specify rule IDs"
    category: security
    contract:
      given: "A line with '# noqa' (no rule ID)"
      when: "Line is scanned"
      then: "No suppression occurs; all findings are reported as normal"
    verify: test::tests/unit/test_suppression.py
    status: pending

  - id: R-IMP004
    requirement: "No new production dependencies for either feature"
    category: reliability
    verify: null
    status: pending

