# Skeleton: opt-out
# Category: config-only change (no application logic)
# Justification: Dockerfile and .dockerignore only. No source code changes.

parts:
  - id: a
    title: "Dockerfile and .dockerignore"
    status: Pending
    requirements_covered: [R001, R002, R003, R004, R-IMP001, R-IMP002, R-IMP003]
    approach:
      - step: "Create .dockerignore"
        files: [.dockerignore]
        notes: >
          Exclude: .git, .github, .agent, .venv, __pycache__, tests/, scripts/,
          *.pyc, *.egg-info, .mypy_cache, .pytest_cache, .ruff_cache, Makefile,
          *.md (except README.md and rule data). Keep src/, pyproject.toml, README.md.
      - step: "Create Dockerfile"
        files: [Dockerfile]
        notes: >
          FROM python:3.13-slim. Create non-root user 'scanner'. COPY source and
          pyproject.toml. RUN pip install --no-cache-dir . (installs skill-scan from
          source with click dependency). WORKDIR /scan. USER scanner.
          ENTRYPOINT ["skill-scan"]. No uv in container — pip is sufficient for
          production install. Keep image simple — no multi-stage needed since
          there's no compilation step.
    criteria:
      - "Dockerfile uses python:3.13-slim base image"
      - "Container runs as non-root user 'scanner'"
      - "ENTRYPOINT is skill-scan (container acts as the CLI)"
      - ".dockerignore excludes tests, .git, .agent, .github, .venv, __pycache__"
      - "docker build succeeds without errors"
      - "docker run skill-scan scan --help outputs help text"

