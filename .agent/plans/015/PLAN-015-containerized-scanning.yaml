id: "PLAN-015"
title: "Containerized Scanning (Dockerfile)"
type: implementation
status: Proposed
created: 2026-03-06

linked_spec: null

description: |
  Provide a Dockerfile so users can run skill-scan in an isolated container.
  This addresses the risk of scanning potentially malicious code — the container
  cannot access the host filesystem beyond the mounted volume.

  Uses python:3.13-slim base image, non-root user, minimal image with only
  production dependencies. Single part — config-only, no application code changes.

