id: "PLAN-032"
title: "Fix 9 remaining fixable red-team evasion vectors across 5 independent subsystems"
type: implementation
status: Done
created: 2026-03-19
linked_spec: "corpus/red-team/2026-03-17-full/report.md"
description: |
  Fix the 9 "worth fixing" evasion vectors remaining after P0 (PLAN-029), P1 (PLAN-030),
  and P2 (PLAN-031). Current evasion rate: 32.9% (26/79 — post PLAN-029/030/031; the
  linked report shows the original 54% baseline before those fixes).
  Parts A-D can execute in parallel; Part E depends on all of them.

  Group A (int-list): concat via +, extend(tracked_var), class-body tracking
  Group B (kwargs): dynamic concatenated key
  Group C (split resolvers): star unpack in join, list index concat
  Group D (symbol table): class-level string assembly, dict.pop(), class-body scope propagation
  Group E (decoder): hex with escape-sequence separators (AST variable propagation)

  Expected to reduce evasion rate by ~11 percentage points (9/79).

