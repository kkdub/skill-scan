  file: null
  ids:
    - R001  # int-list + concat: part1 + part2 resolves in pre-pass
    - R002  # int-list extend-var: .extend(tracked_var) resolves tracked variable
    - R003  # int-list class body: class-level codes = [ints] tracked in pre-pass
    - R004  # kwargs dynamic key: concatenated string key resolves in dict tracker
    - R005  # star unpack in join: ''.join([*parts1, *parts2]) resolves
    - R006  # list index concat: parts[0] + parts[1] resolves via list element tracking
    - R007  # class-level string assembly: prefix + suffix in class body tracked
    - R008  # dict.pop() tracking: funcs.pop('target') resolves to tracked value
    - R009  # hex whitespace stripping: bytes.fromhex with tab/newline handled
    - R-EFF001  # All 9 corpus inputs produce findings when scanned
    - R-EFF002  # Overall corpus evasion rate improves from 32.9% baseline
  uncovered: []

