# Skeleton opt-out: brownfield single-layer changes (9 independent fixes to existing detector modules)

parts:
  - id: a
    title: "Int-list concat, extend-var, and class body tracking"
    status: Done
    requirements_covered: [R001, R002, R003, R-EFF001]
    approach:
      - step: "Add int-list + concat tracking in _ast_split_int_list_helpers.py"
        files: [src/skill_scan/_ast_split_int_list_helpers.py]
        notes: |
          In _handle_assign, when the RHS is ast.BinOp(Add) and BOTH operands
          resolve to tracked int-lists (via key lookup in result), concatenate
          them. E.g. `codes = part1 + part2` where both are tracked.
          Also handle in _extend_tracked: when the extend value is ast.Name
          referencing a tracked int-list variable, extend with its value.
          File at 75/300 — ample room (~20 lines added).
      - step: "Support .extend(tracked_var) in _extend_tracked"
        files: [src/skill_scan/_ast_split_int_list_helpers.py]
        notes: |
          Currently _extend_tracked returns early if value is not List|Tuple.
          Add a branch: if value is ast.Name, look up the variable in result
          (with scope prefix). If found and not _SHADOW, extend with its values.
          ~8 lines.
      - step: "Extend _collect_int_list_assigns to walk class bodies directly"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          In _collect_int_list_assigns, the ClassDef branch only walks methods
          (stmt in node.body if isinstance FunctionDef). Add a call to
          _collect_int_lists_from_body(node.body, node.name, result) BEFORE
          the method walk — this tracks class-level int-list assignments like
          `codes = [101, 118, 97, 108]` under 'ClassName.codes'.
          File at 298/300 — only 2 lines available. The class body walk is
          1 line added inside the existing ClassDef elif block. May need to
          compact existing code (combine lines) to fit.
      - step: "Add tests for all three int-list fixes"
        files: [tests/unit/test_ast_split_int_list_helpers.py, tests/unit/test_ast_split_join_helpers.py]
        notes: |
          Test part1 + part2 concat resolves to combined list.
          Test .extend(tracked_var) resolves tracked variable.
          Test class-level codes = [ints] tracked under ClassName.codes.
          Verify corpus split_intlist_concat.py, split_intlist_extend_var.py,
          split_class_level.py all produce EXEC-002 findings.
    criteria:
      - "_handle_assign resolves BinOp(Add) of two tracked int-lists to concatenated list"
      - "_extend_tracked resolves ast.Name argument via result lookup (extend with tracked var)"
      - "_collect_int_list_assigns walks ClassDef body directly (not just methods)"
      - "Class-level int-list tracked under 'ClassName.varname' key"
      - "Existing int-list tracking unchanged (no regression on +=, .extend([literal]))"
      - "_ast_split_int_list_helpers.py stays under 300 lines"
      - "_ast_split_join_helpers.py stays under 300 lines"
      - "Corpus split_intlist_concat.py produces EXEC-002 finding"
      - "Corpus split_intlist_extend_var.py produces EXEC-002 finding"
      - "Corpus split_class_level.py produces EXEC-002 finding"

  - id: b
    title: "Kwargs dynamic concatenated key"
    status: Done
    requirements_covered: [R004, R-EFF001]
    approach:
      - step: "Resolve concatenated string keys in _extract_dict_literal"
        files: [src/skill_scan/_ast_kwargs_dict_tracker.py]
        notes: |
          Currently _extract_dict_literal (line 196-200) only handles
          ast.Constant string keys. Add a branch: if the key is ast.BinOp(Add),
          attempt to resolve via a local helper _resolve_string_concat that
          recursively resolves BinOp(Add) of string Constants.
          E.g. key_node = BinOp('sh' + 'ell') resolves to 'shell'.
          Also handle the pattern where the key is an ast.Name referencing a
          variable tracked in the symbol table — but since _extract_dict_literal
          doesn't have access to symbol_table, the simpler approach is to handle
          only inline BinOp(Add) of constants. The corpus case uses
          `key = 'sh' + 'ell'; opts = {key: True}` — the key is a Name, not
          inline BinOp. So we need to also resolve Name keys via a pre-pass
          that tracks simple string assignments.
          Better approach: add a simple local string table to _collect_from_body
          that tracks Name = Constant|BinOp(Add) string assignments, then pass
          it to _extract_dict_literal for Name key resolution.
          File at 201/300 — ~40 lines available, sufficient.
      - step: "Add tests for dynamic key resolution"
        files: [tests/unit/test_ast_kwargs_dict_tracker.py]
        notes: |
          Test {key: True} where key = 'sh' + 'ell' resolves to {'shell': True}.
          Test inline BinOp key {('sh'+'ell'): True} resolves.
          Test non-string Name key returns None gracefully.
          Verify corpus kwargs_dynamic_key.py produces EXEC-002 finding.
    criteria:
      - "Dict with Name key resolves when variable is assigned string constant or BinOp(Add) of constants"
      - "Dict with inline BinOp(Add) string key resolves"
      - "Non-resolvable Name keys do not crash (graceful None)"
      - "Existing constant-key dict extraction unchanged (no regression)"
      - "_ast_kwargs_dict_tracker.py stays under 300 lines"
      - "Corpus kwargs_dynamic_key.py produces EXEC-002 finding"

  - id: c
    title: "Star unpack in join + list index concat"
    status: Done
    requirements_covered: [R005, R006, R-EFF001]
    approach:
      - step: "Handle ast.Starred elements in _resolve_join_elements or _resolve_join_call"
        files: [src/skill_scan/_ast_split_helpers.py, src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          When _resolve_join_call encounters a List arg containing ast.Starred
          elements, flatten them before resolving. E.g. [*parts1, *parts2] where
          parts1 and parts2 are tracked lists in symbol_table.
          Option A: In _resolve_join_call, before calling _resolve_join_elements,
          check if any elt is ast.Starred. If so, expand each Starred via symbol
          table lookup (the value would be a joined string — split it back?).
          Problem: symbol_table stores strings, not lists.
          Option B: Add a list-element tracking pre-pass (parallel to int-list).
          Store list elements as symbol_table entries like 'parts1[0]' = 'ev'.
          Then when flattening [*parts1, *parts2], look up parts1[0], parts1[1], etc.
          This also solves R006 (list index concat).
          Better approach: In _collect_assignments / _walk_body, when encountering
          Name = [str_constants], store each element as 'name[0]' = val,
          'name[1]' = val, etc. in the symbol table. This enables both:
          - parts[0] + parts[1] to resolve via existing BinOp chain
          - [*parts1, *parts2] to flatten by looking up name[0]..name[N]
          Implementation: add _track_list_elements in _ast_symbol_table_helpers.py.
          For star unpack flattening, add a helper in _ast_split_join_helpers.py or
          _ast_split_helpers.py that expands Starred nodes.
          _ast_split_helpers.py at 299/300 — NO room. Must go elsewhere.
          _ast_split_join_helpers.py at 298/300 — NO room.
          New file: _ast_split_star_helpers.py for star-unpack flattening (~30 lines).
          Symbol table list tracking goes in _ast_symbol_table_helpers.py (274/300 — 26 lines available).
      - step: "Track string-list elements in symbol table"
        files: [src/skill_scan/_ast_symbol_table_helpers.py]
        notes: |
          In _handle_assign (or parallel to it), when RHS is ast.List/Tuple of
          all string Constants, store 'name[0]' = val0, 'name[1]' = val1, etc.
          Also store 'name.__len__' = str(len) for star-unpack expansion.
          ~15 lines. File at 274/300 — tight but feasible.
      - step: "Add star-unpack flattening for join arguments"
        files: [src/skill_scan/_ast_split_star_helpers.py]
        notes: |
          New file. _flatten_starred_list(elts, symbol_table, scope) -> list[ast.expr] | None.
          For each elt: if ast.Starred and elt.value is ast.Name, look up
          'name[0]', 'name[1]', ... in symbol_table (use 'name.__len__' for count).
          Replace Starred with synthetic ast.Constant nodes for the resolved values.
          Non-Starred elts pass through unchanged.
          Called from _resolve_join_call when List arg contains Starred.
          ~40-50 lines.
      - step: "Wire star-unpack into _resolve_join_call"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          In _resolve_join_call, when arg is List and any elt is ast.Starred,
          call _flatten_starred_list first, then pass flattened elts to
          _resolve_join_elements. 2-3 lines (within the 298/300 budget if we
          compact — or import + call may fit in 2 lines).
      - step: "Add tests for star unpack and list index"
        files: [tests/unit/test_ast_split_star_helpers.py, tests/unit/test_ast_symbol_table.py]
        notes: |
          Test parts = ['ev', 'al'] stores parts[0]='ev', parts[1]='al'.
          Test parts[0] + parts[1] resolves to 'eval' via BinOp chain.
          Test ''.join([*parts1, *parts2]) resolves to joined string.
          Test Starred of non-tracked variable returns None.
          Verify corpus split_join_star_unpack.py and split_list_index.py produce findings.
    criteria:
      - "String-list assignments store indexed elements in symbol table (name[0], name[1], ...)"
      - "parts[0] + parts[1] resolves to concatenated string via existing BinOp chain"
      - "''.join([*parts1, *parts2]) resolves via star-unpack flattening"
      - "Starred of non-tracked variable returns None (no crash)"
      - "Existing join resolution unchanged (no regression)"
      - "New _ast_split_star_helpers.py stays under 300 lines"
      - "_ast_symbol_table_helpers.py stays under 300 lines"
      - "_ast_split_join_helpers.py stays under 300 lines"
      - "Corpus split_join_star_unpack.py produces EXEC-002 finding"
      - "Corpus split_list_index.py produces EXEC-002 finding"

  - id: d
    title: "Class-level string assembly + dict.pop() tracking + class-body scope propagation"
    status: Done
    requirements_covered: [R003, R007, R008, R-EFF001]
    approach:
      - step: "Update _build_scope_map to propagate class-body scope"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: |
          _build_scope_map (line 121-139) only maps FunctionDef/AsyncFunctionDef and
          class methods — class body statements get no scope entry. This means
          detect_split_evasion won't associate class-level join/concat calls with the
          class scope, so lookups for 'ClassName.var' in symbol_table and int_list_table
          fail silently. Add: for ClassDef nodes, walk the class body directly and map
          all nodes to the class name scope. Required for Part A's class-level int-list
          tracking AND this part's class-level string assembly to work end-to-end.
          _ast_split_detector.py at 219/300 — ample room.
      - step: "Resolve BinOp(Add) in class-level _collect_assignments"
        files: [src/skill_scan/_ast_symbol_table.py, src/skill_scan/_ast_symbol_table_helpers.py]
        notes: |
          The corpus case is: class Config: prefix='ev'; suffix='al'; func_name=prefix+suffix.
          _process_class calls _collect_assignments(node.body) which calls _walk_body.
          _walk_body calls _handle_assign which stores string Constants and _Ref for
          Name references. BinOp(Add) of two Names should resolve to concatenated string
          after _resolve_indirections runs.
          Check: does _handle_assign handle BinOp(Add)? It likely stores _Ref for the
          operands but doesn't concatenate. Need to verify current behavior and add
          BinOp(Add) resolution either in _handle_assign or _resolve_indirections.
          _ast_symbol_table.py at 290/300 — 10 lines available.
          _ast_symbol_table_helpers.py at 274/300 — 26 lines available.
      - step: "Add dict.pop() tracking in symbol table"
        files: [src/skill_scan/_ast_symbol_table_helpers.py]
        notes: |
          Track dict-literal assignments: when `funcs = {'target': 'eval', ...}`,
          store element entries like 'funcs[target]' = 'eval'. Then when
          `name = funcs.pop('target')` is encountered, resolve via composite key lookup.
          The dict tracking is similar to the list-element tracking in part C.
          For dict.pop(): in _walk_body, detect Assign where RHS is a Call to
          .pop(string_key) on a tracked dict variable.
          ~15-20 lines total across the two patterns.
      - step: "Add tests for classvar assembly, dict.pop, and class-body scope"
        files: [tests/unit/test_ast_symbol_table.py]
        notes: |
          Test class Config: prefix='ev'; suffix='al'; func_name=prefix+suffix resolves.
          Test funcs = {'target': 'eval'}; name = funcs.pop('target') resolves.
          Test class-body join/concat gets correct scope from _build_scope_map.
          Verify corpus classvar_assembly.py and dict_pop_evasion.py produce findings.
    criteria:
      - "_build_scope_map maps class body nodes to ClassName scope (not just methods)"
      - "Class-level BinOp(Add) of tracked string variables resolves (prefix + suffix)"
      - "Dict literal assignments store elements as composite keys (name[key] = val)"
      - "dict.pop('key') resolves to tracked dict element value"
      - "Existing symbol table resolution unchanged (no regression)"
      - "_ast_split_detector.py stays under 300 lines"
      - "_ast_symbol_table.py stays under 300 lines"
      - "_ast_symbol_table_helpers.py stays under 300 lines"
      - "Corpus classvar_assembly.py produces EXEC-002 finding"
      - "Corpus dict_pop_evasion.py produces EXEC-002 finding"

  - id: e
    title: "Hex escape-sequence resolution (AST) + regression verification"
    status: Done
    depends_on: [a, b, c, d]
    requirements_covered: [R009, R-EFF001, R-EFF002]
    approach:
      - step: "Resolve hex string with escape-sequence separators via AST variable propagation"
        files: [src/skill_scan/_decoder_helpers.py, src/skill_scan/_ast_split_resolve.py]
        notes: |
          Corpus decoder_hex_spaced.py uses:
            hex_str = '65\t76\n61\t6c'
            clean = hex_str.replace('\t', '').replace('\n', '')
            name = bytes.fromhex(clean).decode()
          The content scanner sees raw source with literal \t/\n escape sequences,
          NOT actual whitespace. And bytes.fromhex(clean) uses a variable, not a
          hex literal — so neither the fromhex regex nor the AST fromhex resolver
          catches this.
          Fix approach: AST-level variable propagation. The symbol table should
          track the .replace() chain: hex_str='65\t76\n61\t6c' -> clean (after
          replace stripping) -> bytes.fromhex(clean) resolves via symbol lookup.
          This requires extending the .replace() chain resolver to handle the
          pattern where the receiver is a tracked variable (not just a literal).
          _decoder_helpers.py at 189/300 — ample room for supporting changes.
          _ast_split_resolve.py at 291/300 — limited room; may need to add
          resolve logic in _ast_split_helpers.py or a new helper file instead.
      - step: "Run full red-team corpus and verify all 9 fixes"
        files: []
        notes: |
          Execute corpus/red-team/2026-03-17-full/run_corpus.py.
          Verify all 9 corpus inputs produce findings.
          Calculate new evasion rate (expect ~22-23% from 32.9%).
          Check for false positive regressions. Run make check.
      - step: "Update results.json"
        files: [corpus/red-team/2026-03-17-full/results.json]
        notes: |
          Regenerate results.json. Report improvement delta.
    criteria:
      - "Symbol table resolves .replace() chain on tracked hex string variable"
      - "bytes.fromhex(tracked_var) resolves when tracked_var is clean hex string"
      - "Existing hex decoding unchanged (no regression on space-separated hex)"
      - "All 9 corpus inputs produce findings (zero evasions for this set)"
      - "Overall evasion rate decreased from 32.9% (26/79) baseline"
      - "No false positive regressions in existing test suite"
      - "make check passes"
      - "results.json updated with new scan results"
      - "Corpus decoder_hex_spaced.py produces OBFS-004 or EXEC-002 finding"

