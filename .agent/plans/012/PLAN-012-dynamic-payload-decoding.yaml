id: "PLAN-012"
title: "Dynamic Payload Decoding"
type: implementation
status: Proposed
created: 2026-03-06

linked_spec: null

description: |
  Add a pre-processing step to the scan engine that detects base64 and hex-encoded
  strings, decodes them in memory, and recursively scans the decoded content against
  all detection rules. This catches prompt injections and malicious code hidden inside
  encoded payloads that regex-only scanning would miss.

  Currently EXEC-003/009 catch *calls* to b64decode, but don't inspect what's inside
  the encoded string. This plan adds actual content inspection of encoded payloads.

  Design: new decoder.py module with pure functions. Integrates into engine.py's
  match_content() flow as an additional pass after line/file matching — similar to
  how normalize_text works as a secondary pass.

