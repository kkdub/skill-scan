# Skeleton: opt-out
# Category: brownfield single-layer extension
# Justification: Adding a pre-processing pass to existing engine. Single module
# (decoder.py) integrated into one call site (engine.py match_content).

parts:
  - id: a
    title: "Decoder module — extract and decode encoded payloads"
    status: Pending
    requirements_covered: [R-IMP001, R-IMP002, R-IMP003, R-IMP004, R-IMP005, R-IMP006]
    verify_group: decode-and-scan
    approach:
      - step: "Create decoder.py with extraction and decoding functions"
        files: [src/skill_scan/decoder.py]
        notes: >
          Pure module, stdlib only (base64, binascii, re). Key functions:
          extract_encoded_strings(content) -> list[EncodedPayload] — finds base64 and hex
          strings using regex. decode_payload(payload) -> str | None — attempts decode,
          returns None on failure. EncodedPayload is a frozen dataclass with fields:
          encoded_text, encoding_type ('base64'|'hex'), line_num, start_offset.
          Constants: MIN_ENCODED_LENGTH=24 (avoids short false positives),
          MAX_DECODED_SIZE=100_000 (100KB limit per payload), MAX_DECODE_DEPTH=2.
      - step: "Add base64 extraction regex and decoder"
        files: [src/skill_scan/decoder.py]
        notes: >
          Base64 regex: match strings inside quotes or standalone blocks of [A-Za-z0-9+/=]{24,}.
          Must handle: raw strings, f-strings, triple-quoted strings. Filter out data:image/
          URIs and known non-payload patterns. decode via base64.b64decode with validate=True.
      - step: "Add hex extraction regex and decoder"
        files: [src/skill_scan/decoder.py]
        notes: >
          Hex patterns: bytes.fromhex('...'), \x41\x42\x43 sequences, 0x-prefixed hex blocks.
          Decode via bytes.fromhex(). Filter out CSS color codes (#fff, #a0b1c2).
      - step: "Write unit tests for decoder module"
        files: [tests/unit/test_decoder.py]
        notes: >
          Test extraction of base64 and hex strings. Test decoding valid and invalid payloads.
          Test min length filtering. Test max size truncation. Test data:image/ exclusion.
          Test recursive decode depth. Test that invalid base64/hex is silently skipped.
    criteria:
      - "extract_encoded_strings() finds base64 strings >= MIN_ENCODED_LENGTH in content"
      - "extract_encoded_strings() finds hex-encoded strings (bytes.fromhex, \\x sequences)"
      - "decode_payload() returns decoded UTF-8 string or None for invalid payloads"
      - "Strings shorter than MIN_ENCODED_LENGTH are not extracted"
      - "Payloads larger than MAX_DECODED_SIZE are skipped"
      - "Invalid base64/hex strings return None (no exceptions raised)"
      - "data:image/ URIs are excluded from extraction"
      - "decoder.py is under 250 lines"

  - id: b
    title: "Engine integration — scan decoded payloads and produce findings"
    status: Pending
    depends_on: [a]
    requirements_covered: [R001, R002, R003, R004, R-EFF001, R-EFF002]
    verify_group: decode-and-scan
    approach:
      - step: "Add decoded-content scanning pass to match_content()"
        files: [src/skill_scan/rules/engine.py]
        notes: >
          After existing line/file/normalized passes, add a decode pass:
          call extract_encoded_strings(content), decode each, scan decoded text
          with match_content() recursively (respecting MAX_DECODE_DEPTH counter).
          Add _decoded_content_findings() helper following the pattern of
          _normalized_line_findings(). Pass depth counter to prevent infinite recursion.
          Prefix finding descriptions with "[decoded]" so users know the match was in
          decoded content. Findings keep original file path and line number from the
          encoded string's location.
      - step: "Write integration tests — encoded payloads caught by scanning"
        files: [tests/unit/test_decoder.py]
        notes: >
          Test full pipeline: base64-encoded PI text -> match_content() -> finding with
          PI rule. Test hex-encoded eval() -> finding with EXEC rule. Test double-encoded
          payload at depth 2. Test that legitimate base64 (image data, config tokens)
          produces no false positives. Test findings reference original line, not decoded
          line. Test that engine.py stays under 250 lines (currently 229).
    criteria:
      - "match_content() decodes base64 payloads and scans decoded text against all rules"
      - "match_content() decodes hex payloads and scans decoded text against all rules"
      - "Recursive decoding works up to MAX_DECODE_DEPTH=2"
      - "Findings from decoded content have correct original file path and line number"
      - "Finding descriptions are prefixed with '[decoded]' for decoded-content matches"
      - "Legitimate base64 content (data:image, config tokens) does not produce false positives"
      - "engine.py stays under 250 lines after changes"
      - "All tests pass including effectiveness tests"

