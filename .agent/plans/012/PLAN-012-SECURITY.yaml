findings:
  - id: SEC-001
    severity: medium
    title: "No per-file payload count limit in extract_encoded_strings()"
    file: "src/skill_scan/decoder.py"
    description: >
      No limit on the number of EncodedPayload objects extracted per file.
      A crafted file within 500KB max_file_size can trigger ~6,500 decode-and-rescan
      operations via multiplicative amplification (65 outer * 100 inner payloads).
      Worst case ~7.5s — degraded but not catastrophic.
    mitigations_present:
      - "max_file_size=500KB caps input size"
      - "MAX_DECODE_DEPTH=2 caps recursion"
      - "MAX_DECODED_SIZE=100KB caps individual payload size"
    resolution: >
      Add MAX_PAYLOADS_PER_FILE constant (100-200) and early-return in
      extract_encoded_strings() after the limit is reached.
    target: "PLAN-014 (performance and suppression)"

  - id: SEC-002
    severity: medium
    title: "decode_payload depth parameter unused in engine integration path"
    file: "src/skill_scan/rules/engine.py:172"
    description: >
      _decoded_content_findings calls decode_payload(p) without passing depth.
      Depth is controlled by engine's _depth parameter. The decoder's own depth
      check is dead code in this path. Defense-in-depth layers are not aligned.
    resolution: >
      Pass depth to decode_payload(p, depth=depth) in _decoded_content_findings
      for aligned defense-in-depth, or remove the depth parameter from decode_payload.
    target: "Next decoder touch (PLAN-013 or maintenance)"
