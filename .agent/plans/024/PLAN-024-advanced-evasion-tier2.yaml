id: "PLAN-024"
title: "Advanced evasion detection — Tier 2 (functional & exotic patterns)"
type: implementation
status: Done
created: 2026-03-14
revised: 2026-03-14
backwards_compatibility: true

# Revision notes (Codex review remediation):
# - Issue 1: R021, R022, R-IMP009 now mapped to parts
# - Issue 2: C-a1 rewritten with falsifiable grep (_RESOLVERS definition + loop dispatch)
# - Issue 3: Prohibited section clarified — _DETECTORS and detect_split_evasion are both valid paths
# - Issue 4: Part d fixed to node-level signature (node, file_path, *, alias_map=...)
# - Issue 5: Local _DECORATOR_RULE mandated in _ast_detectors.py (no _NAME_RULE import = no cycle)
# - Issue 6: R017 dropped — symbol table can't track int lists; DEBT-024-TRACKED-COMPREHENSION
# - Issue 7: Fixture isolation constraint added — each pos_ file must contain ONLY the technique
# - Issue 8: Line-count guard (R002 ≤200) added to parts b, c, e
# - Issue 9: wc -l replaced with Python one-liner (Windows/MSYS safe)
# - Issue 10: Completion gate added (acceptance_criteria + stop_condition)
# - Issue 11: Corpus filter update to rule_id matching in Part d approach
# - Issue 12: Answered — corpus tests switch to rule_id filtering entirely
# - Issue 13: Answered — R017 dropped, literal-only

description: |
  Second half of DEBT-018-T4-ADVANCED. Covers the lower-priority evasion
  techniques deferred from Plan 023 (high-impact tier).

  Techniques to implement:
  1. String.replace() chains — 'xvxl'.replace('x', 'ea'[:1]).replace('x', 'ea'[1:])
  2. functools.reduce(lambda a,b: a+b, [...]) concatenation
  3. operator.add() / operator.concat() concatenation
  4. Decorator position evasion — @eval, @exec, @builtins.eval
  5. Comprehension assembly — ''.join([chr(c) for c in [101,118,97,108]])
     (inline integer list literals only; tracked-variable variant deferred to debt)

  Star-args/kwargs unpacking deferred to debt (DEBT-024-KWARGS-UNPACKING).
  Tracked-variable comprehension deferred to debt (DEBT-024-TRACKED-COMPREHENSION).
  Depends on Plan 023 completing first (shared infrastructure).

depends_on: ["PLAN-023"]

requirements_path: ".agent/plans/024/REQUIREMENTS-024.yaml"

design_constraints:
  module_structure: |
    Brownfield — extending existing AST analysis pipeline. All new detection
    logic goes in existing private modules or new private modules under
    src/skill_scan/. Facade modules (ast_analyzer.py, _ast_split_detector.py)
    re-export public names.
  placement_rules: |
    - New resolvers for registry pattern: _ast_split_resolve.py (88 lines remaining)
    - Extracted resolvers from _ast_split_detector.py: _ast_split_join_helpers.py (222 lines remaining)
    - Decorator detector: _ast_detectors.py (66 lines remaining)
    - Comprehension chr() resolver: _ast_split_join_helpers.py
    - Registry tuple and dispatch: _ast_split_detector.py (after extraction brings it under 200 lines)
  prohibited: |
    - DO NOT touch _ast_split_helpers.py (290/300 lines — no capacity)
    - DO NOT touch _ast_symbol_table.py (290/300 lines — no capacity)
    - No new external dependencies — stdlib only
    - No new top-level finding emission paths — all findings enter analyze_python()
      via either _DETECTORS (node-level, using _make_finding) or
      detect_split_evasion() (tree-level, using _check_dangerous). Both are
      existing pipelines. Decorator detector uses _make_finding within _DETECTORS
      (same as _detect_unsafe_calls, _detect_dynamic_imports, etc.).
    - DO NOT import _NAME_RULE from _ast_split_detector into _ast_detectors
      (would create import cycle — _ast_split_detector already imports from
      _ast_detectors). Define a local _DECORATOR_RULE dict instead.
  key_decisions: |
    - Registry pattern uses a _RESOLVERS tuple of (predicate, resolver) pairs,
      modeled after the existing _DETECTORS tuple in ast_analyzer.py
    - All resolvers share signature: (node, symbol_table, scope, *, alias_map=None) -> str | None
    - Decorator detector is a node-level detector added to _DETECTORS (not a resolver)
      with signature: (node, file_path, *, alias_map=None) -> list[Finding]
    - Comprehension/reduce/operator resolvers are split-level resolvers added to _RESOLVERS
    - alias_map threading already handled by build_alias_map() — functools/operator
      aliases resolved automatically
    - Each pos_*.py fixture must contain ONLY the evasion technique under test —
      no other patterns that trigger existing detectors (prevents false-green criteria)
  testing_strategy: |
    - Positive and negative fixture files in tests/fixtures/split_evasion/
    - Unit tests in tests/unit/test_evasion_corpus.py (extend existing corpus test)
    - Corpus test filter updated from text-matching to rule_id matching:
      f.rule_id in ('EXEC-002', 'EXEC-006') replaces "split"/"encoded" text check
    - All 2703+ existing tests must continue passing

utilities_audit:
  - category: "String resolution"
    needed: "Resolve .replace() chains, reduce() concat, operator.add()"
    exists: "resolve_operand(), resolve_binop_chain(), resolve_expr() in _ast_split_resolve.py"
    gaps: "No .replace() chain resolver; no reduce/operator resolvers"
    action: "Add _resolve_replace_chain(), _resolve_reduce_concat() to _ast_split_resolve.py"
    location: "src/skill_scan/_ast_split_resolve.py"

  - category: "Decorator detection"
    needed: "Detect @eval, @exec, @builtins.eval as decorators"
    exists: "_DETECTORS tuple, _make_finding() in _ast_detectors.py"
    gaps: "No decorator-specific detector function; no local dangerous-decorator mapping"
    action: "Add _DECORATOR_RULE dict and _detect_decorator_evasion() to _ast_detectors.py; register in _DETECTORS"
    location: "src/skill_scan/_ast_detectors.py"

  - category: "Comprehension assembly"
    needed: "Resolve ''.join([chr(c) for c in [...]]) with inline integer list literals"
    exists: "_resolve_generator_join() in _ast_split_join_helpers.py (identity generators only)"
    gaps: "No chr() mapping in comprehension resolution; no ListComp handling"
    action: "Extend _resolve_generator_join() or add _resolve_comprehension_chr()"
    location: "src/skill_scan/_ast_split_join_helpers.py"

  - category: "Registry pattern"
    needed: "Replace isinstance dispatcher in _try_resolve_split() with tuple of resolvers"
    exists: "_DETECTORS tuple pattern in ast_analyzer.py (proven model)"
    gaps: "_try_resolve_split() uses isinstance chain (4 branches: BinOp, JoinedStr, Call, default)"
    action: "Extract resolver functions, build _RESOLVERS tuple, replace dispatcher"
    location: "src/skill_scan/_ast_split_detector.py"

  - category: "Alias resolution"
    needed: "Resolve functools/operator aliases in reduce/operator detection"
    exists: "build_alias_map() already captures all import aliases"
    gaps: "None — alias_map threading already in place"
    action: "Use existing alias_map parameter in new resolvers"
    location: "src/skill_scan/_ast_helpers.py"

  - category: "Corpus test infrastructure"
    needed: "Test new detection techniques via fixture corpus"
    exists: "test_evasion_corpus.py with pos_/neg_ fixture scanning"
    gaps: "Filter uses text matching ('split'/'encoded' in matched_text) — won't catch decorator or comprehension findings"
    action: "Update filter to rule_id-based: f.rule_id in ('EXEC-002', 'EXEC-006')"
    location: "tests/unit/test_evasion_corpus.py"

environment:
  runtime: "Python 3.13, stdlib only"
  toolchain: "uv, pytest, ruff, mypy, bandit"
  dependencies: "No new dependencies"
  ci: "make check (pre-commit hooks: ruff, mypy, pytest, bandit)"

change_surface:
  - path: "src/skill_scan/_ast_split_detector.py"
    exports: ["detect_split_evasion"]
    imported_by: ["ast_analyzer.py"]
    risk: "HIGH — 284/300 lines, must shrink to <=200 in Part a and stay there"
  - path: "src/skill_scan/_ast_split_resolve.py"
    exports: ["resolve_binop_chain", "resolve_operand", "resolve_fstring", "resolve_expr", "resolve_call_return", "resolve_bytes_constructor"]
    imported_by: ["_ast_split_detector.py"]
    risk: "MEDIUM — 212/300, receives new resolvers and extracted code"
  - path: "src/skill_scan/_ast_split_join_helpers.py"
    exports: ["_resolve_generator_join", "_resolve_map_join"]
    imported_by: ["_ast_split_helpers.py"]
    risk: "LOW — 78/300, receives extracted code and comprehension resolver"
  - path: "src/skill_scan/_ast_detectors.py"
    exports: ["_detect_* functions", "_make_finding", "_DECORATOR_RULE"]
    imported_by: ["ast_analyzer.py"]
    risk: "LOW — 234/300, receives decorator detector (~30 lines)"
  - path: "src/skill_scan/ast_analyzer.py"
    exports: ["analyze_python", "_DETECTORS"]
    imported_by: ["content_scanner.py"]
    risk: "LOW — 107/300, adds detector to _DETECTORS tuple"
  - path: "tests/unit/test_evasion_corpus.py"
    risk: "LOW — filter update + new fixture assertions"
  - path: "tests/fixtures/split_evasion/"
    risk: "LOW — new fixture files only"

parts:
  - id: a
    title: "Registry refactoring — extract resolvers and build _RESOLVERS tuple"
    status: Done
    requirements: [R001, R002, R003, R004, R020, R021, R022, R-IMP001, R-IMP002, R-IMP003]
    depends_on: []
    allowed_files:
      - "src/skill_scan/_ast_split_detector.py"
      - "src/skill_scan/_ast_split_resolve.py"
      - "src/skill_scan/_ast_split_join_helpers.py"
      - "tests/**"
    approach:
      - step: 1
        action: "Catalog the 4 isinstance dispatch branches in _try_resolve_split(): BinOp(Add), BinOp(Mod), JoinedStr, Call (join/format/bytes/call-return)"
      - step: 2
        action: "Extract each branch into a standalone resolver function with signature (node, symbol_table, scope, *, alias_map=None) -> str | None. Place in _ast_split_resolve.py (88 lines remaining) or _ast_split_join_helpers.py (222 lines remaining) based on capacity. BinOp(Add) already exists as resolve_binop_chain — wrap with predicate only."
      - step: 3
        action: "Build _RESOLVERS tuple of (predicate_func, resolver_func) pairs in _ast_split_detector.py. Predicates are short lambdas or functions checking isinstance."
      - step: 4
        action: "Replace _try_resolve_split() isinstance chain with: for pred, resolver in _RESOLVERS: if pred(node): result = resolver(...); if result is not None: return result; return None"
      - step: 5
        action: "Update re-exports in _ast_split_detector.py facade if any public names moved. Ensure Facade Re-export Pattern followed (R022)."
      - step: 6
        action: "Verify _ast_split_detector.py is at or below 200 lines using: python -c \"print(len(open('src/skill_scan/_ast_split_detector.py').readlines()))\""
      - step: 7
        action: "Run full test suite — all 2703+ tests must pass unchanged. No new dependencies introduced (R021)."
    criteria:
      - id: C-a1
        description: "_RESOLVERS tuple is defined in _ast_split_detector.py"
        verify: "grep::_RESOLVERS\\s*=::src/skill_scan/_ast_split_detector.py"
        expect: "at least one match"
      - id: C-a2
        description: "_try_resolve_split() dispatches via for-loop over _RESOLVERS"
        verify: "grep::for.*_RESOLVERS::src/skill_scan/_ast_split_detector.py"
        expect: "at least one match"
      - id: C-a3
        description: "_ast_split_detector.py is at or below 200 lines"
        verify: "bash::python -c \"print(len(open('src/skill_scan/_ast_split_detector.py').readlines()))\""
        expect: "<= 200"
      - id: C-a4
        description: "All existing tests pass"
        verify: "test::tests/"
        expect: "pytest exit 0, no fewer passing than baseline"
      - id: C-a5
        description: "All resolvers share common signature"
        verify: "grep::def _resolve.*node.*symbol_table.*scope.*alias_map::src/skill_scan/_ast_split_resolve.py src/skill_scan/_ast_split_join_helpers.py"
        expect: "all resolver functions match pattern"
    verify_group: "resolvers"

  - id: b
    title: "String.replace() chain detection"
    status: Done
    requirements: [R005, R006, R007, R008, R018, R019, R-IMP004, R-IMP009, R-EFF001, R-EFF002, R-EFF003]
    depends_on: [a]
    allowed_files:
      - "src/skill_scan/_ast_split_resolve.py"
      - "src/skill_scan/_ast_split_detector.py"
      - "tests/fixtures/split_evasion/pos_replace_chain*.py"
      - "tests/fixtures/split_evasion/neg_replace_chain*.py"
      - "tests/unit/test_evasion_corpus.py"
      - "tests/**"
    approach:
      - step: 1
        action: "Create pos_replace_chain.py fixture with 2-step and 3+ step .replace() chain building a dangerous name. Fixture must contain ONLY .replace() chain evasion — no other detectable patterns. Use safe variable names. Include a tracked-variable base variant."
      - step: 2
        action: "Create neg_replace_chain_safe.py fixture with .replace() chains that produce non-dangerous strings (e.g. 'hello'.replace('h', 'j'))."
      - step: 3
        action: "Implement _resolve_replace_chain() in _ast_split_resolve.py — walk the chain of .replace(old, new) calls, resolve base string (literal or symbol table lookup), apply each replacement left-to-right, return final string. Untracked base returns None."
      - step: 4
        action: "Register _resolve_replace_chain in _RESOLVERS tuple in _ast_split_detector.py with predicate checking for ast.Call with func.attr == 'replace'."
      - step: 5
        action: "Verify _ast_split_detector.py remains at or below 200 lines after registration."
      - step: 6
        action: "Run tests to confirm pos_ fixtures produce findings and neg_ fixtures produce zero."
    criteria:
