acceptance_scenarios:
  - id: AS-1
    title: "Registry refactoring preserves all existing detection"
    description: "After Part a, the registry pattern replaces the isinstance chain. All 2703+ existing tests pass with identical results. _ast_split_detector.py is at or below 200 lines. _RESOLVERS tuple defined and used for dispatch."
    parts: [a]
    verification: "pytest exit 0; line count <= 200; _RESOLVERS defined and used in for-loop"

  - id: AS-2
    title: "New resolver techniques detect evasion patterns"
    description: "Parts b, c, e add replace-chain, reduce/operator, and comprehension resolvers. Each technique has pos/neg fixtures containing ONLY that technique. All positive fixtures produce EXEC-002/EXEC-006 findings; all negative fixtures produce zero findings."
    parts: [b, c, e]
    verification: "Corpus test passes with rule_id filter; all new pos_ fixtures produce >=1 finding; all new neg_ fixtures produce 0 findings"

