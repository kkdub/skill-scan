    title: "Decorator position evasion detection"
    status: Done
    requirements: [R012, R013, R014, R018, R019, R023, R-IMP006, R-IMP007, R-IMP009, R-EFF001, R-EFF002, R-EFF005]
    depends_on: []
    allowed_files:
      - "src/skill_scan/_ast_detectors.py"
      - "src/skill_scan/ast_analyzer.py"
      - "tests/fixtures/split_evasion/pos_decorator_eval*.py"
      - "tests/fixtures/split_evasion/neg_decorator_safe*.py"
      - "tests/unit/test_evasion_corpus.py"
      - "tests/**"
    approach:
      - step: 1
        action: "Create pos_decorator_eval.py fixture with @eval, @exec decorators on function defs, and @builtins.eval (attribute-form) on a class def. Fixture must contain ONLY decorator evasion — no string concat, no other detectable patterns. Use plain function bodies like 'pass'."
      - step: 2
        action: "Create neg_decorator_safe.py with @staticmethod, @property, @custom_decorator, @functools.wraps — common safe decorators that must not trigger."
      - step: 3
        action: "Define _DECORATOR_RULE dict in _ast_detectors.py — maps dangerous decorator names to (rule_id, Severity, description) tuples. Same name set as _NAME_RULE but defined locally to avoid import cycle: {'eval': ('EXEC-002', CRITICAL, 'Decorator evasion'), 'exec': ..., 'system': ..., 'popen': ..., '__import__': ('EXEC-006', HIGH, ...), 'getattr': ('EXEC-006', HIGH, ...)}."
