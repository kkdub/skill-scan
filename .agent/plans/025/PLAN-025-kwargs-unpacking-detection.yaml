id: "PLAN-025"
title: "Detect dangerous **kwargs unpacking"
type: implementation
status: Complete
created: 2026-03-14
linked_spec: null

description: |
  Detect dangerous **kwargs unpacking patterns where a dict containing unsafe
  keyword arguments (e.g. shell=True) is unpacked into a sensitive function call
  (e.g. subprocess.run('ls', **opts)). Resolves DEBT-024-KWARGS-UNPACKING.

  No existing tool handles this well: Bandit misses it (kw.arg is None for **),
  Semgrep detects ** syntax but can't resolve dict contents, Pysa requires manual
  model annotations. We leverage the existing symbol table's dict-key tracking
  (composite keys like 'opts[shell]') to resolve dict contents statically.

  Table-driven design: a _DANGEROUS_KWARGS lookup defines which (function, key,
  value) combinations are dangerous. New entries are config-only additions.

  Deferred: dict merging patterns ({**base, 'shell': True}, opts | {'shell': True}).

requirements:
  file: null
  ids:
    - R001  # Detect subprocess.*(**opts) where opts contains shell=True (symbol table tracked)
    - R002  # Detect subprocess.*(**{'shell': True, ...}) — inline dict literal unpacking
    - R003  # Detect dicts built via subscript assignment (opts['shell'] = True)
    - R004  # Detect dicts built via dict literal (opts = {'shell': True})
    - R005  # Emit EXEC-002 CRITICAL (same rule as existing subprocess shell=True)
    - R006  # Table-driven _DANGEROUS_KWARGS — new combos are config-only additions
    - R007  # No false positives on safe kwargs passthrough, non-targeted functions
    - R008  # Support aliased imports via existing alias_map (import subprocess as sp)
    - R-IMP001  # New module _ast_kwargs_detector.py (capacity: _ast_detectors.py at 294/300)
    - R-IMP002  # Integrate alongside detect_split_evasion in analyze_python() (not via _DETECTORS)
    - R-IMP003  # Use existing get_call_name() and build_alias_map() for function resolution
    - R-EFF001  # Positive test fixtures (min 4: dict literal, subscript-built, inline dict, aliased import)
    - R-EFF002  # Negative test fixtures (min 3: safe passthrough, non-subprocess, safe dict keys)
  uncovered: []

