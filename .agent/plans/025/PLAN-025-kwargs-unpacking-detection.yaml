parts:
  - id: a
    title: "Kwargs detector module + dangerous-kwargs table"
    status: Done
    requirements_covered: [R001, R002, R003, R004, R005, R006, R007, R008, R-IMP001, R-IMP003]
    verify_group: kwargs-detection
    approach:
      - step: "Define _DANGEROUS_KWARGS table"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          Table maps function name prefixes to dangerous (key, value) pairs.
          Initial entry: 'subprocess.' prefix -> ('shell', True) -> EXEC-002 CRITICAL.
          Use same _make_finding helper from _ast_detectors.py. Function matching
          should use startswith() on the resolved call name (via get_call_name + alias_map).
      - step: "Implement detect_kwargs_unpacking(tree, file_path, alias_map, symbol_table)"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          Walk ast.Call nodes. For each, check node.keywords for entries where kw.arg is None
          (these are ** unpacked). For each such kw.value:
          1. If ast.Dict literal: extract keys/values directly from AST
          2. If ast.Name: look up in symbol table using composite key pattern ('varname[key]')
          Resolve the call name via get_call_name(node, alias_map). Check resolved dict
          contents against _DANGEROUS_KWARGS table. Emit finding if match found.
      - step: "Handle dict literal and symbol-table-tracked dicts"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          For inline dict: iterate node.keys/values, extract constant key-value pairs.
          For tracked name: enumerate symbol table entries matching 'varname[*]' pattern
          to reconstruct known dict contents. Only check constant values (ast.Constant).
    criteria:
      - "_ast_kwargs_detector.py exists as a new module under src/skill_scan/"
      - "Module is under 300 lines"
      - "_DANGEROUS_KWARGS table defines at least subprocess.* + shell=True entry"
      - "detect_kwargs_unpacking() accepts (tree, file_path, alias_map, symbol_table) signature"
      - "Inline dict literal **{'shell': True} resolved directly from AST"
      - "Symbol-table-tracked dict resolved via composite key lookup (varname[key] pattern)"
      - "get_call_name() used for function name resolution (handles aliases)"
      - "Emits EXEC-002 CRITICAL finding with descriptive matched_text"

  - id: b
    title: "Integration in ast_analyzer.py + facade re-exports"
    status: Done
    depends_on: [a]
    requirements_covered: [R-IMP002]
    verify_group: kwargs-detection
    approach:
      - step: "Call detect_kwargs_unpacking() in analyze_python()"
        files: [src/skill_scan/ast_analyzer.py]
        notes: |
          Add call alongside detect_split_evasion() — same pattern: runs after
          _DETECTORS loop, receives alias_map and symbol_table. Extend the try block.
          Do NOT add to _DETECTORS tuple (different signature — needs symbol_table).
      - step: "Add facade re-exports"
        files: [src/skill_scan/ast_analyzer.py]
        notes: |
          Re-export detect_kwargs_unpacking and _DANGEROUS_KWARGS from
          _ast_kwargs_detector using the 'x as x' explicit re-export pattern.
    criteria:
      - "analyze_python() calls detect_kwargs_unpacking() alongside detect_split_evasion()"
      - "detect_kwargs_unpacking is NOT in _DETECTORS tuple (runs separately)"
      - "Findings from kwargs detection flow through to analyze_python() return value"
      - "ast_analyzer.py re-exports detect_kwargs_unpacking and _DANGEROUS_KWARGS"

  - id: c
    title: "Test fixtures + tests"
    status: Done
    depends_on: [a, b]
    requirements_covered: [R-EFF001, R-EFF002]
    approach:
      - step: "Create positive test fixtures"
        files:
          - tests/fixtures/split_evasion/pos_kwargs_dict_literal.py
          - tests/fixtures/split_evasion/pos_kwargs_subscript_built.py
          - tests/fixtures/split_evasion/pos_kwargs_inline_dict.py
          - tests/fixtures/split_evasion/pos_kwargs_aliased_import.py
        notes: |
          Each fixture contains a subprocess call with **kwargs unpacking that should
          trigger EXEC-002. Use the existing fixture naming convention (pos_ prefix).
          Include ruff noqa comments if needed for intentional unsafe patterns.
      - step: "Create negative test fixtures"
        files:
          - tests/fixtures/split_evasion/neg_kwargs_safe_passthrough.py
          - tests/fixtures/split_evasion/neg_kwargs_non_subprocess.py
          - tests/fixtures/split_evasion/neg_kwargs_safe_keys.py
        notes: |
          Fixtures that should NOT trigger. safe_passthrough: function with **kwargs
          parameter forwarding. non_subprocess: dict unpacking into a safe function.
          safe_keys: subprocess with dict that has no dangerous keys.
      - step: "Write unit tests"
        files: [tests/unit/test_ast_kwargs_detector.py]
        notes: |
          Test detect_kwargs_unpacking() directly. Test each positive fixture produces
          EXEC-002 finding. Test each negative fixture produces no findings. Test
          _DANGEROUS_KWARGS table structure. Follow existing test patterns in
          test_ast_split_detector.py for fixture-based testing.
    criteria:
      - "At least 4 positive fixtures exist (dict literal, subscript-built, inline dict, aliased import)"
      - "At least 3 negative fixtures exist (safe passthrough, non-subprocess, safe keys)"
      - "All positive fixtures produce EXEC-002 findings"
      - "All negative fixtures produce no EXEC-002 findings"
