notes: |
  Research context: No existing security tool handles kwargs unpacking well.
  - Bandit: checks kw.arg == 'shell' — None for ** unpacking, so completely missed
  - Semgrep: detects ** syntax but can't resolve dict contents
  - CodeQL: has dataflow but no existing queries for dangerous kwargs keys
  - Pysa: requires manual .pysa model annotations declaring kwargs sinks
  Our advantage: symbol table already tracks dict contents via composite keys.
