    - R002    # Dict value tracking preserves native Python types instead of str()
    - R003    # _kwarg_matches compares against native types, _FALSY_STRINGS removed
    - R-IMP001  # _ast_kwargs_detector.py stays at or under 300 lines
    - R-IMP002  # No changes to build_symbol_table return type or consumer annotations
    - R-IMP003  # Integer list assignments tracked via parallel pre-pass
    - R-IMP004  # Comprehension over tracked int-list variable resolves in join helpers
    - R-EFF001  # shell='0' (truthy string) no longer false-negative — detected as EXEC-002
    - R-EFF002  # ''.join(chr(c) for c in codes) with tracked int-list resolves correctly
  uncovered: []

