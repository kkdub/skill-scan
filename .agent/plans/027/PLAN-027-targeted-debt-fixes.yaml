id: "PLAN-027"
title: "Targeted fixes for symbol-table-adjacent debt (no core refactor)"
type: implementation
status: Done
created: 2026-03-16

linked_spec: null

description: |
  Resolve three debt items (DEBT-026-CHAINED-UNION, DEBT-026-STRING-TRUTHINESS,
  DEBT-024-TRACKED-COMPREHENSION) with targeted fixes in their respective
  consumers. Key insight: none of these require changes to build_symbol_table()
  or its dict[str, str] return type. Booleans never enter the symbol table
  (try_resolve_string rejects non-string constants), the kwargs detector already
  has its own parallel pre-pass (_collect_dict_assigns), and the comprehension
  fix follows the same parallel pre-pass pattern.

