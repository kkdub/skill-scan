parts:
  - id: a
    title: "Chained dict union recursion in _resolve_dict_operand"
    status: Done
    requirements_covered: [R001]
    approach:
      - step: "Add BinOp(BitOr) branch to _resolve_dict_operand"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          When node is ast.BinOp with ast.BitOr op, recursively resolve left
          and right via _resolve_dict_operand, merge with {**left, **right}.
          Right-wins semantics matches Python dict union. Return None if either
          operand is unresolvable (conservative). No depth limit needed — AST
          depth is bounded by AST-DEPTH recursion guard in analyze_python().
    criteria:
      - "_resolve_dict_operand handles ast.BinOp(BitOr) by recursing into left and right operands"
      - "Three-way union (a | b | c) resolves correctly — right operand wins on key conflicts"
      - "Unresolvable operand in chain returns None (conservative, no false positives)"
      - "Existing two-operand union tests continue passing"
      - "New test: chained union with subprocess.run(**opts) produces EXEC-002"

  - id: b
    title: "Type-aware kwargs matching — replace string truthiness heuristic"
    status: Done
    requirements_covered: [R002, R003, R-IMP001, R-EFF001]
    approach:
      - step: "Change _extract_dict_literal to store raw constant values"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          Change return type from dict[str, str] to dict[str, object]. Store
          value_node.value directly instead of str(value_node.value). This
          cascades to _collect_dict_assigns, _collect_from_body, _track_assign,
          _track_union, _track_aug_union, _resolve_dict_operand, and
          _resolve_kwargs_dict return types — all internal to this file.
          _track_subscript_assign stores value.value directly too.
      - step: "Rewrite _kwarg_matches for native type comparison"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          Compare resolved[key] against value using Python truthiness directly:
          - If table value is bool: bool(resolved_val) == value
          - If table value is non-bool: compare with == after str() on both sides
          Remove _FALSY_STRINGS. Key insight: with native types preserved,
          int(0) is falsy and str('0') is truthy — no heuristic needed.
          The matched_text in findings still uses str() for display.
      - step: "Manage 300-line budget"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: |
          Removing _FALSY_STRINGS (1 line) and simplifying _kwarg_matches logic
          should offset any additions. If net lines increase, extract
          _lookup_symbol_table_dict to a shared helper (it's the most independent
          function). Monitor with wc -l after each step.
    criteria:
      - "_extract_dict_literal returns dict[str, object] with raw ast.Constant values"
      - "_track_subscript_assign stores raw constant value, not str()"
      - "_kwarg_matches uses Python bool() truthiness for boolean table entries"
      - "_FALSY_STRINGS is removed — no string-based truthiness heuristic"
      - "shell='0' (str) is detected as truthy — produces EXEC-002 (R-EFF001)"
      - "shell=0 (int) remains falsy — no false positive"
      - "shell=True, shell=1, shell=2 still detected (existing behavior preserved)"
      - "_ast_kwargs_detector.py is at or under 300 lines"

  - id: c
    title: "Tracked int-list comprehension resolution via parallel pre-pass"
    status: Done
    requirements_covered: [R-IMP003, R-IMP004, R-EFF002]
    approach:
      - step: "Add _collect_int_list_assigns pre-pass"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          Follow _collect_dict_assigns pattern: walk module-level and function-
          level bodies, find Name = List/Tuple assignments where ALL elements are
          ast.Constant(int). Store as dict[str, list[int]] with scope prefixing.
          Only track assignments where every element is an integer constant —
          mixed lists return None (conservative).
      - step: "Extend _resolve_comprehension_join to handle tracked variables"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          When comp.iter is ast.Name (not List/Tuple), look up the variable in
          the int_list_table using scoped lookup. If found, use the int list
          as the iteration source for _resolve_comprehension_chr or identity
          comprehension. Convert list[int] elements to synthetic ast.Constant
          nodes for _resolve_comprehension_chr, or resolve directly.
      - step: "Thread int_list_table through the call chain"
        files: [src/skill_scan/ast_analyzer.py, src/skill_scan/_ast_split_detector.py, src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          Build int_list_table in analyze_python() alongside symbol_table. Pass
          through detect_split_evasion -> _try_resolve_split -> resolve_call
          (for join calls) -> _resolve_join_call -> _resolve_comprehension_join.
          Use optional parameter with default None to avoid changing signatures
          of functions that don't need it. Alternatively, build the table inside
          _resolve_comprehension_join directly (self-contained, avoids threading)
          — assess which is cleaner during implementation.
    criteria:
      - "_collect_int_list_assigns finds Name = [int, int, ...] assignments with scope awareness"
      - "Mixed-type lists (ints + strings) are not tracked (conservative)"
      - "_resolve_comprehension_join resolves chr(c) for c in tracked_var"
      - "''.join(chr(c) for c in codes) where codes = [101, 118, 97, 108] resolves to 'eval'"
      - "Inline int lists still work (no regression on existing _resolve_comprehension_chr)"
      - "_ast_split_join_helpers.py stays under 300 lines"
      - "New test: tracked int-list variable in chr comprehension produces EXEC-002"

acceptance_scenarios:
  - scenario: "Chained three-way dict union delivers dangerous kwarg"
    invoke: "analyze_python() on: opts = base | extra | {'shell': True}; subprocess.run(**opts)"
    expect: "At least one EXEC-002 finding"
    test_file: tests/unit/test_ast_split_int_list.py
    status: passing
  - scenario: "String '0' is truthy — shell='0' detected"
    invoke: "analyze_python() on: subprocess.run(**{'shell': '0'})"
    expect: "EXEC-002 finding (string '0' is truthy at runtime)"
    test_file: tests/unit/test_ast_split_int_list.py
    status: passing
  - scenario: "Tracked int-list variable resolves through chr comprehension"
    invoke: "analyze_python() on: codes = [101, 118, 97, 108]; x = ''.join(chr(c) for c in codes)"
    expect: "EXEC-002 finding (resolves to 'eval')"
    test_file: tests/unit/test_ast_split_int_list.py
    status: passing

