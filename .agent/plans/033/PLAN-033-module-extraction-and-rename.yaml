id: "PLAN-033"
title: "Module extraction and rename refactor"
type: implementation
status: Done
created: 2026-03-19
linked_spec: null
description: |
  Refactor frozen/near-frozen AST scanner modules to free line capacity for
  future detector work. Four phases: (A) P0 extractions from the most frozen
  modules, (B) P1 extractions from near-frozen modules, (C) bulk rename of
  all *_helpers.py files to descriptive names via a rewrite script, and
  (D) documentation updates.

  This is a pure restructuring effort: zero behavioral changes, zero new
  features. Scanner output must be identical before and after.

  Critical naming rule: NO "helpers" in filenames. Every module name must
  describe what its functions DO.

alternatives: []
risks:
  - "Circular import breakage during extraction — mitigated by deferred imports (existing pattern)"
  - "Rename script misses a string reference — mitigated by make check + ruff import validation"

requirements:
  file: ".agent/plans/033/REQUIREMENTS-033.yaml"
  ids:
    - R001   # Extract format_map resolver from _ast_split_resolve.py
    - R002   # Extract ROT13 branch analysis from _ast_rot13.py
    - R003   # Extract multiline PI from rules/engine.py
    - R004   # Extract string resolution from _ast_helpers.py, absorb _ast_join_helpers.py
    - R005   # Rename all *_helpers.py to descriptive names
    - R006   # Rename test files to match
    - R007   # Update CLAUDE.md
    - R008   # Update README.md
    - R009   # Fix/document debt items
    - R-IMP001  # Zero behavioral changes
    - R-IMP002  # Facade re-exports stable
    - R-IMP003  # No orphaned imports
    - R-IMP004  # No file exceeds 300 lines
    - R-IMP005  # DEBT-029 resolved
    - R-IMP006  # Build rename script
  uncovered: []

utilities_audit:
  status: complete
  search_performed:
    - "grep for existing facade re-export patterns in src/ — found in _ast_helpers.py, _ast_split_resolve.py, _ast_split_helpers.py, decoder.py"
    - "grep for deferred import pattern — found in _ast_join_helpers.py, _ast_symbol_table.py, _ast_symbol_table_helpers.py, _ast_split_map_helpers.py"
    - "wc -l on all src/skill_scan/*.py to establish line counts"
    - "grep for all import paths referencing *_helpers modules across src/ and tests/"
  categories:
    facade_re_export_pattern:
      needed: true
      exists: "src/skill_scan/_ast_helpers.py (lines 294-300), _ast_split_resolve.py (lines 278-291), _ast_split_helpers.py (lines 297-299)"
      gaps: "New extraction targets need re-exports wired back into source module"
      action: use
    deferred_import_pattern:
      needed: true
      exists: "src/skill_scan/_ast_join_helpers.py, _ast_symbol_table.py"
      gaps: "none — pattern well-established"
      action: use
    git_mv_rename:
      needed: true
      exists: false
      gaps: "No rename automation exists; need scripts/rename_module.py"
      action: create
      location: "scripts/rename_module.py"
  infrastructure_parts: []

environment:
  status: complete
  build:
    tool: "uv + make"
    install_cmd: "make install"
    check_cmd: "make check"
    prerequisites: ["Python 3.13", "uv", "git"]
  runtime_services: []
  changes:
    new_dependencies: []
    env_vars: []
    schema_changes: []
    ci_changes: []
    build_changes: []

change_surface:
  status: complete
  modules:
    - path: "src/skill_scan/_ast_split_resolve.py"
      exports: ["resolve_call", "resolve_expr", "resolve_binop_chain", "_resolve_format_map_call"]
      imported_by: ["_ast_split_detector.py", "_ast_split_method_chains.py", "_ast_split_helpers.py (deferred)"]
    - path: "src/skill_scan/_ast_rot13.py"
      exports: ["_detect_rot13_codec", "_detect_rot13_maketrans", "_detect_custom_rot13"]
      imported_by: ["ast_analyzer.py"]
    - path: "src/skill_scan/rules/engine.py"
      exports: ["match_line", "match_file", "match_content"]
      imported_by: ["content_scanner.py"]
    - path: "src/skill_scan/_ast_helpers.py"
      exports: ["build_alias_map", "get_call_name", "try_resolve_string", "MAX_AST_RESOLVE_DEPTH"]
      imported_by: ["ast_analyzer.py", "_ast_detectors.py", "_ast_rot13.py", "_ast_kwargs_detector.py", "_ast_exfil_detector.py", "_ast_symbol_table_helpers.py", "_ast_symbol_table_class_helpers.py", "_ast_symbol_table_dict_helpers.py", "_ast_symbol_table_return_helpers.py", "_ast_split_reduce.py"]
    - path: "src/skill_scan/_ast_join_helpers.py"
      exports: ["_resolve_int_list_to_chars", "_is_chr_of_target", "_resolve_join_listcomp", "_resolve_join_map_chr"]
      imported_by: ["_ast_helpers.py (re-export)", "_ast_split_resolve.py (re-export)", "tests: test_ast_join_helpers.py, test_ast_split_int_list.py, test_ast_split_map_helpers.py, test_ast_split_int_list_helpers.py, test_ast_split_int_list_mutations.py"]
  directory_tree:
    src/skill_scan: "All extraction and rename targets"
    src/skill_scan/rules: "engine.py extraction target"
    tests/unit: "Test file renames"
    scripts: "rename_module.py creation"

parts:
  - id: a
    title: "P0 extractions: format_map and ROT13 branch analysis"
    status: Done
    requirements_covered: [R001, R002, R-IMP001, R-IMP003, R-IMP004, R-IMP005]
    depends_on: []
    approach:
      - step: "Extract format_map resolver to _ast_split_format_map.py"
        files:
          - "src/skill_scan/_ast_split_resolve.py"
          - "src/skill_scan/_ast_split_format_map.py"
        notes: |
          Move _resolve_format_map_call, _resolve_dict_arg, _lookup_str_dict
          (lines 163-239, ~77 lines) to new _ast_split_format_map.py.
          Import _scoped_lookup and _substitute_format in the new module.
          In _ast_split_resolve.py, replace inline functions with import from
          _ast_split_format_map and update resolve_call() to call the imported
          _resolve_format_map_call. Verify _ast_split_resolve.py drops to ~215 lines.
      - step: "Extract ROT13 branch analysis to _ast_rot13_branch_analysis.py"
        files:
          - "src/skill_scan/_ast_rot13.py"
          - "src/skill_scan/_ast_rot13_branch_analysis.py"
        notes: |
          Move _branch_case, _compare_case, _case_from_comparators,
          _case_from_constant, _first_case_from_boolop (lines 246-298, ~53 lines)
          to new _ast_rot13_branch_analysis.py.
          In _ast_rot13.py, import _branch_case from the new module.
          Only _detect_custom_rot13 calls _branch_case — single call site.
          Verify _ast_rot13.py drops to ~245 lines.
      - step: "Resolve DEBT-029-SPLIT-RESOLVE-AT-LIMIT in debt.yaml"
        files:
          - ".agent/status/debt.yaml"
        notes: "Remove DEBT-029 entry; add resolution comment to header."
      - step: "Run make check to verify zero regressions"
        files: []
        notes: "All 1690+ tests must pass. No behavioral changes."
    criteria:
      - "_ast_split_resolve.py is <=225 lines"
      - "_ast_split_format_map.py exists and is <=100 lines"
      - "_ast_rot13.py is <=250 lines"
      - "_ast_rot13_branch_analysis.py exists and is <=60 lines"
      - "DEBT-029 entry removed from debt.yaml"
      - "make check passes with zero test failures"
      - "No file in src/ exceeds 300 lines"

  - id: b
    title: "P1 extractions: multiline PI and string resolution"
    status: Done
    requirements_covered: [R004, R003, R-IMP001, R-IMP002, R-IMP003, R-IMP004]
    depends_on: [a]
    approach:
      - step: "Extract multiline PI to rules/_multiline_pi.py"
        files:
          - "src/skill_scan/rules/engine.py"
          - "src/skill_scan/rules/_multiline_pi.py"
        notes: |
          Move _multiline_pi_findings and _scan_window_rule (lines 162-216,
          ~55 lines) to rules/_multiline_pi.py. Pass _make_finding and
          _is_excluded as callable arguments to avoid circular imports
          (engine.py imports from _multiline_pi, so _multiline_pi cannot
          import back from engine at module level). New module imports only
          Finding, Rule from models.py. _scan_window_rule receives
          make_finding and is_excluded as parameters.
          In engine.py, import _multiline_pi_findings from _multiline_pi.
          Verify engine.py drops to ~240 lines.
      - step: "Extract string resolution pipeline to _ast_string_resolver.py"
        files:
          - "src/skill_scan/_ast_helpers.py"
          - "src/skill_scan/_ast_string_resolver.py"
          - "src/skill_scan/_ast_join_helpers.py"
        notes: |
          Create _ast_string_resolver.py containing:
          - MAX_AST_RESOLVE_DEPTH constant
          - try_resolve_string, _try_resolve_string (dispatcher)
          - _resolve_binop_add (string concat)
          - _resolve_int_expr (int arithmetic)
          - _resolve_chr_call (chr resolution)
          - _resolve_join_call (join with list/listcomp/map)
          - _resolve_iterable_elements (element resolution)
          - _resolve_bytes_decode (bytes decode)
          - _get_call_name_from_any (utility)
          - All functions from _ast_join_helpers.py:
            _resolve_int_list_to_chars, _is_chr_of_target,
            _resolve_join_listcomp, _resolve_join_map_chr

          In _ast_helpers.py: remove extracted functions, add re-exports
          from _ast_string_resolver for backward compat (facade pattern).
          Delete _ast_join_helpers.py (absorbed into _ast_string_resolver.py).
          Update _ast_helpers.py re-exports at bottom to point to new module.
      - step: "Migrate test_ast_join_helpers.py and other direct importers"
        files:
          - "tests/unit/test_ast_join_helpers.py"
          - "tests/unit/test_ast_split_int_list.py"
          - "tests/unit/test_ast_split_map_helpers.py"
          - "tests/unit/test_ast_split_int_list_helpers.py"
          - "tests/unit/test_ast_split_int_list_mutations.py"
          - "src/skill_scan/_ast_split_resolve.py"
        notes: |
          These files import directly from _ast_join_helpers or
          _ast_split_join_helpers. After _ast_join_helpers.py is deleted
          (absorbed into _ast_string_resolver.py), update imports to use
          either _ast_string_resolver (canonical) or _ast_helpers (re-export).
          test_ast_join_helpers.py: repoint imports to _ast_string_resolver.
          _ast_split_resolve.py bottom re-export: repoint to _ast_string_resolver.
          Test files importing _collect_int_list_assigns from
          _ast_split_join_helpers: repoint to _ast_split_join_helpers (not
          deleted — only _ast_join_helpers is deleted in Part B).
      - step: "Update all internal importers"
        files:
          - "src/skill_scan/_ast_detectors.py"
          - "src/skill_scan/_ast_rot13.py"
          - "src/skill_scan/_ast_symbol_table_helpers.py"
          - "src/skill_scan/_ast_symbol_table_class_helpers.py"
          - "src/skill_scan/_ast_symbol_table_dict_helpers.py"
          - "src/skill_scan/_ast_symbol_table_return_helpers.py"
          - "src/skill_scan/_ast_split_reduce.py"
          - "src/skill_scan/_ast_split_map_helpers.py"
        notes: |
          These modules import try_resolve_string, get_call_name,
          _resolve_int_expr from _ast_helpers. After extraction, these can
          continue importing from _ast_helpers (re-exports still work) OR
          be updated to import from the canonical new location. Prefer
          keeping existing import paths via re-exports to minimize churn —
          the bulk rename in Part C will update paths anyway.
      - step: "Run make check to verify zero regressions"
        files: []
        notes: "All tests must pass. Facade API unchanged."
    criteria:
      - "rules/engine.py is <=265 lines"
      - "rules/_multiline_pi.py exists and is <=60 lines"
      - "_ast_helpers.py is <=160 lines"
      - "_ast_string_resolver.py exists and is <=200 lines"
      - "_ast_join_helpers.py is deleted"
      - "ast_analyzer.py and decoder.py export signatures unchanged"
      - "make check passes with zero test failures"
      - "No file in src/ exceeds 300 lines"

  - id: c
    title: "Rename script and bulk module renames"
    status: Done
    requirements_covered: [R005, R006, R-IMP001, R-IMP003, R-IMP006]
    depends_on: [b]
    approach:
      - step: "Build scripts/rename_module.py"
        files:
          - "scripts/rename_module.py"
        notes: |
          Python script that accepts a JSON file or CLI args with
          (old_module, new_module) pairs. For each pair:
          1. git mv src/skill_scan/{old}.py src/skill_scan/{new}.py
          2. Rewrite all 'from skill_scan.{old}' and 'import skill_scan.{old}'
             across src/**/*.py and tests/**/*.py
          3. If tests/unit/test_{old_stem}.py exists, git mv to
             tests/unit/test_{new_stem}.py (where stem strips leading _)
          4. Handle the rules/ subdirectory case (engine.py -> _multiline_pi.py
             is already done, no rename needed there)

          The script must be idempotent (skip already-renamed files).
          Must handle the 'from skill_scan.{old} import X as X' re-export pattern.
          Must NOT rewrite string literals in docstrings or comments (import
          statements only). Use regex on import lines specifically.
      - step: "Run rename script with full mapping"
        files:
          - "src/skill_scan/_ast_helpers.py"
          - "src/skill_scan/_ast_split_helpers.py"
          - "src/skill_scan/_ast_split_join_helpers.py"
          - "src/skill_scan/_ast_split_star_helpers.py"
          - "src/skill_scan/_ast_split_map_helpers.py"
          - "src/skill_scan/_ast_split_int_list_helpers.py"
          - "src/skill_scan/_ast_symbol_table_helpers.py"
          - "src/skill_scan/_ast_symbol_table_dict_helpers.py"
          - "src/skill_scan/_ast_symbol_table_class_helpers.py"
          - "src/skill_scan/_ast_symbol_table_return_helpers.py"
          - "src/skill_scan/_decoder_helpers.py"
        notes: |
          Full rename mapping:
            _ast_helpers              -> _ast_imports
            _ast_split_helpers        -> _ast_split_format
            _ast_split_join_helpers   -> _ast_split_comprehension
            _ast_split_star_helpers   -> _ast_split_star_unpack
            _ast_split_map_helpers    -> _ast_split_map_resolver
            _ast_split_int_list_helpers -> _ast_split_int_list_tracker
            _ast_symbol_table_helpers -> _ast_symbol_table_assignments
            _ast_symbol_table_dict_helpers -> _ast_symbol_table_dict_tracker
            _ast_symbol_table_class_helpers -> _ast_symbol_table_self_attrs
            _ast_symbol_table_return_helpers -> _ast_symbol_table_returns
            _decoder_helpers          -> _decoder_base64_hex

          Also renames test files:
            test_ast_helpers.py -> test_ast_imports.py
            test_ast_split_helpers.py -> test_ast_split_format.py
            test_ast_split_helpers_percent.py -> test_ast_split_format_percent.py
            test_ast_split_join_helpers.py -> test_ast_split_comprehension.py
            test_ast_split_map_helpers.py -> test_ast_split_map_resolver.py
            test_ast_split_int_list_helpers.py -> test_ast_split_int_list_tracker.py
            test_ast_split_star_helpers.py -> test_ast_split_star_unpack.py (if exists)
            test_ast_symbol_table_helpers.py -> test_ast_symbol_table_assignments.py
            test_ast_symbol_table_returns.py -> test_ast_symbol_table_returns.py (no change needed)
            test_ast_join_helpers.py -> handled by Part B deletion + new test name

          Also handle kwargs_test_helpers.py in tests/unit/ — this is a test
          utility, not a source module. Rename to kwargs_test_utils.py or similar.
          The rename script MUST also rewrite tests.unit.* imports (inter-test
          imports) — not just skill_scan.* imports. Six test files import from
          kwargs_test_helpers; test_ast_split_helpers_percent imports _detect
          from test_ast_split_helpers. All must be updated.
      - step: "Manual fixup pass"
        files:
          - "tests/unit/test_ast_split_detector_join.py"
          - "tests/unit/test_ast_split_format.py"
          - "tests/unit/test_ast_symbol_table_returns.py"
        notes: |
          After script run:
          1. Delete stale _ast_symbol_table_dict_helpers (1).py duplicate
          2. Fix string-literal filename references in tests that the rename
             script intentionally skipped (not import lines):
             - test_ast_split_detector_join.py:187 — "_ast_split_helpers.py"
               and "_ast_split_join_helpers.py" in _SPLIT_FILES tuple
             - test_ast_split_format.py (was test_ast_split_helpers.py):185 —
               path to "_ast_split_helpers.py" in line-count assertion
             - test_ast_symbol_table_returns.py:254 — path to
               "_ast_symbol_table_return_helpers.py" in line-count assertion
          3. Verify no 'helpers' remains in src/skill_scan/*.py filenames
          4. grep -r '_helpers' src/ tests/ to catch any stragglers
          5. Run make check
      - step: "Run make check to verify zero regressions"
        files: []
        notes: "All tests must pass after renames."
    criteria:
      - "scripts/rename_module.py exists and handles git mv + import rewriting (both skill_scan.* and tests.unit.* imports)"
      - "Zero files matching *_helpers.py in src/skill_scan/ (grep returns empty)"
      - "All test files renamed to match source module names"
      - "No orphaned import paths (ruff/make check clean)"
      - "String-literal filename references in tests updated to new names"
      - "Inter-test imports updated (e.g. test_ast_split_format_percent -> test_ast_split_format)"
      - "_ast_symbol_table_dict_helpers (1).py deleted"
      - "make check passes with zero test failures"

  - id: d
    title: "Documentation updates"
    status: Done
    requirements_covered: [R007, R008, R009, R-IMP005]
    depends_on: [c]
    approach:
      - step: "Update CLAUDE.md project structure and architecture notes"
        files:
          - "CLAUDE.md"
        notes: |
          Update the Project Structure section with new filenames.
          Update Architecture Notes: registration patterns, invariants,
          and known debt to reference new module names.
          Remove references to deleted _ast_join_helpers.py.
          Add new modules (_ast_split_format_map.py, _ast_rot13_branch_analysis.py,
          _ast_string_resolver.py, rules/_multiline_pi.py) to the structure map.
          Update all known-debt file references.
      - step: "Update README.md"
        files:
          - "README.md"
        notes: |
          Update module structure section to reflect current state.
          Ensure codebase description matches post-refactor reality.
      - step: "Update .agent/ documentation (ARCHITECTURE-REFERENCE.md, CODE-PATTERNS.md)"
        files:
          - ".agent/ARCHITECTURE-REFERENCE.md"
          - ".agent/standards/CODE-PATTERNS.md"
        notes: |
          Both files contain hardcoded references to old *_helpers.py names
          (4 in ARCHITECTURE-REFERENCE.md, 3 in CODE-PATTERNS.md). Update
          all references to use new module names. Also update any module
          descriptions that reference deleted files (_ast_join_helpers.py).
      - step: "Update debt.yaml with any new items found during refactoring"
        files:
          - ".agent/status/debt.yaml"
        notes: |
          DEBT-029 already resolved in Part A.
          Review all other debt entries — update file paths that changed
          due to renames (e.g., _ast_split_resolve.py references, etc.).
          Add any new debt discovered during implementation.
    criteria:
      - "CLAUDE.md Project Structure section lists all new filenames"
      - "CLAUDE.md contains no references to old *_helpers.py names"
      - "README.md describes current module structure"
      - "ARCHITECTURE-REFERENCE.md contains no references to old *_helpers.py names"
      - "CODE-PATTERNS.md contains no references to old *_helpers.py names"
      - "debt.yaml file paths updated to new module names"
      - "DEBT-029 not present in debt.yaml"

