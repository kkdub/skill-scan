    expect: "At least one finding with rule_id EXEC-002 and matched_text containing 'eval'"
    test_file: tests/unit/test_evasion_corpus.py::TestAcceptanceScenarios::test_split_concat_eval_full_pipeline
    status: written

  - scenario: "Split base64-encoded payload across variables is detected via decoder bridge"
    invoke: "analyze_python() on source where a='aW1wb3J0IG' and b='9z' are concatenated"
    expect: "Finding produced for reconstructed encoded payload (decoded content contains 'import os')"
    test_file: tests/unit/test_evasion_corpus.py::TestAcceptanceScenarios::test_split_base64_decoder_bridge
    status: written

  - scenario: "Safe string concatenation produces no false positive"
    invoke: "analyze_python() on source: greeting='hello'; name='world'; msg=greeting+name"
    expect: "Zero findings with rule_id EXEC-002 or EXEC-006"
    test_file: tests/unit/test_evasion_corpus.py::TestAcceptanceScenarios::test_safe_concat_no_false_positive
    status: written

