# ---------------------------------------------------------------------------
# PARTS
# ---------------------------------------------------------------------------

parts:
  - id: a
    title: "Symbol table builder — variable assignment tracking with scope and indirection"
    status: Done
    verify_group: dataflow
    requirements_covered: [R001, R005, R-IMP001, R-IMP003]
    approach:
      - step: "Create _ast_symbol_table.py with build_symbol_table() function"
        files: [src/skill_scan/_ast_symbol_table.py]
        notes: >
          Pre-pass over ast.Module body and function bodies. Returns dict[str, str]
          mapping variable name to resolved string value. For RHS that is ast.Constant(str),
          record directly. For RHS that is ast.Name referencing another tracked variable,
          follow the chain. Use try_resolve_string() from _ast_helpers for complex RHS
          expressions (BinOp, JoinedStr, etc.) — reuse existing resolution.
      - step: "Add scope isolation — module-level vs function-level"
        files: [src/skill_scan/_ast_symbol_table.py]
        notes: >
          Walk function defs separately. Each function body gets its own scope dict that
          inherits (reads) from module scope but does not write back. Module-level walks
          only the top-level body statements. MAX_RESOLVE_DEPTH constant bounds indirection
          chains. Circular refs (a=b; b=a) return None.
    criteria:
      - "build_symbol_table(tree) returns dict[str, str] for simple string assignments (x='hello' -> {'x': 'hello'})"
      - "Module-level and function-level scopes are separate — function-local assignments do not appear in module-level symbol table"
      - "Multi-level indirection resolves: y=x where x is tracked yields y mapped to x's value (bounded by MAX_RESOLVE_DEPTH)"
      - "Circular references (a=b; b=a) do not infinite-loop — resolution returns None for those variables"
      - "MAX_RESOLVE_DEPTH constant is defined and enforced"
      - "_ast_symbol_table.py is under 250 lines"

  - id: b
    title: "Split detector — concatenation, f-string, and join reconstruction"
    status: Done
    depends_on: [a]
    verify_group: dataflow
    requirements_covered: [R002, R003, R004, R-IMP004, R-IMP006, R-IMP003]
    approach:
      - step: "Create _ast_split_detector.py with detect_split_evasion(tree, file_path, alias_map, symbol_table)"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: >
          Tree-level detector (not per-node). Walk nodes looking for: (1) ast.BinOp(Add)
          where operands are ast.Name in symbol_table, (2) ast.JoinedStr where
          FormattedValue.value is ast.Name in symbol_table, (3) ''.join([...]) where
          list elements are ast.Name in symbol_table. Reconstruct full string. If any
          fragment unresolvable, skip (R-IMP006). Use _make_split_finding() local helper.
      - step: "Add dangerous-name checks on reconstructed strings"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: >
          After reconstruction, check against _DANGEROUS_NAMES from _ast_detectors. Use
          EXEC-002 for dangerous name evasion (eval, exec, system, popen), EXEC-006 for
          dynamic import evasion (__import__, getattr). No new rule IDs.
      - step: "Handle three-or-more-variable splits and nested BinOp chains"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: >
          BinOp chains like a+b+c produce nested ast.BinOp — recursively resolve both
          sides. Three-variable f-strings and join lists handled naturally by iterating
          all elements. Covers R-ADV002.
    criteria:
      - "Concatenation: a='ev'; b='al'; a+b produces EXEC-002 finding"
      - "F-string: a='ev'; b='al'; f'{a}{b}' produces EXEC-002 finding"
      - "Join: a='ev'; b='al'; ''.join([a,b]) produces EXEC-002 finding"
      - "Three-variable split: a='e'; b='va'; c='l'; a+b+c produces EXEC-002 finding"
      - "Safe concatenation: a='hello'; b='world'; a+b produces no finding"
      - "Partial resolution failure (one variable not tracked) produces no finding"
      - "detect_split_evasion() accepts (tree, file_path, alias_map, symbol_table) signature"
      - "_ast_split_detector.py is under 250 lines"

  - id: c
    title: "Integration — wire dataflow into analyze_python, decoder bridge, facade exports"
    status: Done
    depends_on: [b]
    requirements_covered: [R006, R007, R-IMP002, R-IMP005, R-IMP007, R-ADV001]
    approach:
      - step: "Wire build_symbol_table and detect_split_evasion into analyze_python()"
        files: [src/skill_scan/ast_analyzer.py]
        notes: >
          After ast.parse() and build_alias_map(), call build_symbol_table(tree). Then
          call detect_split_evasion(tree, file_path, alias_map, symbol_table) SEPARATELY
          from the per-node _DETECTORS loop. Append results to findings. Preserves
          existing detector behavior unchanged. ~5-10 lines of wiring.
      - step: "Add decoder bridge in _ast_split_detector.py"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: >
          After reconstruction, if string does not match _DANGEROUS_NAMES, pass to
          extract_encoded_strings() from decoder.py. If encoded payloads found, decode
          and check decoded content against dangerous patterns. Catches split base64/hex
          payloads. Import from skill_scan.decoder (stdlib only).
      - step: "Add facade re-exports and integration test"
        files: [src/skill_scan/ast_analyzer.py, tests/unit/test_ast_dataflow_integration.py]
        notes: >
          Re-export build_symbol_table and detect_split_evasion from ast_analyzer.py.
          Integration test: full Python source through analyze_python(), verify findings
          for split evasion patterns. Verify existing findings unaffected (no regressions).
    criteria:
      - "analyze_python() calls build_symbol_table() and detect_split_evasion() and includes their findings"
      - "Existing analyze_python() return type (list[Finding]) is unchanged"
      - "Existing detectors produce identical findings — no regressions"
      - "Decoder bridge: split base64 payload (a='aW1wb3J0I'; b='G9z'; a+b decodes to 'import os') produces finding"
      - "build_symbol_table and detect_split_evasion re-exported from ast_analyzer.py"
      - "ast_analyzer.py remains under 250 lines"
      - "No new dependencies — stdlib only"

  - id: d
    title: "Evasion corpus and effectiveness validation"
    status: Done
    depends_on: [c]
    requirements_covered: [R-EFF001, R-EFF002, R-ADV001, R-ADV002]
    approach:
      - step: "Create evasion corpus files with split-evasion test cases"
        files: [tests/fixtures/split_evasion/]
        notes: >
          Python files covering: two-variable concat, three-variable concat, f-string
          interpolation, join-based assembly, multi-level indirection, split encoded
          payloads (base64/hex), mixed safe+dangerous patterns. Each file is a valid
          Python snippet. Include positive (should detect) and negative (should not) cases.
      - step: "Create parametrized effectiveness test"
        files: [tests/unit/test_ast_dataflow_integration.py]
        notes: >
          Parametrized test reads corpus files, runs analyze_python() on each, checks
          for expected findings. Assert >= 90% detection on positive cases and zero
          false positives on negative cases.
    criteria:
      - "Corpus contains at least 10 distinct evasion patterns (concat, f-string, join, multi-level, encoded, three-variable)"
      - "Corpus contains at least 3 safe/negative patterns that must not trigger findings"
      - "Detection rate >= 90% on positive corpus cases"
      - "Zero false positives on negative corpus cases"
      - "Adversarial case: no individual fragment is dangerous but combination triggers detection (R-ADV001)"
      - "Three-variable splits detected (R-ADV002)"

