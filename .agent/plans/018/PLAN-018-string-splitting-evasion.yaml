id: "PLAN-018"
title: "String-Splitting Evasion Detection (AST-level payload reconstruction)"
type: implementation
status: Done
created: 2026-03-10

linked_spec: null

# ---------------------------------------------------------------------------
# DESCRIPTION
# ---------------------------------------------------------------------------

description: |
  Add AST-level dataflow analysis to detect payloads split across multiple
  variables or string operations that evade regex-based detection. Builds a
  symbol table from variable assignments, then reconstructs concatenated,
  f-string-interpolated, and join-assembled strings to check for dangerous
  patterns and encoded payloads.

  From DEBT-012: regex-based extraction cannot detect payloads split across
  multiple variables or string concatenations (e.g., a = "aWdub3Jl";
  b = "IHByZXZpb3Vz"). Requires AST-level analysis that traces string
  concatenation and variable assignment to reconstruct split payloads
  before decoding.

# ---------------------------------------------------------------------------
# REQUIREMENTS
# ---------------------------------------------------------------------------

requirements:
  file: REQUIREMENTS-018.yaml
  ids:
    - R001    # Variable assignment tracking (symbol table)
    - R002    # Concatenation reconstruction (a + b)
    - R003    # F-string reconstruction (f"{a}{b}")
    - R004    # Join reconstruction ("".join([a, b]))
    - R005    # Multi-level indirection (y = x; z = y + "suffix")
    - R006    # Decoder integration (feed reconstructed strings to decoder)
    - R007    # Finding generation (existing rule IDs)
    - R-IMP001  # Depth limit (bounded resolution)
    - R-IMP002  # Performance (no more than 2x overhead)
    - R-IMP003  # File size compliance (250 lines)
    - R-IMP004  # No false positives on safe patterns
    - R-IMP005  # analyze_python() integration (no API break)
    - R-IMP006  # Partial resolution = no finding
    - R-IMP007  # Facade re-export pattern
    - R-EFF001  # Evasion corpus
    - R-EFF002  # Detection rate >= 90%
    - R-ADV001  # Individually-benign fragments combine to dangerous
    - R-ADV002  # Three-variable splits detected
  uncovered: []

