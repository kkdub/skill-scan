id: "PLAN-020"
title: "T2 detection hardening: f-string conversions, containers, generator/map join, string multiply, percent-format defense"
type: implementation
status: Done
created: 2026-03-12

linked_spec: null

description: |
  Address 6 debt items (4 from PLAN-018 Tier 2, 2 from PLAN-019) that represent
  detection gaps in the AST split-evasion detector and symbol table. Closes 13
  known evasion patterns plus 2 security defense-in-depth gaps.

  Debt items resolved:
    - DEBT-018-T2-FSTRING-CONV: f-strings with !s/!r conversions bail out
    - DEBT-018-T2-CONTAINERS (partial): dict subscript storage evades symbol table (list indices deferred to DEBT-018-T2-LIST-INDEX)
    - DEBT-018-T2-GENERATOR-JOIN: generator/map() in join() not resolved
    - DEBT-018-T2-STRING-MULT: string multiplication not tracked
    - DEBT-019-PERCENT-OVERPROVISIONED: _substitute_percent() missing defense-in-depth
    - DEBT-019-PERCENT-MIXED-SPECIFIERS: %-format only matches %s

