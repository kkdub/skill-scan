    expect: "At least one EXEC-002 finding from detect_split_evasion"
    test_file: tests/unit/test_ast_split_detector_join.py
    status: passing

  - scenario: "Dict subscript evasion resolves through symbol table to EXEC-002"
    invoke: "analyze_python() on source: d = {'cmd': 'eval'}; getattr(__builtins__, d['cmd'])('1+1')"
    expect: "At least one EXEC-002 or EXEC-006 finding; subscript resolved via symbol table"
    test_file: tests/unit/test_ast_split_detector_join.py
    status: passing

  - scenario: "map(chr, ...) join assembles dangerous payload via split reconstruction"
    invoke: "analyze_python() on source: payload = ''.join(map(chr, [101,118,97,108]))"
    expect: "EXEC-002 finding with description containing 'split' or 'reconstructed' (no exec() call to mask detection source)"
    test_file: tests/unit/test_ast_split_detector_join.py
    status: passing

