# ─────────────────────────────────────────────────────────────────────────────
# PARTS
# ─────────────────────────────────────────────────────────────────────────────
# Skeleton: skip (brownfield single-layer, all changes extend existing modules)
#
# Dependency graph:
#   a ──► d           (symbol table: split → containers)
#   a ──► e           (symbol table: split → multiply)
#   b ──► f           (detector: f-string fix → generator/map join)
#   c                 (helpers: percent-format, independent)
#
# Verify group: symtable-expand (parts d, e)

parts:

  - id: a
    title: "Extract symbol table helpers to _ast_symbol_table_helpers.py"
    status: Done
    depends_on: []
    requirements_covered: [R-IMP007]
    approach:
      - step: "Create _ast_symbol_table_helpers.py and migrate internal helper functions from _ast_symbol_table.py"
        files:
          - src/skill_scan/_ast_symbol_table_helpers.py
          - src/skill_scan/_ast_symbol_table.py
        notes: >
          Move _track_name_assign, _handle_assign, and sub-helpers until
          _ast_symbol_table.py falls to <=200 lines, leaving >=50 lines
          headroom for Parts (d) and (e). Keep _Ref sentinel and
          build_symbol_table() public interface in the main module.
      - step: "Re-import migrated helpers and verify facade re-exports"
        files:
          - src/skill_scan/_ast_symbol_table.py
          - src/skill_scan/ast_analyzer.py
        notes: >
          build_symbol_table must still be importable from ast_analyzer.
          The new helpers file is a private sibling, not re-exported from facade.
      - step: "Run make check to confirm no regressions"
        files: []
        notes: "Purely structural refactor — no behavioral change."
    criteria:
      - "_ast_symbol_table_helpers.py exists with migrated helper functions"
      - "_ast_symbol_table.py is <=200 lines (>=50 lines headroom)"
      - "build_symbol_table() importable from ast_analyzer (facade intact)"
      - "_Ref sentinel remains in _ast_symbol_table.py"
      - "make check passes with no new failures"

  - id: b
    title: "Fix f-string conversion bail-outs in _resolve_formatted_value()"
    status: Done
    depends_on: []
    requirements_covered: [R001, R002, R-IMP001, R-EFF001]
    approach:
      - step: "Remove early-return guards that bail when FormattedValue.conversion or format_spec is set"
        files:
          - src/skill_scan/_ast_split_detector.py
        notes: >
          Return the raw base variable value in both cases — do not emulate
          Python conversion semantics. This closes evasion via f'{x!r}'.
      - step: "Add positive fixture files for f-string conversion evasion"
        files:
          - tests/fixtures/split_evasion/pos_fstring_conversion_s.py
          - tests/fixtures/split_evasion/pos_fstring_conversion_r.py
          - tests/fixtures/split_evasion/pos_fstring_format_spec.py
        notes: >
          Each fixture assembles a dangerous name via f-string with !s, !r,
          or format_spec. Parametrized test suite auto-discovers pos_*.py files.
    criteria:
      - "_resolve_formatted_value() does not return None for !s or !r conversion"
      - "_resolve_formatted_value() does not return None for non-None format_spec"
      - "Both cases return the resolved base variable string value (raw)"
      - "pos_fstring_conversion_s.py detected as EXEC-002"
      - "pos_fstring_conversion_r.py detected as EXEC-002"
      - "pos_fstring_format_spec.py detected as EXEC-002"
      - "make check passes"

  - id: c
    title: "Harden percent-format: mixed specifiers and over-provisioning defense"
    status: Done
    depends_on: []
    requirements_covered: [R008, R009, R-IMP004, R-IMP005, R-IMP006, R-ADV001, R-ADV002]
    approach:
      - step: "Expand %-specifier regex to match all standard specifiers with %% lookbehind"
        files:
          - src/skill_scan/_ast_split_helpers.py
        notes: >
          Replace _PERCENT_S_RE with a regex matching %s, %d, %f, %x, %o,
          %e, %g, %c, %r, %a, %i using (?<!%)%[sdfrxoegcai]. Carry forward
          the existing negative lookbehind for %% literals (R-IMP005).
      - step: "Add over-provisioning defense to _substitute_percent()"
        files:
          - src/skill_scan/_ast_split_helpers.py
        notes: >
          Return None when len(values) > placeholder count. Must not alter
          behavior for correctly-provisioned calls (R-IMP004).
      - step: "Update _substitute_percent() to replace all specifiers, not just %s"
        files:
          - src/skill_scan/_ast_split_helpers.py
        notes: >
          Replace the current `.replace("%s", val, 1)` loop with regex-based
          substitution that handles all matched specifiers (%s, %d, %f, etc.)
          in order. Use the same expanded regex from step 1 to find the next
          placeholder and substitute the corresponding value. This ensures
          mixed-specifier templates like '%s%d' actually resolve.
      - step: "Add unit tests for mixed specifiers, over-provisioning, %% exclusion, and %s regression"
        files:
          - tests/unit/test_ast_split_helpers.py
        notes: >
          17 lines headroom. If tests overflow 250 lines, create
          tests/unit/test_ast_split_helpers_percent.py as overflow file.
    criteria:
      - "_resolve_percent_format() matches %d, %f, %x, %o, %e, %g, %c in addition to %s"
      - "%% literals excluded from placeholder count"
      - "_substitute_percent() returns None when len(values) > placeholder count"
      - "Correctly-provisioned calls unchanged (existing tests pass)"
      - "%s-only template detection not regressed (pos_percent_eval/exec fixtures pass)"
      - "make check passes"

  - id: d
    title: "Track dict subscript assignments and literals in build_symbol_table()"
    status: Done
    depends_on: [a]
    verify_group: symtable-expand
    requirements_covered: [R003, R004, R-IMP002, R-EFF002]
    approach:
      - step: "Add composite-key subscript assignment tracking to _collect_assignments()"
        files:
          - src/skill_scan/_ast_symbol_table.py
          - src/skill_scan/_ast_symbol_table_helpers.py
        notes: >
          Key format is 'varname[key]' — brackets prevent collision with
          plain names (R-IMP002). Only track when base name and slice are
          statically resolvable strings. List index subscripts (int keys)
          deferred to DEBT-018-T2-LIST-INDEX.
      - step: "Add dict literal initial-value tracking"
        files:
          - src/skill_scan/_ast_symbol_table.py
          - src/skill_scan/_ast_symbol_table_helpers.py
        notes: >
          Iterate ast.Dict keys/values, record 'varname[key]' -> value
          for string-literal keys and string-literal values.
      - step: "Add ast.Subscript lookup to _try_resolve_split()"
        files:
          - src/skill_scan/_ast_split_detector.py
        notes: >
          Build composite key from ast.Subscript (Name base + string slice)
          and look up in symbol table. Only activate when base is ast.Name
          and slice is ast.Constant(str).
      - step: "Add positive fixtures and unit tests"
        files:
          - tests/fixtures/split_evasion/pos_dict_subscript_assign.py
          - tests/fixtures/split_evasion/pos_dict_literal_subscript.py
          - tests/unit/test_ast_symbol_table_edge.py
        notes: >
          test_ast_symbol_table_edge.py has 185 lines headroom — primary
          overflow target for new symbol table tests.
    criteria:
      - "build_symbol_table() records 'varname[key]' for subscript assignments"
      - "build_symbol_table() records 'varname[key]' for dict literal initializers"
      - "Composite keys use bracket format (no collision with plain names)"
      - "_try_resolve_split() resolves ast.Subscript via composite key lookup"
      - "pos_dict_subscript_assign.py detected as EXEC-002"
      - "pos_dict_literal_subscript.py detected as EXEC-002"
      - "make check passes"

  - id: e
    title: "Track BinOp(Mult) string repetition in build_symbol_table()"
    status: Done
    depends_on: [a]
    verify_group: symtable-expand
    requirements_covered: [R007, R-IMP003, R-EFF005]
    approach:
      - step: "Add BinOp(Mult) resolution for string * positive-int assignments"
        files:
          - src/skill_scan/_ast_symbol_table.py
          - src/skill_scan/_ast_symbol_table_helpers.py
        notes: >
          Handle both operand orders (str*int and int*str). Only resolve
          when integer >= 1 (R-IMP003). Skip 0, negative, and float operands.
      - step: "Add positive fixture and unit tests"
        files:
          - tests/fixtures/split_evasion/pos_string_multiply.py
          - tests/unit/test_ast_symbol_table_edge.py
        notes: >
          Unit tests cover: int 1, int 2, int 0 (skip), negative (skip),
          float (skip), reversed operand order.
    criteria:
      - "build_symbol_table() resolves string * positive-int to repeated string"
      - "Reversed operand order (int * string) also resolves"
      - "Integer 0 or negative is NOT tracked"
      - "Float operand is NOT tracked"
      - "pos_string_multiply.py detected as EXEC-002"
      - "make check passes"

  - id: f
    title: "Resolve generator expressions and map(chr/str) in _resolve_join_call()"
    status: Done
    depends_on: [b]
    requirements_covered: [R005, R006, R-EFF003, R-EFF004]
    approach:
      - step: "Add generator expression handling in _resolve_join_call()"
        files:
          - src/skill_scan/_ast_split_detector.py
        notes: >
          Handle ast.GeneratorExp as join argument. Only resolve single-variable
          generators over list/tuple of string literals. Use _resolve_expr_list
          from helpers for element resolution.
      - step: "Thread alias_map into _resolve_join_call() and add map(chr/str) handling"
        files:
          - src/skill_scan/_ast_split_detector.py
        notes: >
          Add alias_map parameter to _resolve_join_call() signature (currently
          only takes node, symbol_table, scope). Update all call sites to pass
          alias_map through. Then add map(chr/str) support: use
          get_call_name(node.func, alias_map) to resolve aliased chr/str calls.
          For chr(), convert each int literal to character. For str(), passthrough.
          Limit to chr and str only — other functions not resolved.
      - step: "Add positive fixtures and unit tests"
        files:
          - tests/fixtures/split_evasion/pos_join_generator_expr.py
          - tests/fixtures/split_evasion/pos_join_map_chr.py
          - tests/fixtures/split_evasion/pos_join_map_str.py
        notes: >
          14 lines headroom in test_ast_split_detector.py. If overflow,
          create test_ast_split_detector_join.py. Fixtures use standard
          pos_ naming convention.
    criteria:
      - "_resolve_join_call() handles ast.GeneratorExp by resolving element fragments"
      - "_resolve_join_call() handles map(chr, ints) by converting each int to char"
      - "_resolve_join_call() handles map(str, strings) as passthrough"
      - "map() limited to chr and str — other functions not resolved"
      - "pos_join_generator_expr.py detected as EXEC-002"
      - "pos_join_map_chr.py detected as EXEC-002"
      - "pos_join_map_str.py detected as EXEC-002"
      - "make check passes"

