id: "PLAN-035"
title: "Branch-aware int-list pre-pass (DEBT-028)"
type: implementation
status: Proposed
created: 2026-03-21
linked_spec: null
description: |
  Fix DEBT-028-INTLIST-BRANCH-MERGE: the int-list pre-pass walks if/else and
  match/case branches sequentially, merging mutations from mutually exclusive
  paths into one list. This produces impossible combined values and potential
  false positives. Fix by snapshotting the int-list table before entering
  mutually exclusive branches, walking each branch independently from the
  snapshot, then merging conservatively (shadow keys that differ).

