parts:
  - id: a
    title: "Branch-aware merge for If and Match in int-list pre-pass"
    status: Done
    requirements_covered: [R001, R002, R003, R004, R005, R-IMP001, R-IMP002, R-IMP003]
    depends_on: []
    approach:
      - step: "Add _merge_branches helper to _ast_split_int_list_tracker.py"
        files:
          - src/skill_scan/_ast_split_int_list_tracker.py
        notes: |
          Add a helper that takes N branch results (list of dicts) and merges them
          conservatively into the result dict. For each key across all branch results:
          - Present in all branches with same value (by identity for _SHADOW, by == otherwise) -> keep
          - Present in some but not all branches, values agree -> keep value
          - Present in some but not all branches, values disagree -> shadow
          - Present in all branches with different values -> shadow
          Must handle _SHADOW identity comparison correctly (_SHADOW == [] is True).
      - step: "Update _walk_fn_body to handle If and Match with snapshot/merge"
        files:
          - src/skill_scan/_ast_split_int_list_tracker.py
        notes: |
          When stmt is ast.If: snapshot result, walk stmt.body, capture after_if,
          restore snapshot, walk stmt.orelse, capture after_else, merge.
          When stmt is ast.Match: snapshot result, walk each case.body independently
          from snapshot, collect all branch results. For non-exhaustive match (no
          wildcard/MatchAs(name=None) case), include the snapshot itself as an extra
          branch to model "no case matched". Then N-way merge all branch results.
          For all other _sub_bodies results (For, While, Try, With): keep sequential walk.
      - step: "Update _collect_int_lists_from_body to delegate to branch-aware walker"
        files:
          - src/skill_scan/_ast_split_comprehension.py
        notes: |
          Refactor to share the branch-aware logic from _walk_fn_body. Either call
          _walk_fn_body with None declarations, or extract common branch-aware body
          walker that both functions use. Minimize line additions (only 22 lines headroom).
      - step: "Add tests for branch merge behavior"
        files:
          - tests/unit/test_ast_split_int_list_tracker.py
        notes: |
          Test cases: (1) if/else both extend same list differently -> shadow,
          (2) if/else both extend identically -> keep, (3) only if-branch assigns -> preserved,
          (4) match/case with 3 cases diverging -> shadow, (5) non-exhaustive match
          includes snapshot as extra branch, (6) nested if inside function
          with declarations -> correct scope keys, (7) for-loop body still merges
          sequentially (not branch-aware), (8) key in subset of branches with
          disagreeing values -> shadow. Use _collect helper and check result dict.
    criteria:
      - "_walk_fn_body handles ast.If by snapshotting, walking branches independently, and merging"
      - "_walk_fn_body handles ast.Match by snapshotting, walking each case independently, and N-way merging"
      - "Non-exhaustive match (no wildcard case) includes pre-match snapshot as extra merge branch"
      - "_collect_int_lists_from_body uses the same branch-aware logic (not a separate code path)"
      - "For/While/Try/With sub-bodies still walked sequentially (no snapshot/merge)"
      - "Keys with identical values across all branches are retained"
      - "Keys newly assigned in only one branch are preserved"
      - "Keys with different values across branches are replaced with _SHADOW"
      - "_SHADOW comparison uses identity (is), not equality (==)"
      - "Declaration threading (_Decls) works correctly through branch-aware paths"
      - "All existing tests pass (make check green)"
      - "_ast_split_int_list_tracker.py stays under 300 lines"
      - "_ast_split_comprehension.py stays under 300 lines"

