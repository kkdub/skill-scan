id: "PLAN-011"
title: "SARIF Output & CI/CD Distribution"
type: implementation
status: Done
created: 2026-03-06

linked_spec: null

description: |
  Add SARIF v2.1.0 output format for CI/CD integration (GitHub Advanced Security,
  GitLab, etc.), a GitHub Action for zero-config pipeline usage, and a pre-commit
  hook for developer workflows.

  SARIF formatter follows the existing json_formatter.py pattern — pure function,
  stdlib only, returns string. Targets the minimal GitHub-compatible SARIF subset
  plus tool.driver.rules[] for meaningful alert descriptions.

  GitHub Action is a composite action supporting local path, remote repo, format
  selection, fail-on threshold, and custom config. Pre-commit hook is configurable
  via args (user specifies skill directory path).

requirements:
  file: REQUIREMENTS-011.yaml
  ids:
    - R001    # SARIF formatter produces valid SARIF v2.1.0 JSON
    - R002    # CLI accepts --format sarif
    - R003    # GitHub Action with path/repo/fail-on/format/config inputs
    - R004    # Pre-commit hook with configurable path
    - R005    # SARIF compatible with GitHub Code Scanning
    - R-IMP001  # SARIF formatter is pure (no I/O)
    - R-IMP002  # stdlib only (no new deps)
    - R-IMP003  # Severity-to-level mapping
    - R-IMP004  # format_sarif in __all__
    - R-IMP005  # Action handles local + remote
    - R-IMP006  # SARIF includes rule metadata
    - R-IMP007  # Under 250 lines
    - R-IMP008  # Findings without line number handled
  uncovered: []

