  infrastructure_parts: []

environment:
  status: assessed
  build:
    tool: make
    install_cmd: "make install"
    check_cmd: "make check"
    prerequisites: ["Python 3.13", "uv"]
  runtime_services: []
  changes:
    new_dependencies: []
    env_vars: []
    schema_changes: []
    ci_changes: []
    build_changes:
      - file: "action.yml"
        description: "New composite GitHub Action definition at repo root"
      - file: ".pre-commit-hooks.yaml"
        description: "New pre-commit hook definition at repo root"

# Skeleton: opt-out
# Category: brownfield single-layer extension
# Justification: SARIF formatter mirrors json_formatter.py exactly.
# Action/hook are config files. No cross-layer wiring.

parts:
  - id: a
    title: "SARIF formatter and CLI wiring"
    status: Done
    requirements_covered: [R001, R002, R005, R-IMP001, R-IMP002, R-IMP003, R-IMP004, R-IMP006, R-IMP007, R-IMP008]
    approach:
      - step: "Create sarif_formatter.py with format_sarif() and helper functions"
        files: [src/skill_scan/sarif_formatter.py]
        notes: >
          Mirror json_formatter.py pattern exactly. Pure function: format_sarif(ScanResult) -> str.
          Helpers: _build_sarif_result() for each Finding, _severity_to_level() for mapping,
          _build_driver_rules() to deduplicate rules from findings and produce tool.driver.rules[].
          Use json.dumps(data, indent=2) for readable output (SARIF files are typically pretty-printed).
          Findings with line=None should omit the region field but still include artifactLocation.uri.
      - step: "Wire sarif format into CLI and update public API"
        files: [src/skill_scan/cli.py, src/skill_scan/__init__.py]
        notes: >
          cli.py:63 — add 'sarif' to Choice list: Choice(["text", "json", "sarif"]).
          cli.py:156-160 — add elif fmt == "sarif" branch importing format_sarif.
          __init__.py — add format_sarif to imports and __all__.
      - step: "Write tests for SARIF formatter"
        files: [tests/unit/test_sarif_formatter.py]
        notes: >
          Mirror test_json_formatter.py structure. Test: valid SARIF structure,
          severity-to-level mapping for all 5 levels, rule metadata generation,
          findings with and without line numbers, empty findings list,
          deterministic output. Use json.loads() to validate structure.
    criteria:
      - "format_sarif(ScanResult) returns valid JSON with version='2.1.0' and runs array"
      - "Each Finding maps to a SARIF result with ruleId, message.text, level, and locations"
      - "Severity mapping: critical/high -> error, medium -> warning, low/info -> note"
      - "tool.driver.rules[] contains deduplicated rule entries with id, shortDescription, fullDescription"
      - "Findings with line=None produce results with artifactLocation but no region"
      - "CLI --format sarif outputs SARIF JSON to stdout"
      - "format_sarif is in skill_scan.__all__"
      - "sarif_formatter.py is under 250 lines"
      - "All new tests pass"

  - id: b
    title: "GitHub Action and pre-commit hook"
    status: Done
    depends_on: [a]
    requirements_covered: [R003, R004, R-IMP005]
    approach:
      - step: "Create action.yml composite action"
        files: [action.yml]
        notes: >
          Composite action. Inputs: path (default '.'), repo (optional), fail-on (optional),
          format (default 'text'), config (optional). Steps: setup Python, install uv,
          install skill-scan, run skill-scan scan with appropriate args. If format=sarif,
          include upload-sarif step. Support both path and --repo modes. Use
          astral-sh/setup-uv action for uv install (same as ci.yml).
      - step: "Create .pre-commit-hooks.yaml"
        files: [.pre-commit-hooks.yaml]
        notes: >
          Single hook: id=skill-scan, name='Scan agent skills for security issues',
          entry='skill-scan scan', language=python, pass_filenames=false,
          types=[directory]. Users configure args in their .pre-commit-config.yaml
          to specify skill directory path. Example in description or README.
    criteria:
      - "action.yml is a valid composite action with inputs: path, repo, fail-on, format, config"
      - "Action installs Python, uv, and skill-scan, then runs scan with user-provided inputs"
      - "Action supports both local path and --repo remote scanning"
      - "Action conditionally uploads SARIF when format=sarif"
      - ".pre-commit-hooks.yaml defines skill-scan hook with pass_filenames=false"
      - "Pre-commit hook entry is 'skill-scan scan' and users pass skill path via args"

acceptance_scenarios:
  - scenario: "SARIF output from CLI is valid and contains rule metadata"
    invoke: "skill-scan scan --format sarif ./test-skill-dir"
    expect: >
      stdout is valid JSON with version='2.1.0', tool.driver.name='skill-scan',
      results[] with ruleId/message/level/locations, and tool.driver.rules[]
      with shortDescription and fullDescription for each triggered rule
    test_file: tests/integration/test_sarif_acceptance.py
    status: passing

  - scenario: "GitHub Action runs scan and produces output"
    invoke: "GitHub Action with inputs path=./test-skill, format=sarif, fail-on=high"
    expect: "Action completes, SARIF file produced, exit code 2 if high+ findings exist"
    test_file: tests/integration/test_cli_sarif_format.py
    status: passing

