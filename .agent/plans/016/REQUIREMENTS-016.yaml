    category: security
    contract:
      given: "_resolve_binop_add or _resolve_int_expr called with depth > MAX_AST_RESOLVE_DEPTH"
      when: "Recursion depth exceeds limit"
      then: "Returns None instead of recursing further; no RecursionError raised"
    verify: test::tests/unit/test_ast_analyzer.py
    status: done

