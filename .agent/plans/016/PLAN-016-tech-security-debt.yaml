  file: REQUIREMENTS-016.yaml
  ids:
    - R001  # Catch RecursionError in analyze_python
    - R002  # Depth limits on recursive AST helpers
    - R003  # INFO finding on AST parse failure
    - R004  # Hide _depth parameter from match_content public API
    - R005  # Split ast_analyzer.py below 250-line limit
    - R006  # Split decoder.py below 250-line limit
    - R-IMP001  # No new dependencies
    - R-IMP002  # All files under 250 lines
    - R-IMP003  # All existing tests pass
    - R-IMP004  # Follow Facade Re-export Pattern
    - R-IMP005  # Public API surface unchanged
  uncovered: []

