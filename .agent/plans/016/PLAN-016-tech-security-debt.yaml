id: "PLAN-016"
title: "Technical & Security Debt Cleanup"
type: implementation
status: Done
created: 2026-03-09

linked_spec: null

description: |
  Address technical and security debt identified across three modules:
  ast_analyzer.py (at 249 lines, needs split before any additions),
  decoder.py (at 250 lines, needs split for headroom), and
  rules/engine.py (match_content exposes _depth to callers).

  The plan also hardens AST analysis against RecursionError from
  adversarial input and adds an INFO finding when AST parsing fails
  (instead of silently returning empty results).

  All changes are internal refactors — no public API changes, no new
  dependencies, no changes to __init__.py exports.

