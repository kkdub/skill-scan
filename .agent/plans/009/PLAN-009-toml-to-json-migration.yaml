id: "PLAN-009"
title: "Migrate rule definitions from TOML to JSON with schema validation"
type: implementation
status: Proposed
created: 2026-02-17

linked_spec: null

description: |
  Built-in rule definitions live in TOML files with no structural validation —
  a contributor can add a rule, misspell a field, and only discover it at runtime.

  Migrating to JSON enables JSON Schema validation: every rule file can be
  machine-validated for required fields, correct types, and valid enum values
  before any code runs. This is high-value for an open-source security tool
  where contributors need confidence that rule changes are correct.

  Scope: built-in rule data files only. User config files (--config) stay TOML.
  Procedural rule constants (FS-*, SV-*) are unchanged — they are hardcoded in
  Python modules today and not loaded from rule files.

