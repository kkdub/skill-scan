  - id: b
    title: "Switch loader + tests from TOML to JSON"
    status: Pending
    depends_on: [a]
    requirements_covered: [R-003, R-005, R-007, R-008]
    criteria:
      - "loader.py: import tomllib replaced with import json"
      - "loader.py: load_rules() opens file in text mode ('r') not binary ('rb')"
      - "loader.py: json.load() replaces tomllib.load()"
      - "loader.py: load_default_rules() globs *.json instead of *.toml, skips rule_schema.json"
      - "loader.py: docstrings updated (TOML references -> JSON, TOMLDecodeError -> JSONDecodeError)"
      - "load_rules_from_config() unchanged (user config path unaffected)"
      - "10 rule-detection test files: RULES_PATH .toml -> .json"
      - "test_rules_loader.py: write_toml() -> write_json(), all .toml refs -> .json"
      - "test_loader_exclude_mode.py: TOML helpers -> JSON helpers"
      - "test_rules_loader.py must be at or under 250 lines after changes"
      - "User config fixtures in tests/fixtures/configs/ unchanged (still TOML)"
      - "make check passes clean"
    notes: |
      Loader and tests must switch atomically — load_rules() can only read one
      format. The 10 RULES_PATH changes are trivial (extension swap). The real
      work is loader.py and the two loader test files.

      test_rules_loader.py is at 251 lines (already over limit). The TOML->JSON
      helper conversion should net-save lines (json.dumps is simpler than TOML
      string construction), but verify this. If not, extract a helper or trim
      a test to get under 250.

