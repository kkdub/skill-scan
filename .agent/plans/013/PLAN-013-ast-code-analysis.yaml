# Skeleton: opt-out
# Category: brownfield single-layer extension
# Justification: New analysis module integrated at one call site
# (content_scanner.py). Follows existing scan pipeline pattern.

parts:
  - id: a
    title: "AST analyzer module — detect unsafe patterns in Python AST"
    status: Done
    requirements_covered: [R001, R002, R003, R004, R007, R-IMP001, R-IMP002, R-IMP003, R-IMP004, R-EFF001, R-EFF002]
    verify_group: ast-scanning
    approach:
      - step: "Create ast_analyzer.py with AST visitor and pattern detectors"
        files: [src/skill_scan/ast_analyzer.py]
        notes: >
          Pure module using stdlib ast. Core function: analyze_python(content, file_path) -> list[Finding].
          Parses with ast.parse(), walks tree with ast.walk(). Catches SyntaxError and returns [].
          Detector functions (each ~10-20 lines):
          _detect_unsafe_calls(node) — eval(), exec(), os.system(), subprocess with shell=True.
          _detect_dynamic_access(node) — getattr with string concat building dangerous names.
          _detect_dynamic_imports(node) — __import__(), importlib.import_module().
          _detect_unsafe_deserialization(node) — pickle.loads, yaml.load (without SafeLoader), marshal.loads.
          _detect_string_concat_evasion(node) — BinOp(Constant+Constant) or ''.join([...]) building
          known dangerous function names (eval, exec, system, etc.).
          Reuse existing rule IDs (EXEC-002 for eval/exec, EXEC-006 for dynamic imports, EXEC-007 for pickle).
      - step: "Write comprehensive tests for AST analyzer"
        files: [tests/unit/test_ast_analyzer.py]
        notes: >
          Test each detector with positive cases (should detect) and negative cases (should not detect).
          Evasion variants to test: getattr concat, chr() construction, ''.join(), format string building,
          variable aliasing (e = eval; e(x)). Safe patterns: ast.literal_eval, subprocess(shell=False),
          yaml.safe_load. Test SyntaxError graceful fallback. Test line number accuracy.
          Parametrize evasion tests for effectiveness measurement.
    criteria:
      - "analyze_python() detects eval(), exec(), os.system() calls via AST"
      - "analyze_python() detects getattr + string concat building 'eval'/'exec'"
      - "analyze_python() detects __import__() and importlib.import_module()"
      - "analyze_python() detects pickle.loads, yaml.load (unsafe), marshal.loads"
      - "analyze_python() returns [] on SyntaxError (no crash)"
      - "Findings reuse existing rule IDs (EXEC-002, EXEC-006, EXEC-007)"
      - "Findings have correct line numbers from AST node.lineno"
      - "Safe patterns (ast.literal_eval, yaml.safe_load) produce no findings"
      - "ast_analyzer.py is under 250 lines"

  - id: b
    title: "Engine integration — run AST analysis on Python files"
    status: Done
    depends_on: [a]
    requirements_covered: [R005, R006]
    verify_group: ast-scanning
    approach:
      - step: "Integrate AST analysis into content_scanner.py for .py files"
        files: [src/skill_scan/content_scanner.py]
        notes: >
          In _apply_rules() or _scan_file(), after regex scanning, check if file_path
          ends with .py. If so, call analyze_python(content, relative_path).
          Deduplicate: collect AST findings, filter out any where (rule_id, line) already
          exists in regex findings. Append remaining AST findings.
          content_scanner.py is currently 121 lines — plenty of room.
      - step: "Write integration tests — AST + regex deduplication"
        files: [tests/unit/test_ast_analyzer.py]
        notes: >
          Test that .py files get both regex and AST scanning. Test that .md/.yaml files
          get regex only. Test deduplication: eval() on line 5 produces one finding (not two).
          Test that AST-only evasions (getattr concat) are caught even though regex misses them.
    criteria:
      - "Python files (.py) are scanned by both regex rules and AST analyzer"
      - "Non-Python files are scanned by regex only (AST not attempted)"
      - "Findings are deduplicated by (rule_id, line) — no duplicates from regex + AST"
      - "AST-only detections (string concat evasion) appear in scan results"
      - "content_scanner.py stays under 250 lines"

acceptance_scenarios:
  - scenario: "AST catches evasion that regex misses"
    invoke: "scan a skill directory with a .py file containing getattr(__builtins__, 'ev'+'al')(user_input)"
    expect: >
      Finding produced with rule_id=EXEC-002 or EXEC-006, correct file and line number,
      describing dynamic attribute access constructing eval
    test_file: tests/unit/test_ast_integration.py
    status: passing

  - scenario: "Regex and AST findings are deduplicated"
    invoke: "scan a skill directory with a .py file containing plain eval(data)"
    expect: "Exactly one EXEC-002 finding (not two), since both regex and AST detect it"
    test_file: tests/unit/test_ast_integration.py
    status: passing

