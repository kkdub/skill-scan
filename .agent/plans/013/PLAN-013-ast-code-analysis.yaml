id: "PLAN-013"
title: "AST-Based Code Analysis for Python Files"
type: implementation
status: Proposed
created: 2026-03-06

linked_spec: null

description: |
  Add AST-based analysis for Python files to catch evasion techniques that regex
  cannot detect. Regex is effective for text/Markdown patterns (prompt injection)
  but brittle for code — attackers can evade (?i)\beval\s*\( with techniques like
  getattr(__builtins__, 'ev' + 'al') or chr(101)+chr(118)+chr(97)+chr(108).

  AST analysis supplements regex rules (does not replace them). Both run on .py
  files, and findings are deduplicated. Non-Python files are unaffected.

  Design: new ast_analyzer.py module with pure functions. Integrates into
  content_scanner.py — after regex scanning, .py files get an additional AST pass.
  Files with syntax errors fall back to regex-only (no crash).

requirements:
  file: REQUIREMENTS-013.yaml
  ids:
    - R001      # Detect unsafe function calls via AST
    - R002      # Catch string concatenation evasions
    - R003      # Detect unsafe deserialization
    - R004      # Detect dynamic imports
    - R005      # Supplements regex, deduplicated
    - R006      # Only runs on .py files
    - R007      # Syntax errors fall back gracefully
    - R-IMP001  # Pure module
    - R-IMP002  # Stdlib only (ast)
    - R-IMP003  # Under 250 lines
    - R-IMP004  # Reuses existing rule IDs and Finding model
    - R-EFF001  # >= 80% evasion detection
    - R-EFF002  # Zero false positives on safe code
  uncovered: []

