id: "PLAN-026"
title: "Kwargs detector debt cleanup: dict union + truthy matching"
type: implementation
status: Approved
created: 2026-03-15

description: |
  Resolve two low-severity effectiveness debt items from PLAN-025 in the kwargs
  unpacking detector (_ast_kwargs_detector.py):

  1. DEBT-025-DICT-UNION — detect dangerous kwargs passed via PEP 584 dict union
     operators (opts | {'shell': True} and opts |= {'shell': True}).

  2. DEBT-025-SHELL-INT-TRUTHY — detect integer truthy values (e.g. shell=1) when
     the _DANGEROUS_KWARGS table entry is boolean-typed.

  Both changes are additive — no existing behavior is altered. The public API
  (detect_kwargs_unpacking signature, _DANGEROUS_KWARGS table format) is unchanged.

