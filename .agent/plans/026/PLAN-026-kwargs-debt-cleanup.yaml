parts:
  - id: a
    title: "Dict union detection in _collect_dict_assigns"
    status: Done
    verify_group: kwargs-debt
    requirements_covered: [R001, R002, R003, R-IMP001]
    approach:
      - step: "Handle Assign with BinOp(BitOr) in _collect_from_body"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: >
          Add a branch in _collect_from_body for ast.Assign where value is
          ast.BinOp(op=BitOr). Resolve both operands: left via already-collected
          result dict or _extract_dict_literal, right via _extract_dict_literal.
          If both resolve, merge (right wins on conflicts, matching Python semantics).
          If either is unresolvable, skip the assignment (conservative).
      - step: "Handle AugAssign(BitOr) in _collect_from_body"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: >
          Add a branch for ast.AugAssign where op is BitOr. Look up the target
          variable in result dict, resolve the RHS via _extract_dict_literal or
          result lookup. If both resolve, merge into the existing entry. If
          unresolvable, remove the variable from tracking (conservative — it may
          have been overwritten with unknown values).
      - step: "Add corpus fixtures for dict union"
        files:
          - tests/fixtures/split_evasion/pos_kwargs_dict_union.py
          - tests/fixtures/split_evasion/neg_kwargs_dict_union_unresolvable.py
        notes: >
          Positive fixture: opts = {}; opts = opts | {'shell': True}; subprocess.run(**opts).
          Also include opts |= variant. Negative fixture: opts = unknown | {'shell': True}
          and {**base, 'shell': True} (already handled, but good to include).
    criteria:
      - "opts = opts | {'shell': True} followed by subprocess.run(**opts) produces EXEC-002"
      - "opts |= {'shell': True} followed by subprocess.run(**opts) produces EXEC-002"
      - "Unresolvable operand (unknown | {'shell': True}) produces zero findings"
      - "PEP 448 spread dicts ({**base, 'shell': True}) still produce zero findings (regression)"
      - "_ast_kwargs_detector.py is at or below 300 lines"

  - id: b
    title: "Truthy value matching for boolean table entries"
    status: Done
    depends_on: [a]
    verify_group: kwargs-debt
    requirements_covered: [R004, R005, R006, R-IMP002]
    approach:
      - step: "Add truthy normalization to _kwarg_matches"
        files: [src/skill_scan/_ast_kwargs_detector.py]
        notes: >
          When the table value is isinstance(value, bool), compare using Python
          truthiness instead of exact string match. For True: resolved value must
          be truthy (not in {'0', 'False', 'None', '', 'false'}). For False: resolved
          value must be falsy (in that set). When value is not bool, keep existing
          exact str() comparison.
      - step: "Add corpus fixtures for truthy matching"
        files:
          - tests/fixtures/split_evasion/pos_kwargs_shell_int_truthy.py
          - tests/fixtures/split_evasion/neg_kwargs_shell_int_falsy.py
        notes: >
          Positive: subprocess.run(['ls'], **{'shell': 1}). Negative:
          subprocess.run(['ls'], **{'shell': 0}).
    criteria:
      - "subprocess.run(**{'shell': 1}) produces EXEC-002"
      - "subprocess.run(**{'shell': 0}) produces zero findings"
      - "_kwarg_matches with non-boolean table value uses exact string comparison (no truthy normalization)"
      - "All existing kwargs tests pass unchanged"

