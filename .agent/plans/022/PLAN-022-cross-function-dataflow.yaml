parts:
  - id: a
    title: "Symbol table return-value tracking"
    status: Done
    verify_group: cross-function-dataflow
    requirements_covered: [R001, R002, R003, R006, R007, R-IMP001, R-IMP002, R-IMP003, R-IMP005, R-IMP006, R-IMP008]
    approach:
      - step: "Create _ast_symbol_table_return_helpers.py with return-value extraction logic"
        files: [src/skill_scan/_ast_symbol_table_return_helpers.py]
        notes: >
          _collect_return_value(func_body, scope) walks all return statements
          in a function body. For each return, resolve the value to a string
          constant (ast.Constant) or a reference to a tracked variable.
          If ALL return paths converge to the same string, return it; if any
          diverge or cannot resolve, return None (conservative). Functions
          with no return statements or bare returns yield None. Must handle
          conditional returns (if/else), early returns, and try/except.
          Functions with implicit fallthrough (no return on some paths)
          are treated as divergent (None on the missing path). Returns
          inside finally blocks are collected like any other return.
          Bounded by MAX_RESOLVE_DEPTH from _ast_symbol_table.py.
          Use deferred local import for _Ref if needed.
      - step: "Wire return-value collection into build_symbol_table()"
        files: [src/skill_scan/_ast_symbol_table.py]
        notes: >
          After existing function/class body processing, add a second pass
          that calls _collect_return_value() for each function and stores the
          result under composite key "funcname()". For class methods, use
          "ClassName.method()". For nested functions, use
          "innerfunc()" (matching existing convention where nested
          variables are stored as "innerfunc.var", not "outer.inner.var"). Use deferred local import of
          _ast_symbol_table_return_helpers (same pattern as existing helpers).
          Existing variable tracking must remain unchanged — return tracking
          is purely additive to the result dict.
      - step: "Create unit tests for return tracking"
        files: [tests/unit/test_ast_symbol_table_returns.py]
        notes: >
          Test cases: single-return function, multi-return convergent (all
          paths same string), multi-return divergent (different strings ->
          NOT tracked), nested function returns, class method returns with
          ClassName.method() key, recursive/circular call (should not crash),
          function with no return, function returning non-string, function
          returning tracked variable (indirection chain). Verify existing
          variable tracking unaffected.
    criteria:
      - "_ast_symbol_table_return_helpers.py exists and is <= 300 lines"
      - "_collect_return_value(func_body, scope) returns a string when all return paths resolve to the same constant; returns None otherwise"
      - "build_symbol_table() stores module-level function return values under 'funcname()' composite key"
      - "build_symbol_table() stores class method return values under 'ClassName.method()' composite key"
      - "Nested function returns are stored under 'innerfunc()' composite key (matches existing nested variable convention)"
      - "Multi-return functions with divergent return values are NOT tracked (conservative)"
      - "Recursive or circular function references do not cause infinite loops"
      - "Existing variable-assignment tracking is unchanged -- all existing tests pass"

  - id: b
    title: "Split detector call resolution and evasion fixtures"
    status: Done
    depends_on: [a]
    verify_group: cross-function-dataflow
    requirements_covered: [R004, R005, R008, R009, R-IMP004, R-IMP005, R-IMP007, R-EFF001, R-EFF002, R-ADV001, R-ADV002, R-ADV003]
    approach:
      - step: "Add resolve_call_return() to _ast_split_resolve.py"
        files: [src/skill_scan/_ast_split_resolve.py]
        notes: >
          resolve_call_return(node, symbol_table, scope) handles ast.Call
          nodes: extract function name from ast.Name (plain call) or
          ast.Attribute with self/cls/ClassName receiver. Construct composite
          key with "()" suffix. Look up in symbol_table and return the stored
          string or None. Also integrate into resolve_operand() and
          resolve_expr() so inline calls in BinOp(Add), f-string, and join
          contexts resolve automatically.
      - step: "Add call-return fallback in _try_resolve_split() and call-site assignment support"
        files: [src/skill_scan/_ast_split_detector.py, src/skill_scan/_ast_symbol_table.py]
        notes: >
          In _try_resolve_split(), add a third fallback for ast.Call nodes
          that are NOT join/format: try resolve_call_return() as last resort.
          In _ast_symbol_table.py, add call-site assignment resolution: when
          processing x = func(), look up "funcname()" in the return table and
          store the resolved value for x. This enables double-indirection
          patterns (x = get_prefix(); result = x + y).
      - step: "Create 4 positive and 1 negative evasion fixtures"
        files:
          - tests/fixtures/split_evasion/pos_call_return_assign.py
          - tests/fixtures/split_evasion/pos_call_return_inline.py
          - tests/fixtures/split_evasion/pos_call_return_fstring.py
          - tests/fixtures/split_evasion/pos_call_return_class.py
          - tests/fixtures/split_evasion/neg_call_return_safe.py
        notes: >
          Positive fixtures: (1) assign -- function returns fragments, caller
          assigns and concatenates to "eval"; (2) inline -- direct
          concatenation get_a() + get_b() to "exec"; (3) fstring -- f-string
          interpolation f"{get_sys()}{get_tem()}" to "system"; (4) class --
          self.prefix() + self.suffix() to "popen". Negative: functions
          returning safe strings whose concatenation does not match any
          dangerous name. All follow pos_/neg_ prefix for auto-discovery.
    criteria:
      - "resolve_call_return() returns the function's tracked return value for known calls; returns None for unknown functions"
      - "_try_resolve_split() resolves ast.Call nodes that are not join/format via call-return fallback"
      - "Inline call expressions in BinOp(Add), f-string, and join contexts resolve via return-value lookup"
      - "self.method() and ClassName.method() calls resolve via 'ClassName.method()' composite key"
      - "x = func() assignments resolve x to the function's return value in the symbol table"
      - "4 positive fixtures each produce at least one EXEC-002 or EXEC-006 finding"
      - "Negative fixture produces zero findings"
      - "make check passes with all new and existing tests green"

