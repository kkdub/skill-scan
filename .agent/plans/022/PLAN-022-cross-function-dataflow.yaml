id: "PLAN-022"
title: "Cross-function dataflow tracking"
type: implementation
status: Done
created: 2026-03-13

linked_spec: null

description: |
  Close DEBT-018-T3-CROSS-FUNCTION: track function return values in the symbol
  table and resolve call expressions in the split-evasion detector.

  Currently build_symbol_table() tracks variable assignments but not what
  functions return. When an attacker hides dangerous names behind function calls
  (e.g., get_prefix() returning "ev", get_suffix() returning "al", caller
  concatenating to "eval"), the scanner misses it entirely.

  This plan adds:
  1. Return-value extraction from function bodies (single-return and convergent
     multi-return) stored under composite key "funcname()" in the symbol table.
  2. Call-site resolution in the split detector so inline expressions like
     get_a() + get_b(), f"{get_a()}{get_b()}", and self.method() calls resolve
     via the return-value table.

  Resolves 4 known evasion techniques from the red-team corpus.

