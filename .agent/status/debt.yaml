  type: test-coverage
  severity: low
  plan: PLAN-021
  files:
    - tests/unit/test_ast_split_detector_join.py
  blocker: "None — straightforward to add assertions checking .line or scope on findings from class method payloads."
  resolution: "Add assertions in TestClassSelfAttrResolution or TestPlanAcceptance that verify finding line numbers correspond to the class method body, not the class definition."

- id: DEBT-022-CALL-RETURN-DESCRIPTION
  description: "resolve_call_return findings use 'split variable evasion' description even for standalone call-return paths, which is misleading for analysts"
  type: security
  severity: low
  plan: PLAN-022
  files:
    - src/skill_scan/_ast_split_detector.py:91-99
  blocker: "Finding description templates in _check_dangerous are shared across all detection paths; separate wording requires refactoring the finding emission pipeline."
  resolution: "Add a branch in _check_dangerous or _try_resolve_split that distinguishes call-return findings from concatenation-evasion findings, using 'call-return evasion building X' instead of 'split variable evasion building X'."

# --- PLAN-027 Red-Team Debt ---

- id: DEBT-027-CHR-ALIAS
  description: "_resolve_comprehension_chr hardcodes 'chr' as a string literal; chr aliased via f=chr or import builtins; builtins.chr(c) evades detection completely"
  type: effectiveness
  severity: low
  plan: PLAN-027
  files:
    - src/skill_scan/_ast_split_join_helpers.py
  blocker: "alias_map is threaded through the call chain but not consulted in _resolve_comprehension_chr; fixing requires checking alias_map for chr resolution, which is straightforward but out of scope for PLAN-027's targeted debt fixes."
  resolution: "In _resolve_comprehension_chr, resolve the function name via alias_map (already available in the call chain) before comparing to 'chr'."

- id: DEBT-027-INTLIST-AUGMENTED
  description: "codes += [more_ints] and codes.extend([ints]) not tracked by _collect_int_list_assigns; attacker can split int list across multiple statements to evade"
  type: effectiveness
  severity: low
  plan: PLAN-027
  files:
    - src/skill_scan/_ast_split_join_helpers.py
  blocker: "AugAssign and method-call tracking require extending the pre-pass to handle incremental list mutations, adding complexity beyond the conservative first-pass design."
  resolution: "Extend _collect_int_lists_from_body to handle AugAssign(+=) when target is already in int_list_table and the value is an all-int list — extend the tracked list."
