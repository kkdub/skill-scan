- id: DEBT-025-DICT-UNION
  description: "Detect dangerous kwargs via dict union operator — e.g. opts | {'shell': True} or opts |= {'shell': True} — not handled by _collect_dict_assigns pre-pass. Note: PEP 448 spread ({**base, 'shell': True}) IS detected via _extract_dict_literal inline key extraction."
  type: effectiveness
  severity: low
  plan: PLAN-025
  files:
    - src/skill_scan/_ast_kwargs_detector.py
  blocker: "Dict union (PEP 584 a | b / a |= b) requires resolving both operands via the symbol table before merging. Low evasion risk — attacker must use union operator specifically."
  resolution: "Extend _collect_dict_assigns to track dict union expressions, resolving both operands via the symbol table before merging."

- id: DEBT-025-SHELL-INT-TRUTHY
  description: "subprocess.run('ls', **{'shell': 1}) not detected — integer 1 is truthy and enables shell execution, but _kwarg_matches compares str(1)='1' against str(True)='True'"
  type: effectiveness
  severity: low
  plan: PLAN-025
  files:
    - src/skill_scan/_ast_kwargs_detector.py
  blocker: "Current _kwarg_matches uses exact str() comparison. Extending to truthy-value matching risks false positives on non-boolean-intended integer values in other future table entries."
  resolution: "Add truthy normalization in _kwarg_matches for boolean-typed table entries, or add a second _DANGEROUS_KWARGS entry for integer 1."

- id: DEBT-024-TRACKED-COMPREHENSION
  description: "Comprehension over tracked variable — codes = [101,118,97,108]; ''.join(chr(c) for c in codes) — not detected because symbol table only tracks dict[str, str]"
  type: effectiveness
  severity: low
  plan: PLAN-024
  files:
    - src/skill_scan/_ast_symbol_table.py
    - src/skill_scan/_ast_split_join_helpers.py
  blocker: "Symbol table is dict[str, str] — extending to support list[int] values requires type union or parallel tracking structure. Inline integer list literals are handled by PLAN-024 Part e."
  resolution: "Extend symbol table to track non-string types (at minimum list[int] for chr() comprehension patterns), or add a parallel pre-pass that collects integer-list assignments."

