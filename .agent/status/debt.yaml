  type: effectiveness
  severity: low
  plan: PLAN-021
  files:
    - src/skill_scan/_ast_symbol_table.py:80-100
  blocker: "Multi-level nonlocal resolution requires a full scope chain; single-level covers the most common evasion pattern."
  resolution: "Implement scope chain tracking to propagate nonlocal writes through multiple nesting levels."



# --- PLAN-027 Red-Team Debt ---


- id: DEBT-045-CALL-RETURN-LABEL-PROPAGATION
  description: "Call-return label only applies when the resolved Call node matches resolve_call_return; for mixed patterns like a()+b() (binop) or f'{a()}{b()}' (fstring), leaf call-return resolutions still get labeled 'split variable'"
  type: effectiveness
  severity: low
  plan: none
  files:
    - src/skill_scan/_ast_split_detector.py:175-196
    - src/skill_scan/_ast_split_resolve.py
  blocker: "Requires resolvers to return (value, label) tuples or track whether any leaf resolution used call-return; changes the resolver signature contract across all _RESOLVERS entries."
  resolution: "Have resolvers return (value, source_label) tuples instead of bare strings. Update _RESOLVERS type alias and all callers. Alternatively, add a thread-local or context flag that resolve_call_return sets when it contributes to a resolution."

- id: DEBT-028-INTLIST-CLASS-BODY
  description: "_collect_int_list_assigns does not walk class-level statements (only methods); class C: codes = [ints]; codes += [more] is untracked"
  type: effectiveness
  severity: low
  plan: none
  files:
    - src/skill_scan/_ast_split_join_helpers.py:30-37
  blocker: "Class-level scope prefix differs from method scope (C vs C.method); adding class body walk requires scope naming decision and testing."
  resolution: "In _collect_int_list_assigns, add class body walk with scope=class_name for direct class-level statements."

- id: DEBT-027-INTLIST-CONCAT
  description: "codes = a + b where a and b are tracked int-lists not resolved by _collect_int_list_assigns; requires cross-variable resolution in the pre-pass"
  type: effectiveness
  severity: low
  plan: none
  files:
    - src/skill_scan/_ast_split_join_helpers.py
  blocker: "Requires looking up both operands in the int_list_table during assignment processing — adds cross-variable dependency tracking to the pre-pass."
  resolution: "In _collect_int_lists_from_body, handle Assign where value is BinOp(Add) with both operands as Name nodes already in the table — concatenate their tracked lists."

- id: DEBT-028-INTLIST-GLOBAL-NONLOCAL
  description: "_extend_tracked writes to scope-qualified key; global/nonlocal declarations not followed, so mutations inside functions with global/nonlocal codes never update the actual binding"
  type: effectiveness
  severity: low
  plan: none
  files:
    - src/skill_scan/_ast_split_int_list_helpers.py:65-69
  blocker: "Requires scope chain tracking to resolve global/nonlocal declarations to their target scope key before writing."
  resolution: "In _extend_tracked, accept a scope_declarations parameter (or the full scope chain); when the name has a global/nonlocal binding, resolve the key to the target scope before lookup/write."

- id: DEBT-028-INTLIST-BRANCH-MERGE
  description: "_collect_int_list_assigns walks both if/else branches sequentially, merging mutations from mutually exclusive paths into one list — produces impossible combined values and potential false positives"
  type: effectiveness
  severity: low
  plan: none
  files:
    - src/skill_scan/_ast_split_join_helpers.py
    - src/skill_scan/_ast_split_int_list_helpers.py
  blocker: "Requires branch-aware traversal (snapshot-and-merge or shadow-on-branch) to avoid combining mutations from mutually exclusive paths; significant complexity for the pre-pass collector."
  resolution: "Snapshot the int_list_table before each branch, walk the branch, then merge results conservatively (shadow any key that differs between branches)."

- id: DEBT-029-SPLIT-RESOLVE-AT-LIMIT
  description: "_ast_split_resolve.py is at exactly 300/300 line limit after adding case-method resolver; any future addition requires file split"
  type: technical
  severity: low
  plan: PLAN-029
  files:
    - src/skill_scan/_ast_split_resolve.py:1-300
