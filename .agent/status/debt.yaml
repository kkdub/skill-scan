- id: DEBT-021-NONLOCAL-MULTILEVEL
  description: "_process_nested only routes nonlocal writes one level up; two-level-deep nonlocal (inner -> outer -> grandparent) not handled"
  type: effectiveness
  severity: low
  plan: PLAN-021
  files:
    - src/skill_scan/_ast_symbol_table.py:80-100
  blocker: "Multi-level nonlocal resolution requires a full scope chain; single-level covers the most common evasion pattern."
  resolution: "Implement scope chain tracking to propagate nonlocal writes through multiple nesting levels."

- id: DEBT-021-SCOPE-ATTRIBUTION-ASSERTION
