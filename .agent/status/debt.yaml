- description: "Call-return label only applies when the resolved Call node matches resolve_call_return; for mixed patterns like a()+b() (binop) or f'{a()}{b()}' (fstring), leaf call-return resolutions still get labeled 'split variable'"
  type: technical
  plan: none
  files:
    - src/skill_scan/_ast_split_detector.py:175-196
    - src/skill_scan/_ast_split_resolve.py
  blocker: "Requires resolvers to return (value, label) tuples or track whether any leaf resolution used call-return; changes the resolver signature contract across all _RESOLVERS entries."
  resolution: "Have resolvers return (value, source_label) tuples instead of bare strings. Update _RESOLVERS type alias and all callers. Alternatively, add a thread-local or context flag that resolve_call_return sets when it contributes to a resolution."

- description: "_walk_self_attrs only tracks self.attr = 'string' assignments; self.attr = ['list', 'of', 'strings'] is not stored as indexed elements (name[i] + name.__len__) in the symbol table, so star-unpack and list-index concat cannot resolve class attributes assigned as string lists"
  type: technical
  plan: none
  files:
    - src/skill_scan/_ast_symbol_table_self_attrs.py:35-49
  blocker: "_check_self_assign calls try_resolve_string which only handles string constants; extending it to call _handle_string_list_literal requires importing from _ast_symbol_table_dict_tracker and adapting the result dict type (currently dict[str, str], list tracking uses composite keys)."
  resolution: "Add a list/tuple branch in _check_self_assign that calls _handle_string_list_literal with the ClassName.attr prefix, storing ClassName.attr[i] and ClassName.attr.__len__ entries alongside the existing string tracking."

- description: "try/except bodies are walked sequentially (not branch-aware); try:codes+=[A];except:codes+=[B] produces [init,A,B] — a nonsense merge of mutually exclusive paths, same class of bug as the if/else case fixed in PLAN-035"
  type: technical
  plan: none
  files:
    - src/skill_scan/_ast_split_int_list_tracker.py:258
  blocker: "try/except is more nuanced than if/else — the try body may partially execute before the except fires, so the branches are not strictly mutually exclusive; needs careful analysis of which mutations are reachable in each handler."
  resolution: "Extend _walk_fn_body to snapshot before try body, walk each handler independently from post-try snapshot, then N-way merge; must account for partial try execution (some mutations may already be applied before exception)."
