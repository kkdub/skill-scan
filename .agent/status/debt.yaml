- id: DEBT-026-STRING-TRUTHINESS
  description: "String-based truthiness heuristic cannot distinguish int(0) from str('0') — shell='0' (truthy at runtime) is treated as falsy (false negative). Same for shell='False', shell='None'. Fundamental limitation of dict[str, str] symbol table."
  type: effectiveness
  severity: low
  plan: PLAN-026
  files:
    - src/skill_scan/_ast_kwargs_detector.py:279
  blocker: "Symbol table is dict[str, str] — type info is lost at extraction time. Fixing requires extending the table to preserve constant types."
  resolution: "Preserve ast.Constant type info through extraction (e.g. tagged union or parallel type map), then compare against runtime truthiness instead of string heuristic."

- id: DEBT-026-CHAINED-UNION
  description: "Chained dict union (a | b | c) not tracked — only single-level union (a | b) and augmented union (a |= b) are resolved. BinOp operands are not recursed into, so three-operand unions silently produce unresolvable results."
  type: effectiveness
  severity: low
  plan: PLAN-026
  files:
    - src/skill_scan/_ast_kwargs_detector.py
  blocker: "Resolving chained BinOp(BitOr) requires recursing into operands, which adds complexity for a narrow evasion pattern. Single-level covers the common case."
  resolution: "In _resolve_dict_operand, recurse into BinOp(BitOr) left/right operands instead of returning None for non-Name/Dict nodes."

- id: DEBT-024-TRACKED-COMPREHENSION
  description: "Comprehension over tracked variable — codes = [101,118,97,108]; ''.join(chr(c) for c in codes) — not detected because symbol table only tracks dict[str, str]"
  type: effectiveness
  severity: low
  plan: PLAN-024
  files:
    - src/skill_scan/_ast_symbol_table.py
    - src/skill_scan/_ast_split_join_helpers.py
  blocker: "Symbol table is dict[str, str] — extending to support list[int] values requires type union or parallel tracking structure. Inline integer list literals are handled by PLAN-024 Part e."
  resolution: "Extend symbol table to track non-string types (at minimum list[int] for chr() comprehension patterns), or add a parallel pre-pass that collects integer-list assignments."

